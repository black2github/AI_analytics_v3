required:
- authorizedPerson
- bankClientId
- deleted
- fio
- fired
- relationship
- requests
- tags
type: object
properties:
  relationship:
    type: string
    description: Отношение записи к источникам ее хранения
    enum:
    - G1_ECO_AND_ESK
    - G2_ONLY_ESK
    - G3_ONLY_ECO
  fio:
    type: string
    description: ФИО сотрудника
  phoneNumber:
    type: string
    description: Номер телефона. Не применяется маскирование
  email:
    type: string
    description: Электронная почта. Не применяется маскирование
  authorizedPerson:
    type: boolean
    description: Признак "УЛ по ГПБ БОЛ"
  position:
    type: string
    description: Должность
  eskId:
    type: string
    description: Идентификатор сотрудника в ЕСК
  bankClientId:
    type: string
    description: Ссылка на сущность "Клиент Банка"
    format: uuid
  emplId:
    type: string
    description: Ссылка на сущность "Сотрудники клиента"
    format: uuid
  userUaaId:
    type: string
    description: Ссылка на сущность "Клиентский пользователь"
    format: uuid
  blockedAt:
    type: string
    description: Дата и время блокировки УЛ
    format: date-time
  fired:
    type: boolean
    description: Признак, что сотрудник уволен
  firedAt:
    type: string
    description: Дата, когда сотрудник был уволен
    format: date-time
  deleted:
    type: boolean
    description: Признак, что сотрудник удалён
  deletedAt:
    type: string
    description: Дата, когда сотрудник был удалён
    format: date-time
  interactionPerson:
    type: boolean
    description: Является взаимодействующим лицом
  clientRepresentative:
    type: boolean
    description: Является представителем клиента
  emplEskSyncedAt:
    type: string
    description: Сотрудник. Дата и время последней синхронизации с ЕСК
    format: date-time
  requests:
    type: array
    description: Сокращенное описание заявок
    items:
      $ref: ./ShortRequestInfo.yaml
  tags:
    type: array
    description: Список тегов для сотрудника
    items:
      type: string
      description: Список тегов для сотрудника
      enum:
      - UPDATE_INFORMATION
      - REJECTED
      - DRAFT
      - TO_SIGN
      - CHECKED_BANK
description: Список сотрудников организации
