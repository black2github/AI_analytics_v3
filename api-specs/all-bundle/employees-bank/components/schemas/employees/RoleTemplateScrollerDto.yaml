required:
- archival
- id
- name
- type
- visibilityOnScreenForm
type: object
properties:
  id:
    type: string
    description: Идентификатор
    format: uuid
  archival:
    type: boolean
    description: Признак архивной записи
  createdAt:
    type: string
    description: Дата создания записи
    format: date-time
  code:
    type: string
    description: Код
  name:
    type: string
    description: Наименование
  description:
    type: string
    description: Описание
  type:
    type: string
    description: Тип шаблона роли
    enum:
    - TECHNICAL
    - CUSTOMER
    - COMMON
    - MIGRATION
  bankClient:
    $ref: ./BankClient.yaml
  displayPriority:
    type: integer
    description: Приоритет отображения
    format: int32
  creator:
    $ref: ./User.yaml
  visibilityOnScreenForm:
    type: boolean
    description: Видимость на экранной форме
description: Данные шаблона роли
