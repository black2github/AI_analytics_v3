required:
- changedIn
- id
- status
- userType
type: object
properties:
  id:
    type: string
    description: Идентификатор записи
    format: uuid
  status:
    type: string
    description: Статус документа
  changedIn:
    type: string
    description: Дата и время присвоения статуса документу
    format: date-time
  userId:
    type: string
    description: Ссылка на сущность "Пользователь"
    format: uuid
  userType:
    type: string
    description: Тип пользователя
    enum:
    - CLIENT
    - BANK
    - TECHNICAL
  userName:
    type: string
    description: Имя пользователя
  commentForClient:
    type: string
    description: Комментарий для Клиента
  commentForBank:
    type: string
    description: Комментарий для Банка
  localization:
    type: string
    description: Локализация
description: История изменений заявки на создание нового/изменение данных и полномочий сотрудника Клиента
