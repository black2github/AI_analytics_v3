type: object
properties:
  accountInfo:
    $ref: ./AccountInfoScrollerDto.yaml
  accountTypeCode:
    type: integer
    description: Тип открываемого счёта
    format: int64
  bankClient:
    $ref: ./BankClientInfoBankScrollerDto.yaml
  branch:
    $ref: ./BranchScrollerDto.yaml
  commentForBank:
    type: string
    description: Комментарий для банка
  date:
    type: string
    description: Дата и время короткой заявки
    format: date-time
  hasAccessGrantedInviteSentError:
    type: boolean
    description: Признак того, что в заявке есть физические лица имеющие статус выдачи прав доступа и отправки инвайта "Ошибка выдачи прав и запроса на отправку инвайта"
  hasAccessRevokeError:
    type: boolean
    description: Признак того, что в заявке есть физические лица имеющие статус выдачи прав доступа и отправки инвайта "Ошибка отзыва прав и запроса на аннулирование инвайта"
  hasQrcPaymentTessaStatusError:
    type: boolean
    description: Признак того, что статус выгрузки документов для оплат qrc "Ошибка выгрузки в ТЕССА"
  hasSimpleInviteSentError:
    type: boolean
    description: Признак того, что в заявке есть физические лица имеющие статус выдачи прав доступа и отправки инвайта "Ошибка запроса на отправку инвайта"
  id:
    type: string
    description: Идентификатор короткой заявки
    format: uuid
  isAfterRework:
    type: boolean
    description: Признак того что короткая заявка после доработки данных или замены документов
  isRequestEditing:
    type: boolean
    description: Флаг редактирования короткой заявки
  lastClientCall:
    $ref: ./ClientCallHistoryScrollerDto.yaml
  lastManagerVisit:
    $ref: ./ManagerVisitHistoryScrollerDto.yaml
  meetingDate:
    type: string
    description: Дата и время встречи
    format: date-time
  number:
    type: integer
    description: Номер короткой заявки
    format: int32
  onRework:
    type: boolean
    description: На доработке
  partnerSite:
    type: string
    description: Сайт партнёра
  primaryCheckResult:
    type: string
    description: Результат первичных проверок
    enum:
    - POSITIVE
    - NEGATIVE
    - ERROR
    - CONDITIONALLY_POSITIVE
    - CONDITIONALLY_POSITIVE_BY_FNS
    - CONDITIONALLY_POSITIVE_BY_FTS
    - EMPTY
  responsibleBankUserFio:
    type: string
    description: Ответственный операционист. ФИО пользователя банка, соответствующее полю "Ответственный за короткую заявку"
  responsibleBankUserId:
    type: string
    description: Ответственный операционист. UAA id пользователя-операциониста, ответственного сотрудника банка, который последним редактировал короткую заявку
    format: uuid
  scheduledCallInfo:
    $ref: ../common/ScheduledCallInfoDto.yaml
  signPlace:
    type: string
    description: Место подписания договора с банком
    enum:
    - BANK_OFFICE
    - DEPARTURE_OF_BANK_EMPLOYEE
  source:
    type: string
    description: Источник создания короткой заявки
    enum:
    - LANDING_PAGE
    - CRM_INFOR
    - ONBOARDING
  status:
    type: string
    description: Статус короткой заявки на открытие первого счета
    enum:
    - NONE
    - DRAFT
    - COMPLETED
    - CLIENT_DOCS_UPLOAD
    - DELETED
    - DELIVERED
    - MIDDLE_OFFICE_CONTROL
    - WAITING_FOR_ESK_ACCOUNTS
    - EXPORT_TO_TESSA
    - EXPORT_PASSPORT_TO_TESSA_1070
    - EXPORT_TO_TESSA_ERROR
    - EXECUTED_BY_TESSA
    - REPLACING_DOCS
    - APPROVED
    - REFUSED
    - REJECTED
    - EXECUTED
    - RECEIVED
    - EXPORT_TO_ESK_1070
    - EXPORT_TO_ESK_1099
    - EXPORT_TO_ESK_115
    - EXPORTED_TO_ESK_1070
    - EXPORTED_TO_ESK_1099
    - EXPORTED_TO_ESK_115
    - TECH_EXPORT_TO_ESK_ERROR_1070
    - TECH_EXPORT_TO_ESK_ERROR_1099
    - EXPORT_TO_ESK_ERROR_115
    - ACCEPTED_BY_ESK_115
    - EXECUTED_BY_ESK_1070
    - EXECUTED_BY_ESK_1099
    - DOSSIER_APPROVED_BY_ESK_115
    - DOSSIER_CREATED_BY_ESK_115
    - DOSSIER_REPEATED_EXAMINATION_115
    - EXPORT_TO_TESSA_115
    - EXPORT_TO_TESSA_ERROR_115
    - EXECUTED_BY_TESSA_115
  updatedAt:
    type: string
    description: Дата и время присвоения статуса документа в соответствии с жизненным циклом
    format: date-time
  userId:
    type: string
    description: Пользователь, создавший короткую заявку
    format: uuid
  userType:
    type: string
    description: Тип пользователя
    enum:
    - CLIENT
    - BANK
    - TECHNICAL
  visitingServiceType:
    type: string
    description: Тип выездного сервиса
    enum:
    - VISITING_MANAGER
    - RETAIL_DELIVERY
    - OFFICE
description: Короткая заявка на открытие первого счета на банковском скроллере
