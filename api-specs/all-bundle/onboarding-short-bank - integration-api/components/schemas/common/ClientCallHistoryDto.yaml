type: object
properties:
  callDateTime:
    type: string
    description: Дата и время звонка
    format: date-time
  callResult:
    type: string
    description: Результат звонка
    enum:
    - POSTPONED
    - CALL_MISSED
    - CALL_UNAVAILABLE
    - REFUSED
    - PROMISED_TO_DO
    - ACCOUNT_OPENED
    - PARTNER_REQUEST
    - ACCOUNT_REJECTED
    - CLIENT_HAS_NOT_DECIDED
    - TRANSFERRED_TO_CM
    - PETITION_SENT_TO_LD
    - OTHER
  nextCallDateTime:
    type: string
    description: Дата и время следующего звонка
    format: date-time
  onboardingShortRequestId:
    type: string
    description: Ссылка на "Короткая заявка на открытие первого счета"
    format: uuid
  operationistComment:
    type: string
    description: Комментарий операциониста
  problem:
    type: string
    description: Причины затруднений клиента
    enum:
    - COLLECTING_DOCUMENTS
    - DATA_TO_FILL_UNAVAILABLE
    - TOO_MUCH_DATA_TO_FILL
    - CANT_DO_WHAT_IS_REQUIRED_BY_BANK
    - HAS_NO_IDEA_OF_WHAT_IS_REQUIRED_BY_BANK
    - OBSTACLES_IN_USAGE
    - OPENED_ACCOUNT_AT_OTHER_BANK
    - NO_TIME_TO_FILL_A_REQUEST
    - NOT_SATISFIED_WITH_BANKS_RATES
    - CANNOT_PROVIDE_INFORMATION_REQUESTED_BY_BANK
  status:
    type: string
    description: Статус короткой заявки на открытие первого счета
    enum:
    - NONE
    - DRAFT
    - COMPLETED
    - CLIENT_DOCS_UPLOAD
    - DELETED
    - DELIVERED
    - MIDDLE_OFFICE_CONTROL
    - WAITING_FOR_ESK_ACCOUNTS
    - EXPORT_TO_TESSA
    - EXPORT_PASSPORT_TO_TESSA_1070
    - EXPORT_TO_TESSA_ERROR
    - EXECUTED_BY_TESSA
    - REPLACING_DOCS
    - APPROVED
    - REFUSED
    - REJECTED
    - EXECUTED
    - RECEIVED
    - EXPORT_TO_ESK_1070
    - EXPORT_TO_ESK_1099
    - EXPORT_TO_ESK_115
    - EXPORTED_TO_ESK_1070
    - EXPORTED_TO_ESK_1099
    - EXPORTED_TO_ESK_115
    - TECH_EXPORT_TO_ESK_ERROR_1070
    - TECH_EXPORT_TO_ESK_ERROR_1099
    - EXPORT_TO_ESK_ERROR_115
    - ACCEPTED_BY_ESK_115
    - EXECUTED_BY_ESK_1070
    - EXECUTED_BY_ESK_1099
    - DOSSIER_APPROVED_BY_ESK_115
    - DOSSIER_CREATED_BY_ESK_115
    - DOSSIER_REPEATED_EXAMINATION_115
    - EXPORT_TO_TESSA_115
    - EXPORT_TO_TESSA_ERROR_115
    - EXECUTED_BY_TESSA_115
  userInfo:
    $ref: ./UserInfoDto.yaml
description: История звонков клиенту по заявке на открытие первого счета
