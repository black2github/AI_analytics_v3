required:
- clientId
- deviceId
- disableType
- idp_user_id
type: object
properties:
  idp_user_id:
    type: string
    description: Идентификатор пользователя в IDP
    format: uuid
  deviceId:
    type: string
    description: Идентификатор мобильного устройства
  clientId:
    type: string
    description: Идентификатор мобильного приложения
  disableType:
    type: string
    enum:
    - PIN
    - BIOMETRIC
  mobileSdkData:
    type: string
    description: Данные, полученные с мобильного устройства
  userEnvironment:
    type: string
    description: Информация об окружении пользователя
description: ДТО запроса удаления биометрии и PIN-кода в профиле пользователя из неавторизованной зоны
