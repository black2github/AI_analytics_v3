required:
- code
- confirmationRequestId
type: object
properties:
  confirmationRequestId:
    type: string
    description: Идентификатор запроса на подтверждение
    format: uuid
  code:
    type: string
    description: Код подтверждения введенный пользователем
  mobileSdkData:
    type: string
