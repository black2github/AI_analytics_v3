required:
- attestationObject
- clientDataJSON
- deviceFootprint
- rawId
- type
type: object
properties:
  rawId:
    type: string
    description: Уникальный идентификатор созданного ключа (credential ID).   Закодирован в base64url без padding.
  type:
    type: string
    enum:
    - public-key
  attestationObject:
    type: string
    description: Объект аттестации от аутентификатора.   Содержит подтверждение создания ключа.   Представляет собой бинарную структуру CBOR, закодированную в base64url.
  clientDataJSON:
    type: string
    description: JSON с данными от клиента.   Включает challenge, origin и type.   Закодирован в base64url.
  deviceFootprint:
    type: string
    description: Отпечаток устройства
