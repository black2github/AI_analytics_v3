post:
  tags:
  - WebAuthn
  summary: Завершение аутентификации WebAuthn
  description: Завершение аутентификации WebAuthn
  operationId: completeAuthnResponse
  parameters:
  - name: x-device-id
    in: cookie
    description: Идентификатор устройства пользователя для отображения экрана Быстрого входа
    required: false
    schema:
      type: string
  - name: User-Agent
    in: header
    description: Строковое представление информации о системе пользователя
    required: false
    schema:
      type: string
  - name: Referer
    in: header
    description: Страница, с которой произошёл запрос
    required: false
    schema:
      type: string
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/authn-response/CompleteAuthnResponseDto.yaml
    required: true
  responses:
    '400':
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: object
    '423':
      description: Locked
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '415':
      description: Unsupported Media Type
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '403':
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '500':
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '405':
      description: Method Not Allowed
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
