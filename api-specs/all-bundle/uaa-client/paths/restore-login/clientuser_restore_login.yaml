post:
  tags:
  - ClientUser
  summary: Восстановление логина
  description: Создаёт запрос на подтверждение на восстановление логина
  operationId: restoreLogin
  parameters:
  - name: Locale-code
    in: header
    description: "\n* UNKNOWN: \n* RU: \n* EN: "
    required: false
    schema:
      type: string
      enum:
      - UNKNOWN
      - RU
      - EN
      default: RU
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/restore-login/RestoreLoginRequestClientDto.yaml
    required: true
  responses:
    '400':
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: object
    '423':
      description: Locked
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '415':
      description: Unsupported Media Type
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '403':
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '500':
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '405':
      description: Method Not Allowed
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
