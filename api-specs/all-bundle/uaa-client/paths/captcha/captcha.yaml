get:
  tags:
  - CaptchaData API
  summary: Запросить изображение капчи
  operationId: getCaptchaImage
  parameters:
  - name: id
    in: query
    required: true
    schema:
      type: string
      format: uuid
  - name: size
    in: query
    required: false
    schema:
      type: string
  responses:
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/GenericResponseErrorDataVoid.yaml
    '200':
      description: OK
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
  security: []
