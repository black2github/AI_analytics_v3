get:
  tags:
  - EsiaAuthorization
  summary: Выполнить авторизацию через ЕСИА
  description: Выполнить авторизацию через ЕСИА
  operationId: authorize
  responses:
    '400':
      description: Ошибка
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/OAuth2Error.yaml
    '200':
      description: OK
      content:
        '*/*':
          schema:
            oneOf:
            - $ref: ../../components/schemas/common/ActionResult.yaml
            - $ref: ../../components/schemas/common/CreateResponse.yaml
    '423':
      description: Locked
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '415':
      description: Unsupported Media Type
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '403':
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '500':
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '302':
      description: Перенаправление в ЕСИА
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/OAuth2Error.yaml
    '405':
      description: Method Not Allowed
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    default:
      description: Перенаправление в ЕСИА
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/OAuth2Error.yaml
