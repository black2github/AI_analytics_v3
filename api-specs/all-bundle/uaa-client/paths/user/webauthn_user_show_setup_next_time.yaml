post:
  tags:
  - WebAuthn
  summary: Сохранить выбор пользователя по отображению настройки Быстрого входа
  description: Сохранить выбор пользователя по отображению настройки Быстрого входа
  operationId: showPassKeySetup
  parameters:
  - name: x-auth-session
    in: cookie
    description: Идентификатор текущей сессии
    required: false
    schema:
      type: string
      format: uuid
  - name: x-auth-session-key
    in: cookie
    description: Ключ текущей сессии
    required: false
    schema:
      type: string
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/user/ShowPasskeySetupRequestDto.yaml
    required: true
  responses:
    '400':
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: object
    '423':
      description: Locked
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '415':
      description: Unsupported Media Type
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '403':
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '500':
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '405':
      description: Method Not Allowed
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
