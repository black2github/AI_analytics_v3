type: object
properties:
  accountAssignment:
    type: string
    description: Назначение счета
    enum:
    - BASE
    - GPS_GOZ
  accountEcoType:
    type: integer
    description: Тип счета в ЭКО
    format: int64
  accountId:
    type: string
    description: Идентификатор счета в Ф1
  accountName:
    type: string
    description: Название счета
  curShort:
    type: string
    description: Валюта
  debt:
    type: number
    description: Текущая задолженность по комиссии перед Банком
  f1AccountType:
    type: string
    description: Типы счета в РКО Ф1
    enum:
    - PAYMENT
    - GOZ
  mainVId:
    type: string
    description: Номер счета
  restrictions:
