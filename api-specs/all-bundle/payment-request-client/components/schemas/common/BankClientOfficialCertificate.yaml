required:
- certificateData
- certificateId
- certificateName
- certificateOwnerName
- dstId
type: object
properties:
  dstId:
    type: string
    description: Идентификатор СЭП
    format: uuid
  certificateId:
    type: string
    description: Идентификатор сертификата
    format: uuid
  certificateData:
    type: string
    description: Base64 представление сертификата
  certificateOwnerName:
    type: string
    description: Владелец сертификата
  certificateName:
    type: string
    description: Наименование сертификата
  kind:
    type: string
    description: ДТО Классификатор видов электронной подписи
    enum:
    - LOCAL
    - CLOUD_SIGN
    - NOT_QUALIFIED_SIGN
    - QUALIFIED_SIGN
    - SIMPLE_SIGN
description: Сертификат представителя организации
