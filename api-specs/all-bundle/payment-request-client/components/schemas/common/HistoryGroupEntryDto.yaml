type: object
properties:
  userId:
    type: string
    format: uuid
  userFio:
    type: string
  dateTime:
    type: string
    format: date-time
  clientComment:
    type: string
  additionalInfo:
    type: string
  operation:
    type: string
    enum:
    - NO_CODE
    - CREATED
    - CREATED_1C
    - CREATED_LKUVED
    - CREATED_TNF
    - CREATE_OO
    - IMPORTED
    - EDITED
    - CANCELED_LKUVED
    - SIGNED
    - SIGNED_1
    - SIGNED_2
    - SINGLE_SIGN_REMOVED
    - SIGN_REMOVED_1
    - SIGN_REMOVED_2
    - REJECTED_1C
    - AMOUNT_CHANGED
    - PART_OF_AMOUNT
  localizationOperation:
    type: string
