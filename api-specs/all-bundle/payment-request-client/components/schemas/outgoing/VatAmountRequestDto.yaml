required:
- paymentAmount
- vatCalculationMethod
- vatPercentRate
type: object
properties:
  paymentAmount:
    pattern: ^[+-]?[0-9]+\.?[0-9]*$
    type: string
    description: Сумма платежа
  vatCalculationMethod:
    $ref: ./VatCalculationTypeDto.yaml
  vatPercentRate:
    type: integer
    description: Ставка НДС в процентах
    format: int32
description: Запрос расчета суммы НДС
