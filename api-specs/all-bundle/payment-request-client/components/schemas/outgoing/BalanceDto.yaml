required:
- account
- clientAbsId
- currency
- currentBalance
- f1AccountId
type: object
properties:
  f1AccountId:
    type: integer
    description: Идентификатор счета в РКО Ф1
    format: int64
  clientAbsId:
    type: integer
    description: РНК клиента в РКО Ф1
    format: int64
  account:
    type: string
    description: Номер счета
  currency:
    type: string
    description: Валюта счета
  currentBalance:
    type: string
    description: Сумма собственных доступных средств (без учета овердрафта)
  currentOverdraft:
    type: string
    description: Сумма неиспользованного овердрафта
description: Баланс счета
