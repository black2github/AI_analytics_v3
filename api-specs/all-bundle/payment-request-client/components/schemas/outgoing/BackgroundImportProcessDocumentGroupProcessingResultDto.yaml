type: object
properties:
  status:
    type: string
    description: Статус обработки документа фонового процесса импорта
    enum:
    - NEW
    - ERROR
    - REJECTED
  currencyIsoCode:
    type: string
    description: ISO код валюты
  docCount:
    type: integer
    description: Количество документов
    format: int32
  totalAmount:
    type: number
    description: Сумма по всем документам
description: Результат обработки группы документов фонового процесса импорта
