put:
  tags:
  - API принятия заявки на присоединение к соглашению о подключении к ЛК МП (Заявл 1). Клиентская часть.
  summary: Обновление заявки
  description: 'Привилегии: LKMP.OFFER.UPDATE'
  operationId: update
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/offer/UpdateCommandLkmpOfferRequestDtoUUID.yaml
    required: true
  responses:
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '200':
      description: OK
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/offer/CreateResponseLkmpOfferRequestDto.yaml
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
