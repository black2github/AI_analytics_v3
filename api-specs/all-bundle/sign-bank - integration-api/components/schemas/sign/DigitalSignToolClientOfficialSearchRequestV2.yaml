required:
- certIds
- userId
type: object
properties:
  userId:
    type: string
    description: ID пользователя
    format: uuid
  certIds:
    maxItems: 1000
    minItems: 1
    uniqueItems: true
    type: array
    description: ID сертификатов
    items:
      type: string
      description: ID сертификатов
      format: uuid
description: Запрос поиска ID представителей клиентов по ID пользователя и ID сертификатов
