type: object
properties:
  batchErrors:
    uniqueItems: true
    type: array
    description: Коды ошибок валидации batch-запроса
    items:
      type: string
      description: Типы ошибок валидации batch-запроса
      enum:
      - NOT_FOUND
      - ISSUER_CERTIFICATE_NOT_FOUND
      - INVALID_SIGNATURE
      - INVALID_DOCTYPE
      - USER_NOT_EIO
      - USER_NOT_OFFICIAL
      - CERTIFICATE_NOT_VALID
      - CM_INTEGRATION_ERROR
      - NOT_FNS_CA
  certificateErrors:
    type: object
    additionalProperties:
      type: string
      description: Типы ошибок валидации batch-запроса
      enum:
      - NOT_FOUND
      - ISSUER_CERTIFICATE_NOT_FOUND
      - INVALID_SIGNATURE
      - INVALID_DOCTYPE
      - USER_NOT_EIO
      - USER_NOT_OFFICIAL
      - CERTIFICATE_NOT_VALID
      - CM_INTEGRATION_ERROR
      - NOT_FNS_CA
