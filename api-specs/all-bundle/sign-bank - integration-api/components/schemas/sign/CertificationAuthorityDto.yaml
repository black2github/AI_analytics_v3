type: object
properties:
  id:
    type: string
    description: Идентификатор
    format: uuid
  name:
    type: string
    description: Наименование УЦ
  ogrn:
    type: string
    description: ОГРН
  inn:
    type: string
    description: ИНН
  address:
    $ref: ./AddressDto.yaml
  registryNumber:
    type: string
    description: Реестровый номер
  trusted:
    type: boolean
    description: Доверять сертификатам УЦ
  accredited:
    type: boolean
    description: Аккредитованный УЦ
  actionStatus:
    type: string
    description: Статус действия УЦ
    enum:
    - WORK
    - SUSPENDED
    - TERMINATED
    - NOT_WORK
  certType:
    type: string
    description: Тип сертификата
    enum:
    - QUALIFIED_SIGN
    - UNQUALIFIED_SIGN
description: Удостоверяющий центр
