post:
  tags:
  - Интеграционное API по сертификатам
  summary: Создать или обновить сертификат клиента из base64 данных
  description: 'Привилегии: INTEGRATION_CREATE_OR_UPDATE_CERT_BY_RAW'
  operationId: createOrUpdateByRaw
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/sign/CreateCertificateRequest.yaml
    required: true
  responses:
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '200':
      description: OK
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/sign/GenericResponseSimpleErrorDataCertificateDto.yaml
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
  security: []
