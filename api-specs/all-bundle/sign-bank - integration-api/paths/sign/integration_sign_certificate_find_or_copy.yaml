post:
  tags:
  - Интеграционное API по сертификатам
  summary: Найти сертификаты пользователя или создать новые путем копирования
  description: 'Привилегии: INTEGRATION_FIND_OR_COPY_CERTIFICATE'
  operationId: findOrCopy
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/sign/CopyCertificateRequest.yaml
    required: true
  responses:
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '200':
      description: OK
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/sign/GenericResponseSimpleErrorDataSetCertificateDto.yaml
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
  security: []
