post:
  tags:
  - Интеграционное API для работы с сертификатами ПлЦР.
  summary: Получить последний действующий сертификат организации по идентификаторам клиента банка и пользователя
  description: 'Привилегии: DRUB.TECH.CERTIFICATE_VIEW'
  operationId: findLastActualPcrParticipantCertificate
  parameters:
  - name: bankClientId
    in: query
    required: true
    schema:
      type: string
      format: uuid
  - name: userId
    in: query
    required: true
    schema:
      type: string
      format: uuid
  responses:
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '200':
      description: OK
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/GenericResponseDigitalRubleErrorPcrParticipantCertificateDto.yaml
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
