required:
- bankClientId
- bankClientOfficialId
- certificateBody
- certificateType
- endDateTime
- id
- pcrParticipantWalletId
- privateKeyEndDate
- privateKeyStartDate
- registrationRequestId
- revocationRequestId
- serialNumber
- startDateTime
- status
- userId
type: object
properties:
  pcrParticipantWalletId:
    type: string
    description: Идентификатор цифрового кошелька организации
    format: uuid
  id:
    type: string
    description: Идентификатор сертификата
    format: uuid
  bankClientId:
    type: string
    description: Идентификатор Клиента Банка
    format: uuid
  bankClientOfficialId:
    type: string
    description: Ссылка на сущность Представитель Клиента Банка
    format: uuid
  registrationRequestId:
    type: string
    description: Идентификатор заявки, в рамках которой был выпущен сертификат
    format: uuid
  revocationRequestId:
    type: string
    description: Идентификатор заявки, в рамках которой был отозван сертификат
    format: uuid
  startDateTime:
    type: string
    description: Дата начала действия сертификата
    format: date-time
  endDateTime:
    type: string
    description: Дата окончания действия сертификата
    format: date-time
  privateKeyStartDate:
    type: string
    description: Дата начала действия закрытого ключа
    format: date-time
  privateKeyEndDate:
    type: string
    description: Дата окончания действия закрытого ключа
    format: date-time
  serialNumber:
    type: string
    description: Серийный номер сертификата
  certificateBody:
    type: string
    description: Тело сертификата
  status:
    type: string
    description: Статус сертификата
    enum:
    - INITIAL
    - VERIFIED
    - COMPLETED
    - REJECTED
    - REVOKE_IN_PROGRESS
    - REVOKED
    - REVOKE_ERROR
    - EXPIRED
  userId:
    type: string
    description: Идентификатор Пользователя
    format: uuid
  certificateType:
    type: string
    description: Тип сертификата
    enum:
    - FI_PROCESSING
    - FI_CONTROL
    - CB_DEPO
    - CB_CONTROL
    - CB_CA
    - FI_CA
    - CLIENT
  userFio:
    type: string
    description: Пользователь
  name:
    type: string
    description: Наименование организации
  inn:
    type: string
    description: ИНН
  cbrParticipantWalletId:
    type: string
    description: Идентификатор цифрового кошелька организации в ЦБ
description: Сертификат ЦР
