get:
  tags:
  - Скачивание вложений без авторизации
  summary: Потоковая выгрузка видео из неавторизованной зоны
  operationId: downloadPublicVideoFileUsingGET
  produces:
  - '*/*'
  parameters:
  - name: firstPos
    in: query
    required: false
    type: integer
    format: int64
  - name: id
    in: query
    description: id
    required: true
    type: string
    format: uuid
  - name: lastPos
    in: query
    required: false
    type: integer
    format: int64
  responses:
    '200':
      description: OK
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not Found
  security:
  - Bearer: []
  deprecated: false
