get:
  tags:
  - Скачивание вложений без авторизации
  summary: Выгрузка файла из неавторизованной зоны
  operationId: downloadPublicFileUsingGET
  produces:
  - '*/*'
  parameters:
  - name: id
    in: query
    description: id
    required: true
    type: string
    format: uuid
  responses:
    '200':
      description: OK
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not Found
  security:
  - Bearer: []
  deprecated: false
