get:
  tags:
  - Работа с аттачами
  summary: Download файла
  operationId: downloadByGetUsingGET
  produces:
  - '*/*'
  parameters:
  - name: accessToken
    in: header
    description: accessToken
    required: true
    type: string
  - name: firstPos
    in: query
    required: false
    type: integer
    format: int64
  - name: id
    in: path
    description: id
    required: true
    type: string
    format: uuid
  - name: lastPos
    in: query
    required: false
    type: integer
    format: int64
  responses:
    '200':
      description: OK
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not Found
  security:
  - Bearer: []
  deprecated: false
