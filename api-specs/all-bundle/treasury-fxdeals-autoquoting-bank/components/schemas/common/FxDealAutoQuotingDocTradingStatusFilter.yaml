type: object
properties:
  contains:
    type: string
  notContains:
    type: string
  eq:
    type: string
    enum:
    - NONE
    - PROCESSED
    - REJECTED
    - CANCELED
    - PARTIALLY_EXECUTED
    - EXECUTED
  notEq:
    type: string
    enum:
    - NONE
    - PROCESSED
    - REJECTED
    - CANCELED
    - PARTIALLY_EXECUTED
    - EXECUTED
  in:
    type: array
    items:
      type: string
      enum:
      - NONE
      - PROCESSED
      - REJECTED
      - CANCELED
      - PARTIALLY_EXECUTED
      - EXECUTED
  notIn:
    type: array
    items:
      type: string
      enum:
      - NONE
      - PROCESSED
      - REJECTED
      - CANCELED
      - PARTIALLY_EXECUTED
      - EXECUTED
  isNull:
    type: boolean
description: Торговый статус заявки
