  - API для электронной формы "Мобильная связь"
  summary: Отправить уведомление по заявке
  description: 'Привилегии: GPB_MOBILE_VIEW'
  operationId: send
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/send/GenericCommandSendMobileRequestDto.yaml
