get:
  description: 'Привилегии: ADM_POC.LIST'
  operationId: getPocDetails
  parameters:
  - in: path
    name: bankClientId
    required: true
    schema:
      type: string
      format: uuid
  - in: path
    name: mainTid
    required: true
    schema:
      type: integer
      format: int64
  responses:
    '200':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/{bankClientId}/GenericResponseSimpleErrorDataAdmPocMasterDto.yaml
      description: OK
    '400':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
      description: Bad Request
    '401':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
      description: Unauthorized
    '403':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
      description: Forbidden
    '405':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
      description: Method Not Allowed
    '415':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
      description: Unsupported Media Type
    '423':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
      description: Locked
    '500':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
      description: Internal Server Error
  summary: Получить информацию по АДМ
  tags:
  - API получения информации по Договору АДМ
