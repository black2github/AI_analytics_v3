post:
  tags:
  - Конверсионные сделки в режиме автокотирования
  summary: Создание нового документа или обновление существующего документа
  description: 'Привилегии: hasAuthority(''TREASURY_COMMON'') AND hasAuthority(''TREASURY_FX_DEALS_AUTOQUOTING_COMMON'')'
  operationId: createOrUpdate
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/fx-deal/GenericCommandFxDealAutoQuotingDocDto.yaml
    required: true
  responses:
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/SingleResponseObject.yaml
    '200':
      description: OK
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/fx-deal/CreateResponseFxDealAutoQuotingDocDto.yaml
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
