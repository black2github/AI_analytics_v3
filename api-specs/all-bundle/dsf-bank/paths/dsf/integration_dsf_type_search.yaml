post:
  description: 'Привилегии: DSF_TYPE.SEARCH'
  operationId: search
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/dsf/DsfTypeFilter.yaml
    required: true
  responses:
    '200':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/dsf/GenericResponseErrorDataListDsfTypeDto.yaml
      description: OK
    '400':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/GenericResponseErrorDataObject.yaml
      description: Bad Request
    '401':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
      description: Unauthorized
    '403':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
      description: Forbidden
    '415':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
      description: Unsupported Media Type
    '423':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
      description: Locked
    '500':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
      description: Internal Server Error
  summary: Поиск типов ДСФ
  tags:
  - API для работы с типами ДСФ
