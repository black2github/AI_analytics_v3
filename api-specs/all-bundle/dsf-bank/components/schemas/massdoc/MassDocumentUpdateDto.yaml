type: object
description: Массовая рассылка. ДТО на обновление
properties:
  attachmentIds:
    type: array
    description: Список вложений
    items:
      type: string
      format: uuid
  bankClientIds:
    type: array
    description: Список получателей добавленных вручную.
    items:
      type: string
      format: uuid
  branchId:
    type: string
    format: uuid
    description: Идентификатор подразделения.
  branchIds:
    type: array
    description: Список подразделений.
    items:
      type: string
      format: uuid
  clientsWithForeignCurrencyOnly:
    type: boolean
    description: Только клиенты с валютными счетами
  commentForBank:
    type: string
    description: Комментарий для Банка.
  excludeClientIds:
    type: array
    description: Список получателей для исключения.
    items:
      type: string
      format: uuid
  excludeClients:
    type: boolean
    description: Исключить клинтов
  excludeFileId:
    type: string
    format: uuid
    description: Идентификатор файла со списком получателей для исключения
  excludeFileName:
    type: string
    description: Имя файла со списком получателей для исключения
  id:
    type: string
    format: uuid
    description: Идентификатор массовой рассылки.
  importFileId:
    type: string
    format: uuid
    description: Идентификатор файла со списком получателей
  importFileName:
    type: string
    description: Имя файла со списком получателей
  message:
    type: string
    description: Текст письма.
  mode:
    type: string
    description: Режим добавления получателей.
    enum:
    - ALL
    - MANUAL
    - IMPORT
    - INDIVIDUAL
  subject:
    type: string
    description: Тема письма.
  typeCode:
    type: string
    description: Код типа письма.
  version:
    type: integer
    format: int32
    description: Текущая версия массовой рассылки.
