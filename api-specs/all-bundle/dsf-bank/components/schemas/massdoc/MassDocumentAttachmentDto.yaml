type: object
description: Вложение массовой рассылки
properties:
  accessToken:
    type: string
    description: Access token для файла.
  attachedAt:
    type: string
    format: date-time
    description: Дата и время вложения.
  attachmentId:
    type: string
    format: uuid
    description: Уникальный идентификатор вложения в Системе.
  author:
    type: string
    format: uuid
    description: Автор вложения.
  authorFio:
    type: string
    description: ФИО автора вложения.
  contentType:
    type: string
    description: Тип файла.
    example: application/pdf
  extension:
    type: string
    description: Расширение файла.
    example: pdf
  fileHash:
    type: string
    description: Хеш файла.
  fileName:
    type: string
    description: Наименование файла вложения.
  fileSize:
    type: integer
    format: int64
    description: Размер файла, байты.
  id:
    type: string
    format: uuid
    description: Уникальный идентификатор вложения.
  owner:
    type: string
    format: uuid
    description: Владелец вложения.
  side:
    type: string
    description: Сторона вложения.
    enum:
    - CLIENT
    - BANK
  type:
    type: string
    description: Тип вложения.
    enum:
    - REGULAR
    - MCHD
