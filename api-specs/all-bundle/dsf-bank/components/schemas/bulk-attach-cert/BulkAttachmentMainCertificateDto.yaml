type: object
description: Сертификаты для подписи при автоматической рассылке.
properties:
  bankCertificateId:
    type: string
    format: uuid
    description: Ссылка на сущность "Сертификат пользователя банка".
  branches:
    type: array
    description: Ссылка на сущность "Филиал Банка".
    items:
      $ref: ../common/BulkAttachmentCertificateBranchDto.yaml
  catalogId:
    type: string
    format: uuid
    description: Ссылка на сущность "Настройки для массовой рассылки ДСФ из банка для определенного каталога".
  certificateId:
    type: string
    format: uuid
    description: Ссылка на сущность "Сертификаты ЭП".
  comment:
    type: string
    description: Комментарий.
  containerPassword:
    type: string
    description: Пароль от ключевого контейнера.
  dateEnd:
    type: string
    format: date
    description: 'Период действия сертификата: по.'
  dateStart:
    type: string
    format: date
    description: 'Период действия сертификата: с.'
  massDocCert:
    type: boolean
    description: Сертификат массовой рассылки
  ownerFio:
    type: string
    description: Владелец сертификата.
  ownerId:
    type: string
    format: uuid
    description: Id владельца сертификата.
  serialNumber:
    type: string
    description: Серийный номер.
  validFrom:
    type: string
    format: date-time
    description: Дата и время начала действия сертификата из справочника "Сертификаты ЭП".
  validTo:
    type: string
    format: date-time
    description: Дата и время окончания действия сертификата из справочника "Сертификаты ЭП".
  whomIssued:
    type: string
    description: Издатель.
required:
- bankCertificateId
- catalogId
- certificateId
- dateStart
- massDocCert
