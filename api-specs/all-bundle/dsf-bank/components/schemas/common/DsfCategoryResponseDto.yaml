type: object
description: Категория ДСФ. Возвращаемая ДТО
properties:
  code:
    type: string
    description: Код категории
  comment:
    type: string
    description: Пользовательский комментарий при изменении записи
  createdAt:
    type: string
    format: date-time
    description: Время создания
  creatorFio:
    type: string
    description: ФИО Пользователя, создавшего запись
  creatorLogin:
    type: string
    description: Логин Пользователя, создавшего запись
  id:
    type: string
    format: uuid
    description: Идентификатор категории.
  name:
    type: string
    description: Наименование категории
  nameEn:
    type: string
    description: Наименование категории на английском
  updatedAt:
    type: string
    format: date-time
    description: Время последнего изменения
  updaterFio:
    type: string
    description: ФИО Пользователя, внёсшего последнее изменение
  updaterLogin:
    type: string
    description: Логин Пользователя, внёсшего последнее изменение
required:
- code
- name
