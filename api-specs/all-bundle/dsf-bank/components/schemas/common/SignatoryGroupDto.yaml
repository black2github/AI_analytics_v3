type: object
description: Группа подписантов
properties:
  code:
    type: string
    description: Уникальный код группы.
  comment:
    type: string
    description: Пользовательский комментарий при добавлении/редактировании записи.
  createdAt:
    type: string
    format: date-time
    description: Дата и время создания записи.
  id:
    type: string
    format: uuid
    description: Уникальный идентификатор группы.
  name:
    type: string
    description: Уникальное имя группы.
  notifiablePeople:
    type: array
    description: Список оповещаемых.
    items:
      $ref: ./NotifiablePersonDto.yaml
  signatoryPeople:
    type: array
    description: Список подписантов.
    items:
      $ref: ./SignatoryPersonDto.yaml
  updateInfo:
    $ref: ./UpdateInfoDto.yaml
    description: Информация о пользователях при добавлении/редактировании записи.
  updatedAt:
    type: string
    format: date-time
    description: Дата и время последнего изменения записи.
