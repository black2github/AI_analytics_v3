type: object
description: Настройки для массовой рассылки ДСФ из банка для определенного каталога.
properties:
  absId:
    type: string
    description: РНК получателя (РНК клиента в РКО Ф1).
  autoSend:
    type: boolean
    description: Автоматическая отправка письма.
  catalogPathBlocks:
    type: array
    description: Блоки путей до каталогов авторассылки.
    items:
      $ref: ./CatalogPathBlock.yaml
  checkBeforeSend:
    type: boolean
    description: Выполнять проверку файлов перед отправкой.
  copyCatalogPath:
    type: string
    description: Путь до каталога, в который копируются файлы в ДБО BSS20.
  dsfTypeId:
    type: string
    format: uuid
    description: Идентификатор типа письма.
  errorSendEmails:
    type: string
    description: Адреса для уведомления сотрудников об ошибках рассылки.
  failDaysClear:
    type: integer
    format: int32
    description: Кол-во дней глубины очистки для неуспешно обработанных файлов.
  filialId:
    type: string
    format: uuid
    description: Код филиала-отправителя.
  id:
    type: string
    format: uuid
    description: Уникальный идентификатор настройки каталога.
  massDocConfiguration:
    type: boolean
    description: Настройка сертификата для массовой рассылки.
  message:
    type: string
    description: Текст письма.
  modeFileProcessing:
    type: string
    description: Режим обработки файла.
    enum:
    - MASK
    - CATALOG
    - SETTINGS
  needMailing:
    type: boolean
    description: Признак необходимости рассылки из каталога.
  subject:
    type: string
    description: Тема письма.
  successDaysClear:
    type: integer
    format: int32
    description: Кол-во дней глубины очистки для успешно обработанных файлов.
required:
- dsfTypeId
- needMailing
