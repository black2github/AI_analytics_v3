type: object
description: ДТО на заполнение дополнительных AML-полей вложений писем из банка
properties:
  bankDeadlineAt:
    type: string
    format: date-time
    description: Срок предоставления ответа, установленный банком
  bankDeadlineType:
    type: string
    description: Тип срока предоставления ответа, установленный банком
    enum:
    - URGENT
    - STANDARD
    - INDIVIDUAL
  bankDelayDecision:
    type: string
    description: Решение банка по запросу отсрочки
    enum:
    - ACCEPT
    - DECLINE
  bankDocActivityDetailsComment:
    type: array
    description: Комментарии банка к Пояснения по деятельности/операции
    items:
      type: string
  bankDocActivityInfoComment:
    type: array
    description: Комментарии банка к Документы компании по деятельности
    items:
      type: string
  bankDocFinPositionComment:
    type: array
    description: Комментарии банка к Документы и сведения о финансовом положении. Налоговая отчетность (декларации)
    items:
      type: string
  bankDocMaterialResInfoComment:
    type: array
    description: Комментарии банка к Документы и сведения о материально-ресурсной базе компании
    items:
      type: string
  bankDocMetalCollectComment:
    type: array
    description: Комментарии банка к Документы и сведения по компаниям ломозаготовителям
    items:
      type: string
  bankDocStaffInfoComment:
    type: array
    description: Комментарии банка к Документы и сведения о штате/сотрудниках компании
    items:
      type: string
  bankDocTransElectronicServComment:
    type: array
    description: Комментарии банка к Документы и сведения по транзакциям, проводимым через электронные сервисы (СБП, эквайринг)
    items:
      type: string
  bankDocTransactionsInfoComment:
    type: array
    description: Комментарии банка к Документы и сведения по операциям с контрагентами
    items:
      type: string
  bankOtherDocumentsComment:
    type: array
    description: Комментарии банка к Иные документы
    items:
      type: string
  bankPurposeType:
    type: string
    description: Назначение письма
    enum:
    - INITIAL_REQUEST
    - DUTY_REQUEST
    - DUTY_REQUEST_FINAL
    - DEFERMENT_DECISION
    - FINAL
required:
- bankPurposeType
