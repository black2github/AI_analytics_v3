type: object
description: Документ из банка. ДТО на обновление.
properties:
  accountId:
    type: string
    format: uuid
    description: Идентификатор счета.
  accountNumber:
    type: string
    description: Расчетный счет.
  aml:
    $ref: ./AmlDocumentFromBankDto.yaml
    description: Дополнительные AML-поля
  attachmentIds:
    type: array
    description: Список вложений
    items:
      type: string
      format: uuid
  bankClientId:
    type: string
    format: uuid
    description: Идентификатор информации о клиенте банка.
  branchId:
    type: string
    format: uuid
    description: Идентификатор подразделения.
  commentForBank:
    type: string
    description: Комментарий для Банка.
  commentForClient:
    type: string
    description: Комментарий для Клиента.
  contactId:
    type: string
    format: uuid
    description: Идентификатор пользователя контактного лица.
  dialogId:
    type: string
    description: ID группы связанных писем.
  email:
    type: string
    description: Адрес электронной почты.
  fio:
    type: string
    description: ФИО контактного лица клиента.
  fromBankId:
    type: string
    format: uuid
    description: Ссылка на документ из банка, на основании которого создается текущий документ.
  isNotifyByPhone:
    type: boolean
    description: Уведомить меня об исполнении по номеру телефона.
  mchdAttachmentIds:
    type: array
    description: Список идентификаторов МЧД вложений.
    items:
      type: string
      format: uuid
  message:
    type: string
    description: Текст письма.
  phone:
    type: string
    description: Номер мобильного телефона.
  subject:
    type: string
    description: Тема письма.
  typeCode:
    type: string
    description: Код типа письма.
  version:
    type: integer
    format: int32
    description: Текущая версия документа в банк.
