type: object
properties:
  id:
    type: string
    description: Идентификатор заявки
    format: uuid
  createdAt:
    type: string
    description: Время создания
    format: date-time
  updatedAt:
    type: string
    description: Время обновления
    format: date-time
  requestNumber:
    type: integer
    description: Номер заявки
    format: int32
  requestDate:
    type: string
    description: Дата заявки
    format: date
  status:
    type: string
    description: Статус заявки на резервирование счетов
    enum:
    - NONE
    - DRAFT
    - NEW
    - DELETED
    - DELIVERED
    - RECEIVED
    - EXPORT_TO_F1
    - EXPORTED_TO_F1
    - EXPORT_TO_F1_ERROR
    - PARTLY_EXECUTED
    - EXECUTED
    - REJECTED
    - EXPORTED_TO_F1_OR_EXPORT_TO_F1_ERROR
    - EXECUTED_OR_PARTLY_EXECUTED
  userId:
    type: string
    description: Пользователь, создавший заявку
    format: uuid
  client:
    $ref: ../common/BankClientDto.yaml
  branchId:
    type: string
    description: Филиал и подразделение банка
    format: uuid
  accountsInfo:
    type: array
    description: Информация о счетах
    items:
      $ref: ../common/AccountsInfoDto.yaml
description: ДТО заявки на резервирование счетов 2.0 для ГС
