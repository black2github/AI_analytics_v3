put:
  tags:
  - Базовые операции справочника подсказок. Банковская часть.
  summary: Редактирование подсказки
  description: 'Привилегии: CURRENCY_TRANSFER_CURRENCY_HINT_BANK_UPDATE'
  operationId: edit
  parameters:
  - name: deactivateExisting
    in: query
    required: false
    schema:
      type: boolean
      default: false
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/currency-hint/CurrencyHintBankEditDto.yaml
    required: true
  responses:
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '200':
      description: OK
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/currency-hint/GenericResponseSimpleErrorDataCurrencyHintBankViewDto.yaml
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
