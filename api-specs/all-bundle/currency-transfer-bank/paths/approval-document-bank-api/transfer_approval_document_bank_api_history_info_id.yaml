get:
  tags:
  - Универсальное API визирования для стороны банка.
  - Банковский API операций визирования валютного перевода
  summary: Получить историю операций по документу.
  description: 'Привилегии: APPROVAL_SIGN.BANK.DOCS_FOR_APPROVAL_VIEW, CURRENCY_TRANSFER_BANK_HISTORY_VIEW'
  operationId: getDocumentHistory
  parameters:
  - name: id
    in: path
    description: Id документа
    required: true
    schema:
      type: string
      format: uuid
  responses:
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '200':
      description: OK
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/approval-document-bank-api/GenericResponseSimpleErrorDataListDocumentHistoryBankDto.yaml
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
