type: object
properties:
  id:
    type: string
    description: Идентификатор подсказки
    format: uuid
  code:
    type: string
    description: ISO код валюты
  numericCode:
    type: string
    description: Цифровой код валюты
  name:
    type: string
    description: Наименование валюты
  isActive:
    type: boolean
    description: Активность подсказки
  createdAt:
    type: string
    description: Дата и время создания записи
    format: date-time
  createdUser:
    $ref: ./UserDto.yaml
  updatedAt:
    type: string
    description: Дата и время обновления записи
    format: date-time
  updatedUser:
    $ref: ./UserDto.yaml
  comment:
    type: string
    description: Комментарий
description: Транспортное представление строки данных справочника подсказок в скроллере на банковской стороне
