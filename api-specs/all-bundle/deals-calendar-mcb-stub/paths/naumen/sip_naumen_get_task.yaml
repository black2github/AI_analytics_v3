post:
  tags:
  - СИП. Сервис Naumen
  summary: Сервис получения карточки активности в рамках календарей Юр. Лиц
  operationId: getTaskUsingPOST
  consumes:
  - application/json
  produces:
  - '*/*'
  parameters:
  - name: body.data.taskId
    in: query
    description: Идентификатор задачи
    required: false
    type: integer
    format: int64
  - name: body.meta.channel
    in: query
    description: Канал
    required: false
    type: string
    enum:
    - ECO
  - name: method
    in: query
    required: false
    type: string
    enum:
    - DELETE
    - GET
    - HEAD
    - OPTIONS
    - PATCH
    - POST
    - PUT
    - TRACE
  - name: type
    in: query
    required: false
    type: string
  - name: url
    in: query
    required: false
    type: string
    format: uri
  responses:
    '200':
      description: OK
      schema:
        $ref: '#/definitions/NaumenGetTaskResponseDto'
    '201':
      description: Created
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not Found
