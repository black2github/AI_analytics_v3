post:
  tags:
  - Интеграционное API заявки на выпуск/регистрацию ЭП
  summary: Получить статусы заявок на ЭП по идентификаторам ФЛ в ЕСК.
  description: 'Привилегии: CERT_ENROLL.TECH.REQUESTS_VIEW'
  operationId: getRequestStatuses
  requestBody:
    content:
      application/json:
        schema:
          uniqueItems: true
          type: array
          items:
            $ref: ../../components/schemas/misc/RequestStatusesRequestDto.yaml
    required: true
  responses:
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '200':
      description: OK
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/misc/GenericResponseSimpleErrorDataListRequestStatusesDto.yaml
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
