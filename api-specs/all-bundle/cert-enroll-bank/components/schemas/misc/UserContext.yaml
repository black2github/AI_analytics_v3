type: object
properties:
  id:
    type: string
    format: uuid
  sessionId:
    type: string
    format: uuid
  publicSessionId:
    type: string
    format: uuid
  clientId:
    type: string
  userType:
    type: string
    enum:
    - CLIENT
    - BANK
    - TECHNICAL
  catalog:
    type: string
  accessToken:
    type: string
  scopes:
    uniqueItems: true
    type: array
    items:
      type: string
  authorities:
    uniqueItems: true
    type: array
    items:
      type: string
  userAuthorities:
    $ref: ./UserAuthorities.yaml
  contexts:
    uniqueItems: true
    type: array
    items:
      type: string
  contextParams:
    type: array
    items:
      type: object
      additionalProperties:
        type: object
  passedFactors:
    uniqueItems: true
    type: array
    items:
      type: string
  defaultSignCertificateId:
    type: string
    format: uuid
  mobileApp:
    type: boolean
  deviceId:
    type: string
  localeCode:
    type: string
  organizationId:
    type: string
    format: uuid
  techUser:
    type: boolean
  bankUser:
    type: boolean
  clientUser:
    type: boolean
