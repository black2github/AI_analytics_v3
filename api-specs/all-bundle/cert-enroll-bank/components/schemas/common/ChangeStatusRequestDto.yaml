type: object
properties:
  requestIds:
    uniqueItems: true
    type: array
    description: Список идентификаторов заявок для смены статуса
    items:
      type: string
      description: Список идентификаторов заявок для смены статуса
      format: uuid
  bankComment:
    type: string
    description: Комментарий для сотрудника банка
  clientComment:
    type: string
    description: Комментарий для клиента
  action:
    type: string
    description: Действие
    enum:
    - CONTINUE_EXECUTION
    - REJECT_REQUEST
    - RETRY_PROCESSING
    - CHANGE_STATUS_TO_DELIVERED
    - CHANGE_STATUS_TO_EXPORT_TO_UC
    - CHANGE_STATUS_TO_AUTH_PERSON_CHECK
description: Запрос на изменение статуса заявлений ГЭП/РЭП
