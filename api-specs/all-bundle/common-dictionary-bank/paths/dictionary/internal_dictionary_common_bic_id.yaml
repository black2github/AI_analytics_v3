  - API для справочника БИК
  summary: Получить БИК по идентификатору
  description: 'Привилегии: hasAuthority(''BIC_GET_BY_ID'')'
  operationId: getByIdUsingGET
  produces:
  - '*/*'
  parameters:
  - name: id
    in: path
    description: id
    required: true
    type: string
    format: uuid
  responses:
    '200':
      description: OK
      schema:
        $ref: '#/definitions/ActionResult«SingleResponse«BicDto»»'
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not Found
