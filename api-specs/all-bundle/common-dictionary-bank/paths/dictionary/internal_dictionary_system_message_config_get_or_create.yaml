get:
  tags:
  - Справочник текстов ошибок
  summary: Получить сообщение системы по типу, методу и коду или создать новое сообщение, в случае отсутствия
  description: 'Привилегии: hasAuthority(''EXT_SYS_MESSAGE.CREATE'')'
  operationId: getOrCreateByTypeMethodAndCodeUsingGET
  produces:
  - '*/*'
  parameters:
  - name: code
    in: query
    description: Код ошибки
    required: true
    type: string
    allowEmptyValue: false
  - name: method
    in: query
    description: Метод, вызываемый во внешней системе
    required: true
    type: string
    allowEmptyValue: false
  - name: text
    in: query
    description: Текст исходного сообщения
    required: false
    type: string
    allowEmptyValue: false
  - name: type
    in: query
    description: Тип документа/функционала
    required: true
    type: string
    allowEmptyValue: false
  responses:
    '200':
      description: OK
      schema:
        $ref: '#/definitions/SingleResponse«Сообщение сторонней системы»'
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not Found
  security:
  - Bearer: []
  deprecated: false
