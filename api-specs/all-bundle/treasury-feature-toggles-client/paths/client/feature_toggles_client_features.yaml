get:
  tags:
  - Treasury Feature Toggles. Клиентская часть.
  summary: Получить перечень переключателей функционала
  description: 'Привилегии: ((#eco.userTypeIs(''CLIENT'')  AND hasAuthority(''TREASURY_COMMON'')) OR #eco.userTypeIs(''BANK'') OR #eco.userTypeIs(''TECHNICAL''))'
  operationId: features
  responses:
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '200':
      description: OK
      content:
        '*/*':
          schema:
            type: object
            additionalProperties:
              type: boolean
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
