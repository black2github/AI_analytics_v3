type: object
properties:
  firstName:
    type: string
    description: Имя
  lastName:
    type: string
    description: Фамилия
  middleName:
    type: string
    description: Отчество
  birthDate:
    type: string
    description: Дата рождения
    format: date
  birthPlace:
    type: string
    description: Место рождения
  phone:
    maxLength: 16
    type: string
    description: Номер телефона ГПБ БО
  phoneCountryCode:
    type: string
    description: Телефонный код страны
  email:
    type: string
    description: Адрес электронной почты ГПБ БО
  position:
    type: string
    description: Должность
  eskId:
    maxLength: 50
    pattern: ^\d*$
    type: string
    description: Идентификатор сотрудника в ЕСК
  identityDoc:
    $ref: ./IdentityDocumentUpdateDto.yaml
description: Данные по сотруднику
