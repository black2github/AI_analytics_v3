required:
- seriesAndNumber
type: object
properties:
  seriesAndNumber:
    pattern: ^\d{10}$|^$
    type: string
    description: Серия и номер
  subdivisionCode:
    pattern: ^\d{6}$|^$
    type: string
    description: Код подразделения
  issuePlace:
    maxLength: 255
    pattern: ^[ЁА-яё\d\s!"#\$%&'\(\)\*\+,\-\.\/:;<=>?@\\\^_`{¦}~№]*$
    type: string
    description: Место выдачи удостоверения
  issueDate:
    type: string
    description: Дата выдачи
    format: date
  validityPeriod:
    type: string
    description: Срок действия
    format: date
description: Заявка на добавление нового сотрудника. Личные данные. Документ удостоверяющий личность.
