post:
  tags:
  - Получение/обновление списков УЦ/сертификатов
  summary: Обновление списка УЦ из файлов корневых сертификатов x509
  description: 'Привилегии: CERTIFICATE_BANK_UPDATE'
  operationId: updateCertificateAuthorityByX509Files
  requestBody:
    content:
      application/json:
        schema:
          required:
          - file
          type: object
          properties:
            file:
              type: string
              format: binary
  responses:
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '200':
      description: OK
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/sign/GenericResponseSimpleErrorDataSimpleCertificationAuthorityDto.yaml
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
