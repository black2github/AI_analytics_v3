type: object
properties:
  documentId:
    type: string
    description: ИД документа
    format: uuid
  signature:
    type: string
    description: Значение подписи в формате Base64
  signedAt:
    type: string
    description: Дата и время подписи
    format: date-time
  status:
    type: string
    description: Статус облачной подписи документа
    enum:
    - NOT_SIGNED
    - SIGNED
    - ERROR
    - SIGN_NOT_CONFIRMED
description: ДТО информация о подписи документа
