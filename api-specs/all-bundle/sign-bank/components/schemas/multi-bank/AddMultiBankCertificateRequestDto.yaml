required:
- certificate
type: object
properties:
  certificate:
    minLength: 1
    type: string
    description: Тело сертификата в base64
  privateKey:
    type: string
    description: Приватный ключ в PEM формате
  pinCode:
    type: string
    description: пин-код от ключа
  description:
    type: string
    description: Описание записи
description: Запрос добавления сертификата для межбанка
