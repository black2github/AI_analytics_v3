type: object
properties:
  id:
    type: string
    description: Идентификатор записи истории
    format: uuid
  documentId:
    type: string
    description: Ссылка на сущность Заявка на присоединение к соглашению о подключении к ЛК МП
    format: uuid
  changedIn:
    type: string
    description: Дата и время присвоения статуса документу
    format: date-time
  status:
    type: string
    description: Статус документа
  userId:
    type: string
    description: Ссылка на сущность "Пользователь"
    format: uuid
  userType:
    type: string
    description: Тип пользователя
    enum:
    - CLIENT
    - BANK
    - TECHNICAL
  userName:
    type: string
    description: Имя пользователя
  commentForClient:
    type: string
    description: Комментарий для Клиента
  commentForBank:
    type: string
    description: Комментарий для Банка
description: Запись истории изменений заявки на присоединение к соглашению о подключении к ЛК МП (Заявл. 1)
