type: object
properties:
  id:
    type: string
    description: Идентификатор записи
    format: uuid
  documentId:
    type: string
    description: Ссылка на сущность "Заявка на предоставление доступа пользователям к ЛК МП"
    format: uuid
  status:
    type: string
    description: Статус документа
  changedIn:
    type: string
    description: Дата и время присвоения статуса документу
    format: date-time
  userId:
    type: string
    description: Ссылка на сущность "Пользователь"
    format: uuid
  userType:
    type: string
    description: Тип пользователя
    enum:
    - CLIENT
    - BANK
    - TECHNICAL
  userName:
    type: string
    description: Имя пользователя
  commentForClient:
    type: string
    description: Комментарий для Клиента
  commentForBank:
    type: string
    description: Комментарий для Банка
description: История изменений Заявки на предоставление доступа пользователям к ЛК МП
