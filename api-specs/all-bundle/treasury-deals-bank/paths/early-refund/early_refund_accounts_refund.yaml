post:
  tags:
  - API для заявлений на досрочное истребование
  - API для отчета документов уведомление досрочного истребования вклада
  summary: Получение списка счетов для досрочного истребования депозита
  description: 'Привилегии: (#eco.userTypeIs(''CLIENT'') AND hasAuthority(''TREASURY_COMMON'') AND hasAuthority(''TREASURY_ACCOUNTS_COMMON'')) OR ((#eco.userTypeIs(''BANK'') OR #eco.userTypeIs(''TECHNICAL'')) AND hasAuthority(''TREASURY_ACCOUNT_VIEW''))'
  operationId: getAccountsRefund
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/common/GenericCommandAccountRequestDto.yaml
    required: true
  responses:
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/SingleResponseObject.yaml
    '200':
      description: OK
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/early-refund/GenericResponseErrorDataListInvestmentDocAccountDto.yaml
    '409':
      description: Conflict
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/SingleResponse.yaml
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
