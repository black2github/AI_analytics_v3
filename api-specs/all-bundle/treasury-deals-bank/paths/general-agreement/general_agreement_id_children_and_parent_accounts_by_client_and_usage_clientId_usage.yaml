get:
  tags:
  - API для работы с генеральными соглашениями
  summary: Получение списка счетов присоединенных генеральных соглашений и родительского по ИД Клиента
  description: 'Привилегии: (hasAuthority(''TREASURY_COMMON'') OR #eco.userTypeIs(''BANK'') OR #eco.userTypeIs(''TECHNICAL'')) AND hasAuthority(''TREASURY_GENERAL_AGREEMENTS_COMMON'')'
  operationId: getChildrenAndParentAccountsByClientAndUsage
  parameters:
  - name: id
    in: path
    required: true
    schema:
      type: string
      format: uuid
  - name: clientId
    in: path
    required: true
    schema:
      type: string
      format: uuid
  - name: usage
    in: path
    required: true
    schema:
      type: string
      enum:
      - DEPOSIT
      - MNO
      - GSNO
      - FX
  responses:
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/SingleResponseObject.yaml
    '200':
      description: OK
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/general-agreement/GenericResponseErrorDataListGeneralAgreementAccountExtendedDto.yaml
    '409':
      description: Conflict
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/SingleResponse.yaml
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
