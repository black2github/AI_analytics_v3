get:
  tags:
  - API для работы с генеральными соглашениями
  summary: Получение списка счетов генерального соглашения требуемого типа
  description: 'Привилегии: (#eco.userTypeIs(''CLIENT'') AND hasAuthority(''TREASURY_COMMON'') AND hasAuthority(''TREASURY_GENERAL_AGREEMENTS_COMMON'')) OR ((#eco.userTypeIs(''BANK'') OR #eco.userTypeIs(''TECHNICAL'')) AND hasAuthority(''TREASURY_GENERAL_AGREEMENT_VIEW''))'
  operationId: getGeneralAgreementAccountsByClientWebDealingAndUsageAndContractType
  parameters:
  - name: clientWebDealingId
    in: path
    required: true
    schema:
      type: string
      format: uuid
  - name: usage
    in: path
    required: true
    schema:
      type: string
      enum:
      - DEPOSIT
      - MNO
      - GSNO
      - FX
  - name: contractTypes
    in: path
    required: true
    schema:
      type: array
      items:
        type: string
        enum:
        - ACCESSION
        - STANDART
        - INDIVIDUAL
        - ACCESSION_DU
        - INDIVIDUAL_DU
        - STANDART_DU
  responses:
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/SingleResponseObject.yaml
    '200':
      description: OK
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/general-agreement/GenericResponseErrorDataListGeneralAgreementAccountDto.yaml
    '409':
      description: Conflict
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/SingleResponse.yaml
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
