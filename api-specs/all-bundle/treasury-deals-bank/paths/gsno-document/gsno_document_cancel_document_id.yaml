get:
  tags:
  - API для сделок ГСНО
  - API для заявлений об отказе
  summary: Получить заявку по идентификатору
  description: 'Привилегии: (#eco.userTypeIs(''CLIENT'') AND hasAuthority(''TREASURY_COMMON'') AND hasAuthority(''TREASURY_GSNO_DEALS_COMMON'')) OR ((#eco.userTypeIs(''BANK'') OR #eco.userTypeIs(''TECHNICAL'')) AND hasAuthority(''TREASURY_DEALS_INVEST_DOC_VIEW''))'
  operationId: getById_6
  parameters:
  - name: id
    in: path
    required: true
    schema:
      type: string
      format: uuid
  responses:
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/SingleResponseObject.yaml
    '200':
      description: OK
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/gsno-document/GenericResponseErrorDataCancelGSNODocDto.yaml
    '409':
      description: Conflict
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/SingleResponse.yaml
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
