get:
  tags:
  - API для работы со счетами
  summary: Получение списка счетов требуемого типа использования
  description: 'Привилегии: (#eco.userTypeIs(''CLIENT'') AND hasAuthority(''TREASURY_COMMON'') AND hasAuthority(''TREASURY_ACCOUNTS_COMMON'')) OR ((#eco.userTypeIs(''BANK'') OR #eco.userTypeIs(''TECHNICAL'')) AND hasAuthority(''TREASURY_ACCOUNT_VIEW''))'
  operationId: getAccountsByCurrencyAndUsageAndClientWebDealingId
  parameters:
  - name: curr
    in: path
    required: true
    schema:
      type: string
  - name: usage
    in: path
    required: true
    schema:
      type: string
      enum:
      - DEPOSIT_MATURITY
      - DEPOSIT_VALUE
      - FX_SELL
      - FX_BUY
      - INTEREST
      - MNO
  - name: clientWebDealingId
    in: path
    required: true
    schema:
      type: string
      format: uuid
  - name: statuses
    in: path
    required: true
    schema:
      uniqueItems: true
      type: array
      items:
        type: string
        enum:
        - ACTIVE
        - BLOCKED
        - DELETED
  responses:
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/SingleResponseObject.yaml
    '200':
      description: OK
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/account/GenericResponseErrorDataListAccountDto.yaml
    '409':
      description: Conflict
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/SingleResponse.yaml
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
