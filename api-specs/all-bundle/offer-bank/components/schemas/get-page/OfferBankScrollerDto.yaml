type: object
properties:
  id:
    type: string
    description: Идентификатор заявки
    format: uuid
  userId:
    type: string
    description: Пользователь, создавший заявку (Ссылка на сущность "Пользователь")
    format: uuid
  docNumber:
    type: integer
    description: Номер заявки
    format: int32
  docDate:
    type: string
    description: Дата и время создания заявки
    format: date-time
  status:
    type: string
    description: Текущий статус обработки заявки
    enum:
    - NONE
    - DRAFT
    - NEW
    - DELETED
    - SIGNED
    - DELIVERED
    - DETAILS_VALID
    - SIGN_VALID
    - RECEIVED
    - EXPORT_TO_ABS
    - EXPORT_TO_ABS_ERROR
    - ERROR
    - EXECUTED_BY_ABS
    - DENIED
    - EXECUTED
    - ACCEPTED
  clientInfo:
    $ref: ./OfferBankScrollerClientInfoDto.yaml
  requestData:
    $ref: ./OfferBankScrollerRequestDataDto.yaml
  interactionF1:
    $ref: ./OfferBankScrollerInteractionF1Dto.yaml
description: Заявка на акцепт оферты. Банковский скроллер.
