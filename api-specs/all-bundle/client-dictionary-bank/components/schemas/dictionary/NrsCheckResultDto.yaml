type: object
properties:
  clientId:
    type: string
    description: Идентификатор клиента
    format: uuid
  eskId:
    type: string
    description: Идентификатор клиента в ЕСК
  orgName:
    type: string
    description: Наименование организации клиента
  inn:
    type: string
    description: ИНН организации клиента
  checkResult:
    type: string
    description: Результат общей проверки организации
    enum:
    - SUCCESS
    - ERROR
    - WARNING
    - NO_ACCESS
    - BLOCKED
  checks:
    type: array
    description: Список проверок по параметрам организации
    items:
      $ref: ./NrsCheckParamDto.yaml
  clientEmail:
    type: string
    description: Email клиента
  clientPhoneNumber:
    type: string
    description: Номер телефона клиента
description: Проверка подключения HPC для организации
