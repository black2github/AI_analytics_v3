required:
- clientType
- inn
- internationalName
- isResident
- kpp
- ogrn
- regNumber
- tin
type: object
properties:
  userId:
    type: string
    format: uuid
  clientType:
    type: string
    description: 'UL - Юридическое лицо;

      IP - Индивидуальный предприниматель.'
    enum:
    - UL
    - IP
  isResident:
    type: boolean
  inn:
    maxLength: 12
    minLength: 0
    type: string
  kpp:
    maxLength: 9
    minLength: 0
    type: string
    description: Обязательно если isResident = true и clientType = UL.
  ogrn:
    maxLength: 15
    minLength: 0
    type: string
    description: Обязательно если isResident = true.
  regNumber:
    maxLength: 30
    minLength: 0
    type: string
    description: Обязательно если isResident = false.
  tin:
    maxLength: 30
    minLength: 0
    type: string
    description: ТИН. Обязательно если isResident = false.
  fullName:
    maxLength: 255
    minLength: 0
    type: string
    description: Полное наименование.
  shortName:
    maxLength: 160
    minLength: 0
    type: string
    description: Короткое наименование.
  abbreviationName:
    maxLength: 128
    minLength: 0
    type: string
    description: Сокращенное наименование.
  internationalName:
    maxLength: 255
    minLength: 0
    type: string
    description: Международное наименование. Обязательно если isResident = false.
  externalSystemId:
    type: string
    description: ID во внешней системе.
  externalClientGuid:
    type: string
    description: GUID во внешней системе.
    format: uuid
  countryId:
    type: string
    description: ID страны.
    format: uuid
  activityType:
    type: integer
    description: 'Тип организации.

      1 - Организация, находящаяся в федеральной собственности;

      2 - Организация, находящаяся в государственной (кроме федеральной) собственности;

      3 - Негосударственная организация;

      4 - Индивидуальный предприниматель−исполнитель по государственному оборонному заказу.'
    format: int32
    enum:
    - null
  okopf:
    maxLength: 5
    minLength: 0
    type: string
    description: ОКОПФ.
  okfs:
    maxLength: 2
    minLength: 0
    type: string
    description: ОКФС.
  agreed:
    type: boolean
    description: Согласие.
  requestType:
    type: string
    description: Тип документа, для которой выполняется связывание.
