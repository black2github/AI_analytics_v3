    type: string
    description: GUID организации
    format: uuid
  name:
    type: string
    description: Наименование организации
  legalAddress:
    type: string
    description: Адрес регистрации
  isAuthorizationSuccess:
    type: boolean
    description: Признак успеха авторизации
