    in: path
    required: true
    schema:
      type: string
      format: uuid
  - name: remoteSource
    in: path
    required: true
    schema:
      type: string
      enum:
      - BSS_DBO_320
      - ECO
      - RKO_F1
      - ESK
      - SBP
      - TESSA
