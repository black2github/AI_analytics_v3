get:
  tags:
  - Подписанты по счету
  - Клиент Банка (технические методы)
  summary: Получить признак существования активной организации с заданным РНК и типом продукта
  description: 'Привилегии: HAS_BANK_CLIENT_GET_BY_RNK_AND_PRODUCT'
  operationId: hasBankClientByRnkAndProductType
  parameters:
  - name: absId
    in: query
    required: true
    schema:
      type: string
  - name: productType
    in: query
    required: true
    schema:
      type: string
      description: Продукты ГПБ БО
      enum:
      - CONSTITUTION
      - LK_UVED
      - LK_MP
      - TMG
      - GPB_BO
  responses:
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '200':
      description: OK
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/GenericResponseSimpleErrorDataBoolean.yaml
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '405':
      description: Method Not Allowed
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
