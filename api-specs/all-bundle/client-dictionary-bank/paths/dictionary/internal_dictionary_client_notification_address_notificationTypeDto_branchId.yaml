get:
  tags:
  - Справочник адресов для нотификации
  summary: Получить запись по типу нотификации и идентификатору филиала
  description: 'Привилегии: NOTIFICATION_ADDRESS_VIEW'
  operationId: getByNotificationTypeAndBranchId
  parameters:
  - name: notificationTypeDto
    in: path
    required: true
    schema:
      type: string
      enum:
      - ONB_CALL_GROUP
      - ONB_KZ_CALL_GROUP
      - NEP_CALL_GROUP
      - ADM_REQUEST_GROUP
      - ADM_APPROVE_GROUP
      - ADM_TID_GROUP
      - ADM_FEEDBACK_GROUP
      - ENCASHMENT_REQUEST_GROUP
      - ENCASHMENT_APPROVE_GROUP
      - ADM_GPN_GROUP
  - name: branchId
    in: path
    required: true
    schema:
      type: string
      format: uuid
  responses:
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '200':
      description: OK
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/dictionary/SingleResponseNotificationAddressDto.yaml
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '405':
      description: Method Not Allowed
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
