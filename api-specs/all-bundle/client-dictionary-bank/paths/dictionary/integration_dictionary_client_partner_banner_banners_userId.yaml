  - Справочник баннеров партнёров
  summary: Получить список баннеров для указанного пользователя клиента
  description: 'Привилегии: INTEGRATION.PARTNER_BANNER_VIEW'
  operationId: getBanners
  parameters:
  - name: userId
    in: path
    required: true
    schema:
      type: string
      format: uuid
  responses:
