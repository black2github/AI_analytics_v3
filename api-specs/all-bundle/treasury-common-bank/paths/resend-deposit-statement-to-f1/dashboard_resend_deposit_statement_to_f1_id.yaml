get:
  tags:
  - Банковские методы для отчетов дашборда
  summary: Повторно отправить запрос в F1
  description: 'Привилегии: (#eco.userTypeIs(''BANK'') OR #eco.userTypeIs(''TECHNICAL'')) AND hasAuthority(''TREASURY_COMMON_REPORTS_RESEND_TO_F1'')'
  operationId: resendDepositStatementToF1
  parameters:
  - name: id
    in: path
    required: true
    schema:
      type: string
      format: uuid
  responses:
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '200':
      description: OK
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/resend-deposit-statement-to-f1/GenericResponseErrorDataDepositStatementDto.yaml
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
