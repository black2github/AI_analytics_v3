type: object
properties:
  contains:
    type: string
  notContains:
    type: string
  eq:
    type: string
    enum:
    - CREATED
    - EDITED
    - SIGNED_MULTIPLE
    - SENT
  notEq:
    type: string
    enum:
    - CREATED
    - EDITED
    - SIGNED_MULTIPLE
    - SENT
  in:
    type: array
    items:
      type: string
      enum:
      - CREATED
      - EDITED
      - SIGNED_MULTIPLE
      - SENT
  notIn:
    type: array
    items:
      type: string
      enum:
      - CREATED
      - EDITED
      - SIGNED_MULTIPLE
      - SENT
  isNull:
    type: boolean
