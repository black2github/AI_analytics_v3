post:
  tags:
  - СМФТ события
  summary: Выгружает события в СМФТ в ручном режиме
  description: 'Привилегии: UAA.SMFT_EVENT_RETRY_UPLOAD'
  operationId: retryUploadEvents
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/retry-upload/RetryUploadCommand.yaml
    required: true
  responses:
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '200':
      description: OK
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/retry-upload/GenericResponseListOfSimpleErrorsVoid.yaml
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
