post:
  tags:
  - СМФТ события
  summary: Получить окружение пользователя из найденного события
  description: 'Привилегии: UAA.SMFT_EVENT_VIEW'
  operationId: findUserSessionEnvironmentInfo
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/user-environment/UserSessionEnvironmentRequestDto.yaml
    required: true
  responses:
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '200':
      description: OK
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/user-environment/GenericResponseSimpleErrorDataUserSessionEnvironmentDto.yaml
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
