get:
  tags:
  - open-api-web-mvc-resource
  summary: openapiYaml
  operationId: openapiYamlUsingGET
  produces:
  - application/vnd.oai.openapi
  parameters:
  - name: ISO3Country
    in: query
    required: false
    type: string
  - name: ISO3Language
    in: query
    required: false
    type: string
  - in: body
    name: apiDocsUrl
    description: apiDocsUrl
    required: false
    schema:
      type: string
  - name: country
    in: query
    required: false
    type: string
  - name: displayCountry
    in: query
    required: false
    type: string
  - name: displayLanguage
    in: query
    required: false
    type: string
  - name: displayName
    in: query
    required: false
    type: string
  - name: displayScript
    in: query
    required: false
    type: string
  - name: displayVariant
    in: query
    required: false
    type: string
  - name: language
    in: query
    required: false
    type: string
  - name: script
    in: query
    required: false
    type: string
  - name: unicodeLocaleAttributes
    in: query
    required: false
    type: array
    items:
      type: string
    collectionFormat: multi
  - name: unicodeLocaleKeys
    in: query
    required: false
    type: array
    items:
      type: string
    collectionFormat: multi
  - name: variant
    in: query
    required: false
    type: string
  responses:
    '200':
      description: OK
      schema:
        type: string
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not Found
  security:
  - Bearer: []
  deprecated: false
