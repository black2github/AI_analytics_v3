required:
- inquiries
- inquiryAccounts
- inquiryVersion
type: object
properties:
  id:
    type: string
    description: Идентификатор заявки
    format: uuid
    example: null
  version:
    type: integer
    description: Версия
    format: int32
    example: null
  number:
    type: integer
    description: Номер запроса
    format: int32
    example: null
  date:
    type: string
    description: Дата запроса
    format: date-time
    example: null
  status:
    type: string
    description: Статус ЖЦ запроса справок для ЮЛ.
    example: null
    enum:
    - NONE
    - NEW
    - SIGNED
    - DELETED
    - DELIVERED
    - DETAILS_VALID
    - SIGN_VALID
    - RECEIVED
    - EXPORT_REQUEST_TO_ABS
    - EXPORT_REQUEST_TO_ABS_ERROR
    - REQUEST_EXECUTED_BY_ABS
    - COMMISSION_REQUEST_TO_ABS
    - COMMISSION_REQUEST_EXPORTED_TO_ABS
    - COMMISSION_REQUEST_TO_ABS_ERROR
    - COMMISSION_EXECUTED_BY_ABS
    - FILE_REQUEST_TO_ABS
    - FILE_REQUEST_EXPORTED_TO_ABS
    - FILE_REQUEST_TO_ABS_ERROR
    - FILE_EXECUTED_BY_ABS
    - PROCESSING_EXPORT_TO_TESSA
    - PROCESSING_EXPORT_TO_TESSA_ERROR
    - DOC_READY_TO_TESSA
    - EXPORT_TO_TESSA
    - EXPORT_TO_TESSA_ERROR
    - EXECUTED_BY_TESSA
    - EXECUTED
    - REJECTED
  commentForClient:
    type: string
    description: Комментарий для Клиента
    example: null
  userId:
    type: string
    description: Пользователь, создавший запрос (Ссылка на сущность "Пользователь")
    format: uuid
    example: null
  userFio:
    type: string
    description: Пользователь, создавший запрос (ФИО)
    example: null
  bankClient:
    $ref: ./InquiryBankClientResponseDto.yaml
  inquiryAccounts:
    type: array
    description: Сведения о счетах по которым запрашивается справка
    example: null
    items:
      $ref: ./InquiryAccountDto.yaml
  inquiries:
    type: array
    description: Справки, запрашиваемой по запросу для ЮЛ
    example: null
    items:
      $ref: ./InquiryDto.yaml
  commissionInfo:
    $ref: ./CommissionInfoResponseDto.yaml
  signatures:
    type: array
    description: Реквизиты электронной подписи запроса
    example: null
    items:
      $ref: ./InquirySignatureDto.yaml
  otherInfo:
    $ref: ./OtherInfoDto.yaml
  inquiryVersion:
    type: integer
    description: Версия запроса
    format: int32
    example: null
description: Запрос справок для ЮЛ
example: null
