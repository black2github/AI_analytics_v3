type: object
description: Данные обратного вызова запроса на изменение реквизитов организации.
properties:
  operationId:
    type: string
    description: Идентификатор операции на ПЦР (значение из тега ЭС <MsgHdr/OprId>).
  correlationId:
    type: string
    description: Идентификатор для сопоставления.
    minLength: 1
  participantId:
    type: string
    description: Идентификатор Клиента-ЮЛ на ПЦР.
  organisationId:
    type: string
    description: Идентификатор Клиента-ЮЛ в ЕСК.
  participantWalletId:
    type: string
    description: Идентификатор кошелька Клиента-ЮЛ на ПЦР.
  organisationStatus:
    type: string
    description: Код запроса управления статусом Клиента-ФЛ.
    enum:
    - Active
    - Processed
  walletStatus:
    type: string
    description: Код запроса управления статусом кошелька.
    enum:
    - Active
    - Blocked
    - Closed
    - Processed
  changedData:
    $ref: ./ChangedDataDto.yaml
    description: Изменённые данные Клиента-ЮЛ.
  additionalParameters:
    type: object
    additionalProperties: {}
    description: Опциональные дополнительные параметры.
required:
- correlationId
- operationId
- organisationStatus
- participantId
- participantWalletId
- walletStatus
