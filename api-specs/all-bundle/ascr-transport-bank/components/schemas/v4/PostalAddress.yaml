type: object
description: Адрес местонахождения (регистрации) Клиента
properties:
  streetName:
    type: string
    description: Улица
  buildingNumber:
    type: string
    description: Дом (Строение)
  room:
    type: string
    description: Офис (квартира)
  townName:
    type: string
    description: Населенный пункт
  countrySubDivision:
    type: string
