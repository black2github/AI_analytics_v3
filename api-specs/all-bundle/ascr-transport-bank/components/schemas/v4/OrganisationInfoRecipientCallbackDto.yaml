type: object
description: Данные на получение документов (КА-конвертов) Клиента-ЮЛ ПлЦР.
properties:
  operationId:
    type: string
    description: Идентификатор операции на ПЦР (значение из тега ЭС <MsgHdr/OprId>)
  correlationId:
    type: string
    description: Идентификатор для сопоставления
  participantId:
    type: string
    description: Идентификатор организации на ПЛцР
  participantWalletId:
    type: string
    description: Идентификатор кошелька организации на ПЛцР
  organisationId:
    type: string
    description: Идентификатор организации в ЕСК
  albumVersion:
    type: string
    description: Версия альбома, по которому сформировано сообщение
  clientNotificationType:
    type: string
    description: Тип эталона ЭС
  clientNotification:
    type: string
    description: Незашифрованный эталон ЭС
  clientNotificationData:
    $ref: ./ClientNotificationData.yaml
    description: Данные из эталона ЭС, преобразованные в формате JSON для удобства
  additionalAmlCftInfo:
    $ref: ./AdditionalAmlCftInfo.yaml
    description: Данные получателя для контроля ПОД/ФТ
  messageCreationDateTime:
    type: string
    description: Дата и время создания ЭС на ПлЦР
  additionalParameters:
    type: object
    additionalProperties: {}
    description: Опциональные дополнительные параметры.
required:
- additionalAmlCftInfo
- albumVersion
- clientNotification
- clientNotificationData
- clientNotificationType
- correlationId
- messageCreationDateTime
- operationId
- organisationId
- participantId
- participantWalletId
