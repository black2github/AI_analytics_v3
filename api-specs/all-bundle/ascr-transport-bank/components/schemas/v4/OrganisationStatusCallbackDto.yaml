type: object
description: Данные обратного вызова регистрации организации и изменения статуса кошелька ПлЦР/ФП.
properties:
  operationId:
    type: string
    description: Идентификатор операции на ПЦР (значение из тега ЭС <MsgHdr/OprId>).
  correlationId:
    type: string
    description: Идентификатор для сопоставления.
    minLength: 1
  participantId:
    type: string
    description: Идентификатор Клиента-ЮЛ на ПЦР.
  participantWalletId:
    type: string
    description: Идентификатор кошелька Клиента-ЮЛ на ПЦР.
  organisationId:
    type: string
    description: Идентификатор Клиента-ЮЛ в ЕСК.
  albumVersion:
    type: string
    description: Номер версии альбома ЭС ПлЦР
  organisationStatus:
    type: string
    description: Статус Клиента-ЮЛ
    enum:
    - Processed
    - Registered
  walletStatus:
    type: string
    description: Код запроса управления статусом кошелька.
    enum:
    - Active
    - Blocked
    - Closed
    - Processed
  additionalParameters:
    type: object
    additionalProperties: {}
    description: Опциональные дополнительные параметры.
required:
- albumVersion
- correlationId
