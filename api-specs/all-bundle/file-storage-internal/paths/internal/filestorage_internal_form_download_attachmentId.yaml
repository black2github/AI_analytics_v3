post:
  tags:
  - API скачивания файла
  summary: Скачивание файла через form-urlencoded
  description: 'Привилегии: #eco.userTypeIs(''TECHNICAL'') or #eco.userTypeIs(''BANK'')'
  operationId: downloadByFormUrlEncodedUsingPOST
  consumes:
  - application/x-www-form-urlencoded
  produces:
  - '*/*'
  parameters:
  - name: attachmentId
    in: path
    description: attachmentId
    required: true
    type: string
    format: uuid
  - name: attachment_access_token
    in: formData
    description: attachment_access_token
    required: true
    type: string
  responses:
    '200':
      description: OK
    '201':
      description: Created
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not Found
  security:
  - Bearer: []
  deprecated: false
