get:
  tags:
  - Внутренний интерфейс сервиса хранения файлов
  summary: Получение информации об аттачменте
  description: 'Привилегии: #eco.userTypeIs(''TECHNICAL'') or #eco.userTypeIs(''BANK'')'
  operationId: getAttachmentUsingGET
  produces:
  - '*/*'
  parameters:
  - name: id
    in: path
    description: id
    required: true
    type: string
    format: uuid
  responses:
    '200':
      description: OK
      schema:
        $ref: '#/definitions/SingleResponse«InternalAttachmentDto»'
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not Found
  security:
  - Bearer: []
  deprecated: false
delete:
  tags:
  - Внутренний интерфейс сервиса хранения файлов
  summary: Удаление аттачмента
  description: 'Привилегии: #eco.userTypeIs(''TECHNICAL'') or #eco.userTypeIs(''BANK'')'
  operationId: deleteAttachmentUsingDELETE
  produces:
  - '*/*'
  parameters:
  - name: id
    in: path
    description: id
    required: true
    type: string
    format: uuid
  responses:
    '200':
      description: OK
      schema:
        $ref: '#/definitions/SingleResponse«uuid»'
    '204':
      description: No Content
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
  security:
  - Bearer: []
  deprecated: false
