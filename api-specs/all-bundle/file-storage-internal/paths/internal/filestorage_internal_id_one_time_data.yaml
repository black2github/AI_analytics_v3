get:
  tags:
  - API скачивания файла
  summary: Скачать файл однократно без возможности повторного скачивания
  description: 'Привилегии: #eco.userTypeIs(''TECHNICAL'') or #eco.userTypeIs(''BANK'')'
  operationId: downloadOneTimeAttachmentUsingGET
  produces:
  - '*/*'
  parameters:
  - name: accessToken
    in: header
    description: accessToken
    required: true
    type: string
  - name: id
    in: path
    description: id
    required: true
    type: string
    format: uuid
  responses:
    '200':
      description: OK
      schema:
        $ref: '#/definitions/Resource'
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not Found
  security:
  - Bearer: []
  deprecated: false
