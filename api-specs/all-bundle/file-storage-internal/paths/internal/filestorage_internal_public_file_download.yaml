get:
  tags:
  - API скачивания файла
  summary: Скачать публичный файл
  description: 'Привилегии: #eco.userTypeIs(''TECHNICAL'') or #eco.userTypeIs(''BANK'')'
  operationId: downloadPublicFileUsingGET
  produces:
  - '*/*'
  parameters:
  - name: id
    in: query
    description: id
    required: true
    type: string
    format: uuid
  responses:
    '200':
      description: OK
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not Found
  security:
  - Bearer: []
  deprecated: false
