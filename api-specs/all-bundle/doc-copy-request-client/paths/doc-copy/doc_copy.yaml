put:
  tags:
  - API Заявки на копии документов для ЮЛ. Базовые операции.
  summary: Обновить заявку
  description: 'Привилегии: DOC_COPY.CLIENT.REQUEST_EDIT'
  operationId: update
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/doc-copy/UpdateCommandDocCopyRequestUpdateDtoUUID.yaml
    required: true
  responses:
    '403':
      description: Forbidden
