type: object
properties:
  id:
    type: string
    description: Идентификатор
    format: uuid
  accountingId:
    type: integer
    description: Идентификатор проводки в ODS
    format: int64
  accountNumber:
    type: string
    description: Номер счета по которому запрашивается справка
  accountId:
    type: string
    description: Составной идентификатор счета
  docType:
    type: string
    description: Тип запрашиваемого документа
    enum:
    - PAYMENT_ORDER
    - PAYMENT_REQUEST
    - COLLECTION_ORDER
    - BANK_ORDER
    - MEMORIAL_ORDER
  accountName:
    type: string
    description: Название счета по которому запрашивается справка
  accountBranchCode:
    type: string
    description: Код филиала для счета клиента
  accountOpenDate:
    type: string
    description: Дата открытия счета
    format: date
  accountCloseDate:
    type: string
    description: Дата закрытия счета
    format: date
  currencyCode:
    type: string
    description: Код валюты счета по которому запрашивается документ
  accountDebit:
    type: string
    description: Номер счета Дебет
  accountCredit:
    type: string
    description: Номер счета Кредит
  documentId:
    type: integer
    description: ID документа
    format: int64
  documentNumber:
    type: integer
    description: Номер документа
    format: int64
  amount:
    type: number
    description: Сумма документа
  entryDate:
    type: string
    description: Дата проводки
    format: date
  counterpartyName:
    type: string
    description: Наименование контрагента
  deleted:
    type: boolean
    description: Признак удаления
description: Информация о платежных документах для ЮЛ
