type: object
properties:
  payDocDigitalCost:
    type: number
    description: Cтоимость комиссии за предоставление копии одного платежного документа в электронном виде (НДС не взимается)
  payDocOfficeCost:
    type: number
    description: Cтоимость комиссии за предоставление копии одного платежного документа в бумажном виде (НДС не взимается)
