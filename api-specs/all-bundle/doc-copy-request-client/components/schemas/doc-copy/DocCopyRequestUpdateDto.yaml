required:
- commissionAccountId
- contracts
- payments
- version
type: object
properties:
  version:
    type: integer
    description: Версия
    format: int32
  method:
    type: string
    description: Способ получения документов
    enum:
    - DIGITAL
    - OFFICE
  payments:
    type: array
    description: Идентификаторы проводок, запрашиваемых по запросу для ЮЛ
    items:
      type: integer
      description: Идентификаторы проводок, запрашиваемых по запросу для ЮЛ
      format: int64
  contracts:
    type: array
    description: Справки, запрашиваемой по запросу для ЮЛ
    items:
      $ref: ./DocCopyContractDescriptorDto.yaml
  commissionAccountId:
    type: string
    description: Составной идентификатор счета списания комиссии
  duplicateByEmails:
    type: boolean
    description: Продублировать на email
  emailReceptionAgreed:
    type: boolean
    description: Согласие на получение по email
  emails:
    type: array
    description: Email адреса для дублирования уведомлений
    items:
      type: string
      description: Email адреса для дублирования уведомлений
  notifyByEmail:
    type: boolean
    description: Уведомление по email
  notifyBySms:
    type: boolean
    description: Уведомление по sms
  branchCode:
    type: string
    description: Код подразделения
description: Запрос для обновления запроса на копии документов для ЮЛ
