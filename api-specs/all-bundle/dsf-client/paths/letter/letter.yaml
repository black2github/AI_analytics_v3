post:
  description: 'Привилегии: DSF_DOC.CREATE'
  operationId: create
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/letter/CreateCommandWithDeviceInfoDsfDocumentToBankCreateDto.yaml
    required: true
  responses:
    '200':
      content:
        '*/*':
          schema:
            oneOf:
            - $ref: ../../components/schemas/letter/CreateResponse.yaml
            - $ref: ../../components/schemas/common/ActionResult.yaml
      description: OK
    '201':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/CreateResponseDsfClientDocumentToBankResponseDto.yaml
      description: Created
    '400':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/GenericResponseErrorDataObject.yaml
      description: Bad Request
    '401':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
      description: Unauthorized
    '403':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
      description: Forbidden
    '415':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
      description: Unsupported Media Type
    '423':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
      description: Locked
    '500':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
      description: Internal Server Error
  summary: Создание документа в банк
  tags:
  - API документа свободного формата в Банк. Базовые операции.
