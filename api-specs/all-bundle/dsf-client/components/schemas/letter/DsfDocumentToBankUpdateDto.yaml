      type: string
      description: Список идентификаторов МЧД вложений.
      format: uuid
  message:
    type: string
    description: Текст письма.
  phone:
    type: string
    description: Номер мобильного телефона.
  subject:
    type: string
    description: Тема письма.
  typeCode:
    type: string
    description: Код типа письма.
  version:
    type: integer
    description: Текущая версия документа в банк.
    format: int32
description: Документ в банк. ДТО на обновление
