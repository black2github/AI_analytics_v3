type: object
properties:
  accountId:
    type: string
    description: Идентификатор счета.
    format: uuid
  accountNumber:
    type: string
    description: Расчетный счет.
  aml:
    $ref: ./AmlDocumentToBankDto.yaml
  attachmentIds:
    type: array
    description: Список вложений
    items:
      type: string
      description: Список вложений
      format: uuid
  bankClientId:
    type: string
    description: Идентификатор информации о клиенте банка.
    format: uuid
  branchId:
    type: string
    description: Идентификатор подразделения.
    format: uuid
  commentForBank:
    type: string
    description: Комментарий для Банка.
  commentForClient:
    type: string
    description: Комментарий для Клиента.
  contactId:
    type: string
    description: Идентификатор пользователя контактного лица.
    format: uuid
  email:
    type: string
    description: Адрес электронной почты.
  fio:
    type: string
    description: ФИО контактного лица клиента.
  fromBankId:
    type: string
    description: Ссылка на документ из банка, на основании которого создается текущий документ.
    format: uuid
  isNotifyByPhone:
    type: boolean
    description: Уведомить меня об исполнении по номеру телефона.
  mchdAttachmentIds:
    type: array
