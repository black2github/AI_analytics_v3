type: object
properties:
  accountId:
    type: string
    description: Идентификатор счета.
    format: uuid
  accountNumber:
    type: string
    description: Расчетный счет.
  aml:
    $ref: ./AmlDocumentToBankDto.yaml
  attachmentIds:
    type: array
    description: Список идентификаторов вложений.
    items:
      type: string
      description: Список идентификаторов вложений.
      format: uuid
  bankClientId:
    type: string
    description: Идентификатор информации о клиенте банка.
    format: uuid
  branchId:
    type: string
    description: Идентификатор подразделения.
    format: uuid
  copyOf:
    type: string
    description: Идентификатор копируемого документа.
    format: uuid
  email:
    type: string
    description: Адрес электронной почты.
  fio:
    type: string
    description: ФИО контактного лица клиента.
  fromBankId:
    type: string
    description: Ссылка на документ из банка, на основании которого создается текущий документ.
    format: uuid
  isNotifyByPhone:
    type: boolean
    description: Уведомить меня об исполнении по номеру телефона.
  mchdAttachmentIds:
    type: array
    description: Список идентификаторов МЧД вложений.
    items:
      type: string
      description: Список идентификаторов МЧД вложений.
      format: uuid
  message:
    type: string
    description: Текст письма.
  phone:
    maxLength: 255
    minLength: 0
    pattern: ^[\\\\d+() -\\\\s]*$
    type: string
    description: Номер мобильного телефона.
  subject:
    type: string
    description: Тема письма.
  typeCode:
    type: string
    description: Код типа документа.
description: Документ в банк. ДТО на создание
