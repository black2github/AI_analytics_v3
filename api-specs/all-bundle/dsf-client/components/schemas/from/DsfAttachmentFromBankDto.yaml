type: object
properties:
  attachedAt:
    type: string
    description: Дата и время вложения.
    format: date-time
  attachmentId:
    type: string
    description: Уникальный идентификатор вложения в Системе.
    format: uuid
  author:
    type: string
    description: Автор вложения.
    format: uuid
  authorFio:
    type: string
    description: ФИО автора вложения.
  contentType:
    type: string
    description: Тип файла.
    example: application/pdf
  extension:
    type: string
    description: Расширение файла.
    example: pdf
  fileHash:
    type: string
    description: Хеш файла.
  fileName:
    type: string
    description: Наименование файла вложения.
  fileSize:
    type: integer
    description: Размер файла, байты.
    format: int64
  id:
    type: string
    description: Уникальный идентификатор вложения.
    format: uuid
  owner:
    type: string
    description: Владелец вложения.
    format: uuid
  side:
    type: string
    description: Сторона вложения.
    enum:
    - CLIENT
    - BANK
  signatures:
    type: array
    description: Подписи вложения.
    items:
      $ref: ./DsfAttachmentSignatureFromBankDto.yaml
  type:
    type: string
    description: Тип вложения.
    enum:
    - REGULAR
    - MCHD
description: Вложение ДСФ из банка
