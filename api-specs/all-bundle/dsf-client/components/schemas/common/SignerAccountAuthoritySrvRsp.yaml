type: object
properties:
  accountId:
    type: string
    description: ID Счета клиента
    format: uuid
  authorityStatus:
    type: string
    description: Статус полномочия
    enum:
    - ACTIVE
    - INACTIVE
  requiredSignatureLevels:
    uniqueItems: true
    type: array
    description: Требуемые коды уровней подписи
    items:
      type: string
      description: Требуемые коды уровней подписи
      enum:
      - UNKNOWN
      - SINGLE
      - LEVEL_1
      - LEVEL_2
      - SIGHTING
  signatureLevel:
    type: string
    description: Код уровня подписи
    enum:
    - UNKNOWN
    - SINGLE
    - LEVEL_1
    - LEVEL_2
    - SIGHTING
  userId:
    type: string
    description: ID Пользователя
    format: uuid
description: Полномочия подписанта по счету. Интеграционное ДТО
