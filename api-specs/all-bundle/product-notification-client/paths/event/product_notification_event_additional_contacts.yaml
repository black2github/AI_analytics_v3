  description: 'Привилегии: SFZU_SETTINGS_EDIT'
  operationId: editAdditionalContacts
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/event/GenericCommandEditAdditionalContactsRequestDto.yaml
    required: true
  responses:
    '400':
      description: Bad Request
