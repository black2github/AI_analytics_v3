type: object
properties:
  id:
    type: string
    format: uuid
  accountsIds:
    type: array
    items:
      type: string
      format: uuid
  type:
    type: string
    enum:
    - ONETIME
    - HIDDEN_VIEW
    - HIDDEN_PRINT_EXPORT_OSV
    - TNF
    - OPEN_API_CB
    - ECO_OPEN_API_CB
    - TA_FOR_MC
  statementFormat:
    type: string
    enum:
    - VIEW
    - C1
    - C1_02
    - TXT
    - TXT_WITHOUT_AMOUNTS
    - PDF
    - PDF_IMPERSONAL
    - EXCEL
    - EXCEL_XLSX
    - MULTICASH
    - RTF
    - DOCX
    - MT940
    - C1_SPECIAL
    - C1_SPECIAL_2
    - XML0
    - XML1
    - XML2
    - XML_TNF
    - CAMT053
    - OPEN_API_CB
    - PDF_MULTIBANKING
    - EXCEL_MULTIBANKING
  periodType:
    type: string
    enum:
    - SELECTPERIOD
    - YESTERDAY
    - TODAY
    - LAST3DAYS
    - PREVWEEK
    - CURMONTH
    - LASTMONTH
    - PREVQUARTER
  periodStart:
    type: string
    format: date
  periodEnd:
    type: string
    format: date
  statementOperationDto:
    type: string
    enum:
    - ALL
    - INCOME
    - WRITE_OFF
  documentOptionsDto:
    $ref: ./DocumentOptionsDto.yaml
  statementActionDto:
    type: string
    enum:
    - DOWNLOAD
    - PRINT
    - VIEW
    - REQUEST_HISTORY
    - EXPORT
    - SEND_TO_EMAIL
  commentForClient:
    type: string
  hideEmptyTurnovers:
    type: boolean
  separateAccountsFiles:
    type: boolean
  signNeeded:
    type: boolean
  totalsOfDay:
    type: boolean
  revaluationAccountingEntry:
    type: boolean
  nationalCurrency:
    type: boolean
  counterpartyFilterType:
    type: string
    enum:
    - INN
    - NAME
    - ACCOUNT
  counterpartyFilters:
    type: array
    items:
      $ref: ../common/CounterpartyFilterDataDto.yaml
  withDataMT:
    type: boolean
  makeFileStatement:
    type: boolean
  reportType:
    type: string
    enum:
    - STATEMENT_AND_DOCUMENTS
    - DOCUMENTS
  templateDocumentType:
    type: string
    enum:
    - ONE_FILE
    - SEPARATE_ACCOUNT_FILE
    - SEPARATE_FILES
description: Данные
