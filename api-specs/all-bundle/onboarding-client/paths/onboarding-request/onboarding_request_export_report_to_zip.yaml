post:
  operationId: exportToZip
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/onboarding-request/SingleCommandFormedDocsPrintZipRequestDto.yaml
    required: true
  responses:
    '200':
      content:
        application/zip:
          schema:
            type: string
            format: byte
      description: OK
    '400':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
      description: Bad Request
    '401':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
      description: Unauthorized
    '403':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
      description: Forbidden
    '415':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
      description: Unsupported Media Type
    '423':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
      description: Locked
    '500':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
      description: Internal Server Error
  summary: Экспорт печатных форм в zip-архиве
  tags:
  - Заявка на открытие первого счета. Операции печати.
