post:
  operationId: exportApplications
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/onboarding-request/GenericCommandDocsExportDto.yaml
    required: true
  responses:
    '200':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/GenericResponseSimpleErrorDataAttachmentInfoDto.yaml
      description: OK
    '400':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
      description: Bad Request
    '401':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
      description: Unauthorized
    '403':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
      description: Forbidden
    '415':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
      description: Unsupported Media Type
    '423':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
      description: Locked
    '500':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
      description: Internal Server Error
  summary: Сформировать и загрузить в файловое хранилище ПФ заявлений
  tags:
  - Заявка на открытие первого счета. Операции печати.
