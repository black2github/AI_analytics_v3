type: object
properties:
  activeRequestId:
    type: string
    description: Идентификатор активной заявки.
    format: uuid
  activeRequestSource:
    type: string
    description: Сервис, в котором найдена активная заявка
    enum:
    - ONBOARDING
    - ONB_KZ
    - DOCUMENT_PACKAGE
  checkMessage:
    $ref: ./CheckMessage.yaml
  result:
    type: string
    description: Результат проверки.
    enum:
    - VALID
    - INVALID
    - SKIPPED
description: Результат проверки заявки.
