type: object
properties:
  question_11:
    type: boolean
    description: По результатам анализа совокупности имеющихся у Банка документов и информации о клиенте установлено, что сведения о бенефициарном владельце соответствуют сведениям о бенефициарном владельце, предоставленным клиентом.
  question_12:
    type: boolean
    description: 'Сведения о бенефициарном владельце Клиентом не предоставлены. Для выявления и идентификации бенефициарного владельца предприняты следующие меры: сверка данных с выпиской из ЕГРЮЛ. По результатам проверки по имеющимся у Банка документов, бенефициарный владелец не выявлен. В связи с изложенным в качестве бенефициарного владельца признается ЕИО (руководитель) Клиента.'
  question_13:
    type: boolean
    description: Исходя из полученной информации о структуре собственности и (или) организационной структуры клиента - иностранной структуры без образования юридического лица бенефициарный владелец, как он определен в ст. 3 Федерального закона от 07.08.2001 № 115-ФЗ, и единоличный исполнительный орган (руководитель) отсутствуют".
  question_14:
    type: boolean
    description: В ходе анализа документов предоставленных клиентом выявлено, что клиент является организаций, в отношении которой в соответствии с пп. 2 п. 1 ст. 7 Федерального закона от 07.08.2001 № 115-ФЗ Банк не идентифицирует бенефициарного владельца.
description: Блок Лист оценки Клиента ЮЛ "Бенефициарные владельцы".
