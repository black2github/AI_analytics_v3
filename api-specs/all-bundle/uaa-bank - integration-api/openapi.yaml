- Bearer: []
tags:
- name: SessionIntegration
  description: API для работы с сессиями
- name: UvedMigrationIntegration
  description: API миграции пользователей УВЭД
- name: BankUserIntegration
  description: API для работы с банковскими пользователями
- name: Dbo320UserContextIntegration
  description: API для работы с контекстом пользователей ДБО 320
- name: UserLoginCrtIntegration
  description: API для работы с сертификатами для входа
- name: UaaUserIntegration
  description: API для работы с пользователями
- name: ConfirmationRequestIntegration
  description: API для работы запросами на подтверждение
- name: ApprovalIntegration
  description: API для работы с запросами на одобрение OAuth2
- name: ProfileIntegration
  description: API для работы с профилем пользователя
- name: UaaSegmentProductUserIntegration
  description: API для работы с информацией о связях сегментов доступа с продуктами ГПБ БО для пользователя
- name: AbacConditionFindV2Integration
  description: Rest API для доступа по реквизиту V2. Поиск выражения.
- name: RoleTemplateIntegration
  description: API для работы с шаблонами ролей
- name: AbacConditionFindIntegration
  description: Rest API для доступа по реквизиту. Поиск выражения.
- name: API интеграции для создания Правила блокировки / разблокировки доступности сегмента.
  description: AccessRuleBlockingCreationIntegrationApi
- name: RoleIntegration
  description: API для работы с ролями
- name: UaaUserClientOfficialIntegration
  description: API для работы с пользователями как с представителями организаций
- name: AbacGrantAccessRuleIntegration
  description: API для работы с правилами предоставления доступа по реквизиту
- name: ClientUserIntegration
  description: API для работы с пользователями клиента
- name: Direct1CIntegration
  description: API для работы с 1С ДиректБанк
- name: ClientUserCommentIntegration
  description: API для работы с комментариями пользователей клиентов
- name: UnstickingUser
  description: API для работы с ролями пользователей
- name: CommonUserInfoIntegration
  description: API для работы с данными пользователей
