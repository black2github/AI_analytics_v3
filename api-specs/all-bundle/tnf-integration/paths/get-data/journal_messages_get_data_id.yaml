get:
  tags:
  - API скроллера "Журнал сообщений"
  summary: Получить данные сообщения по идентификатору записи в журнале
  description: 'Привилегии: TNF_JOURNAL_MESSAGE_VIEW'
  operationId: getMessageData
  parameters:
  - name: id
    in: path
    description: Идентификатор записи в журнале сообщений
    required: true
    schema:
      type: string
      format: uuid
  responses:
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '200':
      description: OK
      content:
        text/plain:
          schema:
            type: string
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
