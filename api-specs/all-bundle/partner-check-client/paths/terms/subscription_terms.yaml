get:
  tags:
  - API для управления подпиской
  summary: Условия подписки для клиента со списком его счетов
  description: 'Привилегии: ECO_PARTNER_CHECK_CLIENT.VIEW_LANDING_PAGE'
  operationId: getSubscriptionTermsUsingGET
  produces:
  - '*/*'
  parameters:
  - name: OrganizationId
    in: header
    description: Client id
    required: true
    type: string
  - name: clientId
    in: query
    description: clientId
    required: true
    type: string
    format: uuid
  responses:
    '200':
      description: OK
      schema:
        $ref: '#/definitions/GenericResponse«SubscriptionTermsError,SubscriptionTermsDto»'
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not Found
  security:
  - Bearer: []
  deprecated: false
post:
