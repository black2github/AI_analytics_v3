get:
  tags:
  - API для управления подпиской
  summary: Получить идентификатор выгруженного из АС ТЕССА файла в файловом хранилище
  description: 'Привилегии: ECO_PARTNER_CHECK_CLIENT.VIEW_MANAGE_SERVICE_PAGE'
  operationId: getLocalStorageDocumentIdUsingGET
  produces:
  - '*/*'
  parameters:
  - name: OrganizationId
    in: header
    description: Client id
    required: true
    type: string
  - name: subscriptionDocumentId
    in: path
    description: Идентификатор документа по подписке в Сервисе проверки контрагентов
    required: true
    type: string
    format: uuid
  responses:
    '200':
      description: OK
      schema:
        $ref: '#/definitions/GenericResponse«SubscriptionError,DownloadDocumentResultDto»'
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not Found
  security:
  - Bearer: []
  deprecated: false
