post:
  tags:
  - API для управления подпиской
  summary: Создать заявку на подключение подписки
  description: 'Привилегии: ECO_PARTNER_CHECK_CLIENT.VIEW_CONNECTION_SERVICE_PAGE'
  operationId: createSubscribeRequestUsingPOST
  consumes:
  - application/json
  produces:
  - '*/*'
  parameters:
  - name: OrganizationId
    in: header
    description: Client id
    required: true
    type: string
  - in: body
    name: requestDto
    description: requestDto
    required: true
    schema:
      $ref: '#/definitions/ActivateSubscriptionRequestDto'
  responses:
    '200':
      description: OK
      schema:
        $ref: '#/definitions/GenericResponse«SubscriptionError,SubscriptionRequestResponseDto»'
    '201':
      description: Created
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not Found
  security:
  - Bearer: []
  deprecated: false
