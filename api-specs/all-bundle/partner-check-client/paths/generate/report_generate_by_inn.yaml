post:
  tags:
  - API для работы с отчетами
  summary: Сформировать отчет по ИНН
  description: 'Привилегии: ECO_PARTNER_CHECK_CLIENT.GET_REPORT'
  operationId: generateReportByInnUsingPOST
  consumes:
  - application/json
  produces:
  - '*/*'
  parameters:
  - name: OrganizationId
    in: header
    description: Client id
    required: true
    type: string
  - name: inn
    in: query
    description: ИНН контрагента
    required: true
    type: string
  - name: orgId
    in: query
    description: Идентификатор организации, от имени которой действует текущий пользователь
    required: true
    type: string
    format: uuid
  responses:
    '200':
      description: OK
      schema:
        $ref: '#/definitions/GenericResponse«PartnerCheckError,ReportResponseDto»'
    '201':
      description: Created
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not Found
  security:
  - Bearer: []
  deprecated: false
