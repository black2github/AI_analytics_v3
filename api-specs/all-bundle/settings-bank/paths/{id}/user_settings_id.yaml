get:
  tags:
  - АПИ Клиента для управления пользовательскими настройками
  summary: Получить запись по идентификатору
  description: 'Привилегии: USER_SETTINGS_VIEW_TECH'
  operationId: getById
  parameters:
  - name: id
    in: path
    required: true
    schema:
      type: string
      format: uuid
  responses:
    '200':
      description: OK
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/GenericResponseSimpleErrorDataUserSettingsDto.yaml
