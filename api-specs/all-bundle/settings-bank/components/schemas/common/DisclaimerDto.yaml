    - WARNING
    - INFO
    - MESSAGE
  title:
    type: string
    description: Заголовок дисклеймера (RU)
  text:
    type: string
    description: Текст дисклеймера (RU)
  titleEn:
    type: string
    description: Заголовок дисклеймера (EN)
  textEn:
    type: string
    description: Текст дисклеймера (EN)
  displayedInUnauthorizedArea:
    type: boolean
