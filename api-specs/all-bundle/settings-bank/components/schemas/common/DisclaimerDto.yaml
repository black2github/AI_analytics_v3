type: object
properties:
  id:
    type: string
    description: ID дисклеймера
    format: uuid
  createdAt:
    type: string
    description: Дата и время создания
    format: date-time
  createdById:
    type: string
    description: Идентификатор пользователя, создавшего запись
    format: uuid
  createdByFio:
    type: string
