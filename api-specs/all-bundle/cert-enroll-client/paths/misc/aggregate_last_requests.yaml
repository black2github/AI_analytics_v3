post:
  tags:
  - API агрегации заявок на выпуск/регистрацию
  summary: Получение последних заявок пользователя на регистрацию/выпуск ЭП в разрезе организации
  description: 'Привилегии: CERT_ENROLL.CLIENT.REG_CERT_REQUEST.VIEW'
  operationId: getLastRequests
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/misc/AggregateRequestSearchParams.yaml
    required: true
  responses:
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '200':
      description: OK
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/misc/GenericResponseSimpleErrorDataAggregateLastRequestResultDto.yaml
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
