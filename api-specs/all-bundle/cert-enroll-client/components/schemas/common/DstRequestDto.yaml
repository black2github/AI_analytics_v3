required:
- createdAt
type: object
properties:
  id:
    type: string
    description: ID заявки
    format: uuid
  createdAt:
    type: string
    description: Дата и время создания заявки
    format: date-time
  updatedAt:
    type: string
    description: Дата и время обновления заявки
    format: date-time
  requestNumberSystem:
    type: integer
    description: Номер заявки общий
    format: int64
  requestNumberUser:
    type: integer
    description: Номер заявки пользователя
    format: int64
  requestType:
    type: string
    description: Тип заявки
    enum:
    - ISSUE
    - REISSUE
  clientOfficialSignatureToolId:
    type: string
    description: ID СЭП представителя клиента
    format: uuid
  requestDate:
    type: string
    description: Дата заявки
    format: date-time
  requestDeliveredAt:
    type: string
    description: Дата и время отправки заявки. Дата и время перехода заявки в статус DELIVERED
    format: date-time
  status:
    type: string
    description: Текущий статус обработки заявки
    enum:
    - NONE
    - NEW_POTENTIAL_AUTHORIZED_PERSON
    - IS_NEW_POTENTIAL_AUTHORIZED_PERSON
    - DRAFT
    - NEW
    - DELETED
    - SIGNED
    - DELIVERED
    - FORMED
    - ESK_CHECK
    - ESK_CHECKED
    - ESK_CHECK_ERROR
    - DETAILS_VALID
    - DETAILS_INVALID
    - DETAILS_CHECK
    - SIGN_CHECK
    - SIGN_VALID
    - SIGN_INVALID
    - RECEIVED
    - AUTHORIZED_PERSON_CHECK
    - EXPORT_TO_UC
    - EXPORTED_TO_UC
    - EXECUTED_BY_UC
    - EXPORT_TO_UC_ERROR
    - REGISTER_CERT
    - REGISTERED_CERT
    - REGISTER_CERT_ERROR
    - EXPORT_TO_DSS
    - EXECUTED_BY_DSS
    - EXPORT_TO_DSS_ERROR
    - REJECTED
    - EXECUTED
    - WAIT_QR_CODE_APPLIED
    - WAIT_CSR_REQUEST_CREATION
    - CERTIFICATE_ISSUE_MANUAL_ACTION_OR_AUTO_REJECT
    - CERTIFICATE_ISSUE_ERROR_AUTO_REJECT
    - CSR_OR_CERTIFICATE_IS_SET
    - REJECTING_REQUEST
    - CONFIRMATION_REQUEST
    - CONFIRMATION_REQUESTED
    - ACCEPTED_BY_EPGU
    - CONFIRMED_BY_EPGU
    - CONFIRMATION_ERROR
    - NOTIFICATION_REQUEST
    - NOTIFICATION_REQUESTED
    - NOTIFICATION_ACCEPTED_BY_EPGU
    - NOTIFICATION_CONFIRMED_BY_EPGU
    - NOTIFICATION_ERROR
    - RETRY_PROCESSING
    - INIT_DSS_DEVICE_IS_REQUIRED
    - REFUSED_BY_UC
    - WAITING_ES_TO_ACTIVATE
    - WAITING_DEVICE_TO_AUTHORIZE
    - WAITING_CONTINUE_PROCESSING
  commentForBank:
    type: string
    description: Комментарий для банка
  commentForClient:
    type: string
    description: Комментарий для клиента
  userId:
    type: string
    description: ID пользователя создавшего заявку
    format: uuid
  certificateId:
    type: string
    description: ID Сертификата ЭП
    format: uuid
  cloudCertificateId:
    type: string
    description: ID сертификата в КриптоПро DSS
  clientOfficialId:
    type: string
    description: ID Представителя Клиента
    format: uuid
  csr:
    $ref: ./CsrBinaryDataDto.yaml
  userDssProfileId:
    type: string
    description: ID Профиль пользователя DSS
    format: uuid
  agreementAccept1:
    type: boolean
    description: Согласие 1
  agreementAccept2:
    type: boolean
    description: Согласие 2
  certInfo:
    $ref: ./CertInfoDto.yaml
  epguInfo:
    $ref: ./EpguInfoDto.yaml
  branchId:
    type: string
    description: Филиал обслуживания
    format: uuid
  sppVersion:
    type: integer
    description: Версия СПП
    format: int32
  signature:
    $ref: ./SignatureDto.yaml
  applicationKind:
    type: string
    description: Форма подачи заявления
    enum:
    - ONLINE
    - PAPER
    - ONLINE_EPGU_CONFIRMATION
  phone:
    type: string
    description: Телефон используемый для создания ДСС профиля либо обновления
  certInfoChanged:
    type: boolean
    description: Признак того что данные в ЭКО и перевыпускаемом сертификате не совпадают.
  eskId:
    type: string
    description: Идентификатор физического лица в ЕСК
  dssVersionChanged:
    type: boolean
    description: Признак смены версии ДСС в процессе исполнения заявки
  dssVersion:
    type: string
    description: Версия мобильного приложения ДСС
    enum:
    - V1
    - V2
description: Заявка на выпуск/регистрацию СЭП
