type: object
properties:
  agreementClosureAccount:
    $ref: ./AgreementClosureAccountDto.yaml
  checkBooks:
    type: array
    description: Чековые книжки
    items:
      $ref: ./CheckBookDto.yaml
  clientRequisites:
    $ref: ./ClientRequisitesDto.yaml
  closingAccountParams:
    $ref: ./ClosingAccountParamsDto.yaml
  commentForBank:
    type: string
    description: Комментарий для банка
  commentForClient:
    type: string
    description: Комментарий для Клиента
  createdAt:
    type: string
    description: Дата и время создания заявки
    format: date-time
  detailsForTransferring:
    $ref: ./DetailsForTransferringDto.yaml
  documentType:
    type: string
    description: Код типа документа из Справочник типов документов ЭКО
    enum:
    - ACC_CLOSE_REQ
  id:
    type: string
    description: Идентификатор заявки
    format: uuid
  requestNotifications:
    $ref: ./RequestNotificationsDto.yaml
  requestNumber:
    type: integer
    description: Номер заявки
    format: int32
  signatures:
    type: array
    description: Реквизиты электронной подписи документа
    items:
      $ref: ./ClosingAccountRequestSignatureDto.yaml
  sppVersion:
    type: integer
    description: Версия СПП
    format: int32
  status:
    type: string
    description: Текущий статус обработки заявки
    enum:
    - NONE
    - SIGNED
    - DELIVERED
    - DETAILS_VALID
    - SIGN_VALID
    - EXPORT_TO_TESSA
    - EXPORT_TO_TESSA_ERROR
    - EXECUTED_BY_TESSA
    - REQUEST_TO_F1
    - REQUEST_SENT_TO_F1
    - REQUEST_TO_F1_ERROR
    - REQUEST_EXPORTED_TO_F1
    - EXECUTED
    - REJECTED
    - SIGN_VALID_OR_REJECTED
    - DETAILS_VALID_OR_REJECTED
    - SIGNED_OR_REJECTED
  tessaUploadRequestRequisites:
    $ref: ./TessaUploadRequestRequisitesDto.yaml
  updatedAt:
    type: string
    description: Дата и время последнего обновления заявки
    format: date-time
  userFio:
    type: string
    description: ФИО пользователя
  userId:
    type: string
    description: ID Пользователя
    format: uuid
  userLogin:
    type: string
    description: Логин пользователя
  version:
    type: integer
    description: Версия
    format: int32
description: Данные
