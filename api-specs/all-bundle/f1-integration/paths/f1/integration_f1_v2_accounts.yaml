post:
  tags:
  - Сервис интеграции со счетами в F1. Вторая версия
  summary: Получить список счетов из F1
  operationId: getAccounts
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/f1/AccountsDtoV2Request.yaml
    required: true
  responses:
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/f1/ActionResult.yaml
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/f1/ActionResult.yaml
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/f1/GenericResponseSimpleErrorDataAccountDtoV2Response.yaml
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/f1/ActionResultObject.yaml
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/f1/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/f1/ActionResultObject.yaml
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/f1/ActionResultObject.yaml
