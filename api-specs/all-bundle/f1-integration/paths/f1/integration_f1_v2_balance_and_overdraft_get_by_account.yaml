post:
  tags:
  - Сервис интеграции с АБС Ф1 для получения баланса счетов клиента
  summary: Получения баланса счетов по реквизитам аккаунтов в АБС Ф1
  description: 'Привилегии: #eco.userTypeIs(''TECHNICAL'')'
  operationId: getBalanceAndOverdraftByAccount
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/f1/AccountBalanceRequestDto.yaml
    required: true
  responses:
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/f1/ActionResult.yaml
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/f1/ActionResult.yaml
    '200':
      description: OK
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/f1/GenericResponseSimpleErrorDataBalanceResponseDto.yaml
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/f1/ActionResultObject.yaml
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/f1/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/f1/ActionResultObject.yaml
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/f1/ActionResultObject.yaml
