post:
  tags:
  - Сервис интеграции F1 со счетами
  summary: Получить список счетов РКО для использования в платежных инструкциях при заключении сделок МНО и депозит
  operationId: fetchDepositAccountList
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/f1/ClientAccountsDepositRequestDto.yaml
    required: true
  responses:
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/f1/ActionResult.yaml
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/f1/ActionResult.yaml
    '200':
      description: OK
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/f1/SingleResponseClientAccountsDepositResponseDto.yaml
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/f1/ActionResultObject.yaml
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/f1/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/f1/ActionResultObject.yaml
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/f1/ActionResultObject.yaml
