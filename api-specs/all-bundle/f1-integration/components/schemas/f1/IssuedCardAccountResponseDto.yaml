required:
- clientRegNum
type: object
properties:
  responseCode:
    type: integer
    description: Код ответа
    format: int32
  errorMessage:
    type: string
    description: Описание ошибки
  clientRegNum:
    type: string
    description: Регистрационный номер клиента, присвоенный в РКО Ф1
  cardProduct:
