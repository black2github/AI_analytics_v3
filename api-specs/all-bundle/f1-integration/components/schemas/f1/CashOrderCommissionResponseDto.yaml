required:
- accountForCash
- applicationType
- clientEskId
- clientRegNum
- rc
- traceId
type: object
properties:
  applicationType:
    type: string
    description: Тип заявки
  traceId:
    type: string
    description: Уникальный идентификатор запроса
  clientEskId:
    type: string
    description: ЕСК Гуид клиента
    format: uuid
  clientRegNum:
    type: integer
    description: РНК клиента
    format: int64
  accountForCash:
    type: string
    description: Счет зачисления/списания
  commissionAmount:
    type: number
    description: Сумма предварительно рассчитанной комиссии
  tariffType:
    type: string
    description: Данные по типу тарифа РКО
  rc:
    type: string
    description: Код ответа
  error:
    type: string
    description: Описание ошибки
description: Результат расчета суммы предварительной комиссии и типа тарифа для кассовой операции
