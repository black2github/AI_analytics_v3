    type: string
    description: Тип заявки
  traceId:
    type: string
    description: Уникальный идентификатор запроса
  clientEskId:
    type: string
    description: ЕСК Гуид клиента
    format: uuid
  clientRegNum:
    type: integer
    description: РНК клиента
    format: int64
  accountForCash:
    type: string
    description: Счет зачисления/списания
  cash:
    type: array
    description: Список кассовых символов
