  cbdcType:
    type: string
    description: Код типа CBDC-сообщения
    enum:
    - cbdc.010.001.04 GetOrganisationWalletInfo_2022.2
    - cbdc.011.001.04 ReturnOrganisationWalletInfo_2022.2
    - cbdc.010.001.04 GetOrganisationWalletInfo_2022.2
    - cbdc.011.001.04 ReturnOrganisationWalletInfo_2022.2
    - cbdc.777.001.04 OrganisationDCBuyingNotification_2022.2
    - cbdc.012.001.04 OrganisationDСSellingPossibilityRequest_2022.2
    - cbdc.013.001.04 OrganisationDCSellingPossibilityResponse_2022.2
