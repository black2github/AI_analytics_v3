    - cbdc.012.001.04 B2CRefundPossibilityRequest_2022.2
    - cbdc.013.001.04 B2CRefundPossibilityResponse_2022.2
    - cbdc.005.001.01 B2CRefund_2022.2
    - cbdc.777.001.04 B2CRefundBusinessNotification_2022.2
    - cbdc.012.001.04.B2BPossibilityRequest_2024.03
    - cbdc.013.001.04.B2BPossibilityResponse_2024.03
    - cbdc.006.001.01.B2B_2024.03
    - cbdc.777.001.04.B2BSenderNotification_2024.03
