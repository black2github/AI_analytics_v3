required:
- bankClientId
- fingerprint
- organization
- pcrParticipantWalletId
type: object
properties:
  bankClientId:
    type: string
    description: Идентификатор Клиента Банка
    format: uuid
  fingerprint:
    minLength: 1
    type: string
    description: Фингерпринт
  pcrParticipantWalletId:
    type: string
    description: Идентификатор цифрового кошелька организации
    format: uuid
  organization:
    $ref: ../common/OrganizationDto.yaml
description: DTO для запроса на создание заявки на запрос баланса кошелька.
