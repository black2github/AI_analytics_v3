get:
  tags:
  - API для работы с информацией о балансе кошелька ЦР.
  summary: Получение баланса кошелька по идентификатору кошелька ЦР
  description: 'Привилегии: DRUB.CLIENT.SERVICE_PAGE_VIEW'
  operationId: getByPcrParticipantWalletId
  parameters:
  - name: pcrParticipantWalletId
    in: path
    required: true
    schema:
      type: string
      format: uuid
  responses:
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '200':
      description: OK
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/pcrParticipantWallet/GenericResponseDigitalRubleErrorPcrParticipantWalletBalanceDto.yaml
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
