get:
  tags:
  - API для работы с электронными сообщениями заявок (ЭС1 и ЭС2).
  summary: Получение электронного сообщения заявки на перевод B2B
  description: 'Привилегии: DRUB.CLIENT.MESSAGE_SIGNING_AND_ENCRYPTION'
  operationId: getBusinessTransferRequestMsg
  parameters:
  - name: msgType
    in: path
    description: "* MSG1_OUT: \n* MSG1_IN: \n* MSG2_OUT: \n* MSG2_IN: "
    required: true
    schema:
      type: string
      enum:
      - MSG1_OUT
      - MSG1_IN
      - MSG2_OUT
      - MSG2_IN
  - name: requestId
    in: path
    required: true
    schema:
      type: string
      format: uuid
  responses:
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '200':
      description: OK
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/GenericResponseDigitalRubleErrorRequestMsgDto.yaml
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
