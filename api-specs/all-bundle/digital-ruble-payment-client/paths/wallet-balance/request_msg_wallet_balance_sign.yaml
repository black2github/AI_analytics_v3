post:
  tags:
  - API для работы с электронными сообщениями заявок (ЭС1 и ЭС2).
  summary: Сохранение подписи электронного сообщения заявки на запрос баланса кошелька
  description: 'Привилегии: DRUB.CLIENT.MESSAGE_SIGNING_AND_ENCRYPTION'
  operationId: signWalletBalanceRequestMsg
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/common/MsgSign.yaml
    required: true
  responses:
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '200':
      description: OK
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/GenericResponseDigitalRubleErrorVoid.yaml
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
