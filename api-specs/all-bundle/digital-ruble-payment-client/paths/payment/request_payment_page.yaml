post:
  tags:
  - Клиентское API для работы с заявками.
  summary: Получение страницы платёжных заявок (на покупку, продажу и возврат ЦР)
  description: 'Привилегии: DRUB.CLIENT.REQUEST_VIEW'
  operationId: getPaymentPage
  parameters:
  - name: pcrParticipantWalletId
    in: query
    required: true
    schema:
      type: string
      format: uuid
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/payment/GetPageCommandRequestFilterClientDto.yaml
    required: true
  responses:
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '200':
      description: OK
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/payment/GenericResponseDigitalRubleErrorPageDataRequestScrollerClientDto.yaml
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
