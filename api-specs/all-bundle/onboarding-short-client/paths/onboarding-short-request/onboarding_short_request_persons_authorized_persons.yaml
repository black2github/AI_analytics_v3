get:
  description: 'Привилегии: ONB_KZ.CLIENT.VIEW,ONB_KZ.BANK.VIEW'
  operationId: getAuthorizedPersons
  parameters:
  - in: query
    name: requestId
    required: true
    schema:
      type: string
      format: uuid
  responses:
    '200':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/onboarding-short-request/GenericResponseSimpleErrorDataListAuthorizedPersonDto.yaml
      description: OK
    '400':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
