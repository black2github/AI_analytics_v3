required:
- docCreationPage
- docCreationType
- id
- payerDetails
- version
type: object
properties:
  paymentInfo:
    $ref: ./PaymentInfoSimplifiedDto.yaml
  payerDetails:
    $ref: ./PayerDetailsSimplifiedTaxDto.yaml
  docCreationType:
    $ref: ../common/DocumentCreationMethodClassifierDto.yaml
  docCreationPage:
    maxLength: 255
    pattern: ^[А-Яа-яёЁA-Za-z0-9@:%_\+.-~#?&//=-]*$
    type: string
    description: Страница с которой вызвано создание документа
  paymentAmount:
    $ref: ./PaymentAmountSimplifiedDto.yaml
  id:
    type: string
    description: Идентификатор документа
    format: uuid
  version:
    type: integer
    description: Версия
    format: int32
description: Входящие параметры для обновления документа ЕНП.
