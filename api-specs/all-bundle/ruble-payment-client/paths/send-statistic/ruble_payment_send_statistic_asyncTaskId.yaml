get:
  tags:
  - Рублевое платежное поручение. Базовые операции.
  summary: Получить статистику по отправленным в банк документам (асинхронно)
  description: 'Привилегии: RUBLE_PAYMENT_ORDER.SEND'
  operationId: getAsyncStatistic
  parameters:
  - name: asyncTaskId
    in: path
    required: true
    schema:
      type: string
      format: uuid
  responses:
    '200':
      description: OK
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/send-statistic/GenericResponseRublePaymentErrorSendToBankStatisticDto.yaml
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
