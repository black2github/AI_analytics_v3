post:
  tags:
  - Рублевое платежное поручение. Операции печати.
  summary: Печать документа
  description: 'Привилегии: RUBLE_PAYMENT_ORDER.PRINT'
  operationId: print
  parameters:
  - name: year
    in: query
    description: Архивный год
    required: false
    allowEmptyValue: true
    schema:
      maximum: 2999
      minimum: 2022
      pattern: ^\d{4}?$
      type: string
      nullable: true
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/print/SingleCommandPrintFormatPaymentOrders.yaml
    required: true
  responses:
    '200':
      description: OK
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/GenericResponseRublePaymentErrorPrintResponse.yaml
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
