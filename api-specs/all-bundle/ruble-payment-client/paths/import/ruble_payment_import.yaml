post:
  tags:
  - Рублевое платежное поручение. Операции импорта из файла.
  summary: Импорт файла из файлового хранилища
  description: 'Привилегии: RUBLE_PAYMENT_ORDER.IMPORT'
  operationId: importFile
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/import/ImportFileRqDto.yaml
    required: true
  responses:
    '200':
      description: Синхронный ответ. В процессе импорта отправляем уведомления в web-socket см. ниже
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/import/GenericResponseRublePaymentErrorBackgroundImportProcessDto.yaml
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    web-socket:
      description: Прогресс импорта, адрес назначения /user/queue/ruble-payment/import/{id}
      content:
        '*/*':
          schema:
            oneOf:
            - $ref: ../../components/schemas/import/BackgroundImportProcessWsDto.yaml
