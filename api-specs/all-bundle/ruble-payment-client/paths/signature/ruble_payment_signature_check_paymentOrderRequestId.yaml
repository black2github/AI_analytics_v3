get:
  tags:
  - АПИ для работы с подписью платёжного поручения
  summary: Проверить подпись
  description: 'Привилегии: RUBLE_PAYMENT_ORDER.SIGN'
  operationId: checkSignature
  parameters:
  - name: paymentOrderRequestId
    in: path
    required: true
    schema:
      type: string
      format: uuid
  - name: year
    in: query
    description: Архивный год
    required: false
    allowEmptyValue: true
    schema:
      maximum: 2999
      minimum: 2022
      pattern: ^\d{4}?$
      type: string
      nullable: true
  responses:
    '200':
      description: OK
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/signature/GenericResponseRublePaymentErrorRu.gpb.eco.ruble.payment.business.api.dto.sign.check.CheckSignByImportFileDto.yaml
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
