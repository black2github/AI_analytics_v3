  - Рублевое платежное поручение. Базовые операции.
  summary: Создание документа
  description: 'Привилегии: RUBLE_PAYMENT_ORDER.CREATE'
  operationId: create
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/ruble-payment/CreateWithDeviceCommandCreatePaymentOrderRequestDto.yaml
