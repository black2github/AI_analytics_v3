  pam:
    type: string
    description: PAM
  sortBy:
    type: string
    description: 'Сортировать по: DATE, AMOUNT, MERCHANT_NAME'
  transactionID:
    type: string
    description: Идентификатор транзакции
  qrcID:
    type: string
