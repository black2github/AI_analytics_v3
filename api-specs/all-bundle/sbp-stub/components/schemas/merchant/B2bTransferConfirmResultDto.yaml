type: object
required:
- code
- message
description: Ответ на запрос подтверждения платежа B2B
properties:
  code:
    type: string
    description: Код ответа
  message:
    type: string
    description: Описание кода ответа
  traceId:
    type: string
    description: GUID из исходного запроса, идентификатор BSS
  transactionId:
    type: string
    description: ID операции в СБП
  sign:
    type: string
    description: Подпись сообщения
