type: object
required:
- code
- message
- transactionId
description: Ответ на запрос статуса операции по QR кодам
properties:
  code:
    type: string
    description: Код ответа
  message:
    type: string
    description: Описание кода ответа
  transactionId:
    type: string
    description: ID операции в СБПGate Master System
  data:
    type: array
    items:
      $ref: ./QrcOperationStatusDataDto.yaml
    description: Полученные данные от СБП
  sign:
    type: string
    description: Подпись сообщения
  requestSign:
    type: string
    description: Подпись входящего запроса
