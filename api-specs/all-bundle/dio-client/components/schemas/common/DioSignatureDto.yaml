required:
- level
- signRequired
type: object
properties:
  level:
    type: string
    description: Уровень подписи
    enum:
    - SINGLE
    - LEVEL_1
    - LEVEL_2
  signRequired:
    type: boolean
    description: Требуется подпись
  docSourceSystem:
    type: string
    description: Система подписи документа
    enum:
    - UNKNOWN
    - WEB
    - MBC
    - MBC_NATIVE
    - DIRECT_1C
    - F1
    - SKVO
    - LK_UVED
    - TNF
    - IMPORT_SERVICE
    - SINGLE_WINDOW_SERVICE
    - OPEN_API_CB
    - MSB_IB
    - MSB_APP
  docSignPage:
    type: string
    description: Страница, с которой вызвана подпись документа
  signatureData:
    $ref: ./DioSignatureDataDto.yaml
  signed:
    type: boolean
description: Подпись ДИО
