required:
- attachmentId
- fileName
- fileStorageId
type: object
properties:
  attachmentId:
    type: string
    description: Id вложения
    format: uuid
  fileStorageId:
    type: string
    description: ID файла в файловом хранилище
    format: uuid
  fileName:
    type: string
    description: Имя файла
  format:
    type: string
    description: Формат файла вложения.
  hash:
    type: string
    description: Хеш-сумма файла.
  size:
    type: integer
    description: Размер файла.
    format: int64
  contentType:
    type: string
    description: Тип контента.
  uploadDateTime:
    type: string
    description: Дата и время загрузки
    format: date-time
description: Информация о вложении
