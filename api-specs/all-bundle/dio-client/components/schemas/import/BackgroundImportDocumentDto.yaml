type: object
properties:
  bankClientId:
    type: string
    description: Идентификатор клиента банка
    format: uuid
  position:
    type: integer
    description: Позиция
    format: int32
  documentStatus:
    type: string
    description: Статус подготовки импорта
    enum:
    - NONE
    - IMPORTED_ERROR
    - IMPORTED_CORRECT
    - IMPORTED_WARNING
    - IMPORTED_ACCESS_ERROR
    - IMPORTED_FLK_ERROR
  importConfirmed:
    type: boolean
    description: Признак подтверждения импорта
  pedId:
    type: string
    description: Идентификатор ПЭД
    format: uuid
  errorMessage:
    type: string
    description: Ошибки импорта
  flkErrors:
    type: array
    description: Ошибки контроля ФЛК
    items:
      $ref: ../common/FlkErrorDto.yaml
description: Документ сеанса импорта
