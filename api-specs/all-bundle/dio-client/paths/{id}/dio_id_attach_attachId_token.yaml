get:
  tags:
  - Клиентский API по работе с документами
  summary: Получение токена доступа к вложению
  description: 'Привилегии: DIO_CLIENT_CREATE, DIO_CLIENT_UPDATE, DIO_CLIENT_VIEW, DIO_CLIENT_SCROLLER_VIEW'
  operationId: getAccessToken
  parameters:
  - name: id
    in: path
    required: true
    schema:
      type: string
      format: uuid
  - name: attachId
    in: path
    required: true
    schema:
      type: string
      format: uuid
  responses:
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '200':
      description: OK
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/GenericResponseSimpleErrorDataString.yaml
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
