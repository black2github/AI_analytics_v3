post:
  tags:
  - Клиентский API по работе с документами
  summary: Создание / обновление документа
  description: 'Привилегии: DIO_CLIENT_CREATE, DIO_CLIENT_UPDATE'
  operationId: store
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/common/DioClientStoreDto.yaml
    required: true
  responses:
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '200':
      description: OK
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/GenericResponseSimpleErrorDataDioClientViewDto.yaml
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
