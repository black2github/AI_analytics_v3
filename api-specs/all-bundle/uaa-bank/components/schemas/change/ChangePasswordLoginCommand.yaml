required:
- newPassword
- newPasswordConfirm
- oldPassword
type: object
properties:
  oldPassword:
    type: string
    description: Текущий пароль
  newPassword:
    type: string
    description: Новый пароль
  newPasswordConfirm:
    type: string
    description: Новый пароль (подтверждение)
  captchaId:
    type: string
    description: ИД каптчи
    format: uuid
  captchaCode:
    type: string
    description: Код каптчи
description: Запрос смены пароля пользователя при входе
