required:
- clientId
- deviceId
- disableType
- userId
type: object
properties:
  userId:
    type: string
    description: Идентификатор пользователя
    format: uuid
  deviceId:
    type: string
    description: Идентификатор мобильного устройства
  clientId:
    type: string
    description: Идентификатор мобильного приложения
  disableType:
    type: string
    enum:
    - PIN
    - BIOMETRIC
description: ДТО удаления биометрии и PIN-кода в профиле пользователя из банковской среды
