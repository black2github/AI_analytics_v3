required:
- entity
- id
- serviceConsumer
- userType
- viewIfNotFoundRule
type: object
properties:
  id:
    type: string
    description: Идентификатор сущности
    format: uuid
  serviceConsumer:
    type: string
    description: Микросервис потребитель
  entity:
    type: string
    description: Бизнес-сущность
  userType:
    type: string
    enum:
    - CLIENT
    - BANK
    - TECHNICAL
  viewIfNotFoundRule:
    type: boolean
    description: Отображение записей при отсутствии правил
  operator:
    type: string
    enum:
    - AND
    - OR
  comment:
    type: string
    description: Пользовательский комментарий при создании или изменении записи
  createdAt:
    type: string
    description: Время создания записи
    format: date-time
  updatedAt:
    type: string
    description: Время изменении записи
    format: date-time
  updateInfo:
    $ref: ../common/UpdateInfoDto.yaml
description: Сведения о модели "Правила отображения записей"
