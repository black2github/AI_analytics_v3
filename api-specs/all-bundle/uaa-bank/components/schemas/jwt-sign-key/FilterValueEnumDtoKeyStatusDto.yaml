type: object
properties:
  contains:
    type: string
  notContains:
    type: string
  eq:
    type: string
    enum:
    - ACTIVE
    - VALID
    - PENDING
    - EXPIRED
    - REVOKED
    - DELETED
  notEq:
    type: string
    enum:
    - ACTIVE
    - VALID
    - PENDING
    - EXPIRED
    - REVOKED
    - DELETED
  in:
    type: array
    items:
      type: string
      enum:
      - ACTIVE
      - VALID
      - PENDING
      - EXPIRED
      - REVOKED
      - DELETED
  notIn:
    type: array
    items:
      type: string
      enum:
      - ACTIVE
      - VALID
      - PENDING
      - EXPIRED
      - REVOKED
      - DELETED
  isNull:
    type: boolean
