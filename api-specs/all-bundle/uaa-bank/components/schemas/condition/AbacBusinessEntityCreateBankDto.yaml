type: object
properties:
  name:
    type: string
    description: Уникальное наименование бизнес-сущности
  description:
    type: string
    description: Описание бизнес-сущности
  destinationUserType:
    type: string
    description: Тип пользователя, для которого будет применяться правило
  holder:
    type: string
    description: Наименование держателя сущности
  user:
    $ref: ./AbacBusinessEntityUserBankDto.yaml
  role:
    $ref: ./AbacBusinessEntityRoleDto.yaml
  condition:
    $ref: ./AbacBusinessEntityConditionDto.yaml
  consumer:
    type: string
    description: Код сервиса потребителя сущности
  requireExecution:
    type: boolean
    description: Индикатор обязательности исполнения правила
  operator:
    type: string
    enum:
    - AND
    - OR
  bankClientId:
    type: string
    description: Идентификатор Клиента Банка
    format: uuid
  comment:
    type: string
    description: Пользовательский комментарий при создании бизнес сущности
description: Модель для создания бизнес сущности для ABAC
