post:
  tags:
  - Агрегатор событий для дашборда
  summary: Получить сводный список событий в требуемом статусе (нарушение или отмена) для требуемого Клиента для дашборда
  description: 'Привилегии: hasAuthority(''TREASURY_COMMON'')'
  operationId: getDashboardViolatedOrDeniedEvents
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/violated-or-denied-events/DashboardViolatedOrDeniedEventsFilter.yaml
    required: true
  responses:
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '200':
      description: OK
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/violated-or-denied-events/GenericResponseErrorDataListDashboardViolatedOrDeniedEventDto.yaml
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
