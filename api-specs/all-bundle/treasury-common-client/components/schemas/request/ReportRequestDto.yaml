type: object
properties:
  id:
    type: string
    description: Идентификатор
    format: uuid
    example: 123e4567-e89b-12d3-a456-426614174000
  userId:
    type: string
    description: Идентификатор пользователя создавшего заявку
    format: uuid
    example: 123e4567-e89b-12d3-a456-426614174000
  reportType:
    type: string
    description: Тип отчета
    enum:
    - DENIED
    - VIOLATED
  userFullName:
    type: string
    description: ФИО пользователя
  userEmail:
    type: string
    description: Email пользователя
  sendByEmailConsent:
    type: boolean
    description: Согласие на получение данных по email
  format:
    type: string
    description: Формат отчета
    enum:
    - PDF
    - XLS
    - TXT_1C_102
    - TXT_1C_103
  requestNumber:
    type: integer
    description: Номер заявки
    format: int32
  requestDate:
    type: string
    description: Дата заявки
    format: date
  status:
    type: string
    description: Статус заявки
    enum:
    - REJECTED
    - ACTIVE
  clientWebDealing:
    $ref: ../common/ClientWebDealingDto.yaml
  frequency:
    type: string
    description: Интервал отчета
    enum:
    - ON_EVENT
description: Страница с данными
