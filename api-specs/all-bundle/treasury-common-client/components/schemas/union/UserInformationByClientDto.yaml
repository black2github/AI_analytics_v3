type: object
properties:
  clientId:
    type: string
    description: Идентификатор клиента
    format: uuid
    example: 123e4567-e89b-12d3-a456-426614174000
  clientWebDealingId:
    type: string
    description: Идентификатор клиента в ВебДилинг
    format: uuid
    example: 123e4567-e89b-12d3-a456-426614174000
  clientFullName:
    type: string
    description: Полное наименование Клиента
  clientShortName:
    type: string
    description: Краткое наименование Клиента
  signer:
    type: boolean
    description: Пользователь является подписантом с ЭП
  signerSimple:
    type: boolean
    description: Пользователь является подписантом с ПЭП
  systemAgreementExist:
    type: boolean
    description: Наличие глобальных соглашений
  privilegesNewStyle:
    type: boolean
    description: Тип привилегий пользователя
  userInformationByDealType:
    type: array
    description: Информация о доступе по типу сделки
    items:
      $ref: ./UserInformationByDealTypeDto.yaml
  accountsExist:
    type: boolean
    description: Наличие счетов
  accountsInternalExist:
    type: boolean
    description: Наличие внутренних счетов
  accountsInternalForGenAgrMNOExist:
    type: boolean
    description: Наличие внутренних счетов для заключения генсоглашений МНО
  accountsExternalExist:
    type: boolean
    description: Наличие внешних счетов
  accountsPrivilegeLevel:
    type: string
    description: Уровень доступа по счетов
    enum:
    - NONE
    - VIEW
    - EDIT
    - SIGN
  generalAgreementsExist:
    type: boolean
    description: Наличие генеральных соглашений
  generalAgreementsDUExist:
    type: boolean
    description: Наличие генеральных соглашений ДУ
  generalAgreementsBlockedExist:
    type: boolean
    description: Наличие неактивных генеральных соглашений
  generalAgreementsPrivilegeLevel:
    type: string
    description: Уровень доступа по генеральным соглашениям
    enum:
    - NONE
    - VIEW
    - EDIT
    - SIGN
  gsnoReportsPrivilegeLevel:
    type: string
    description: Уровень доступа по отчетам ГСНО
    enum:
    - NONE
    - VIEW
    - EDIT
    - SIGN
  depositReportsPrivilegeLevel:
    type: string
    description: Уровень доступа по отчетам по депозитам
    enum:
    - NONE
    - VIEW
    - EDIT
    - SIGN
  agrReqGsnoChildHeadPrivilegeLevel:
    type: string
    description: Уровень доступа по ГСНО оферте
    enum:
    - NONE
    - VIEW
    - EDIT
    - SIGN
  addReqChangeAccountsPrivilegeLevel:
    type: string
    description: Уровень доступа по ГСНО изменение списка счетов
    enum:
    - NONE
    - VIEW
    - EDIT
    - SIGN
  deniedNotificationsPrivilegeLevel:
    type: string
    description: Уровень доступа на создание заявок по отмененным сделкам
    enum:
    - NONE
    - VIEW
    - EDIT
    - SIGN
  violatedNotificationsPrivilegeLevel:
    type: string
    description: Уровень доступа на создание заявок по нарушенным сделкам
    enum:
    - NONE
    - VIEW
    - EDIT
    - SIGN
  dealsExist:
    type: boolean
    description: Наличие сделок у организации
  dealsPrivilegeLevel:
    type: string
    description: Общий уровень доступа по сделкам для огранизации
    enum:
    - NONE
    - VIEW
    - EDIT
    - SIGN
description: Информация о пользователе по клиенту
