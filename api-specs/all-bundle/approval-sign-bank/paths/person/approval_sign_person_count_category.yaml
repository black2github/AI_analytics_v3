post:
  tags:
  - API Для работы со скроллером визирования.
  summary: Запрос данных о категориях и количестве визирующих лиц
  description: 'Привилегии: TNF_APPROVAL.COMMON_SCROLLER_VIEW'
  operationId: getCategories
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/person/GetPageCommandApprovalScrollerFilterDto.yaml
    required: true
  responses:
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '200':
      description: OK
      content:
        '*/*':
          schema:
            type: array
            items:
              $ref: ../../components/schemas/person/ApprovalPersonKindData.yaml
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
