get:
  operationId: getLastByOnboardingRequestId
  parameters:
  - in: path
    name: onboardingId
    required: true
    schema:
      type: string
      format: uuid
  responses:
    '200':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/GenericResponseSimpleErrorDataQrcCommissionPaymentDto.yaml
      description: OK
    '400':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
      description: Bad Request
    '401':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
      description: Unauthorized
    '403':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
      description: Forbidden
    '415':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
      description: Unsupported Media Type
    '423':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
      description: Locked
    '500':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
      description: Internal Server Error
  summary: Получение послендюю обрабатываемую оплату по идентификатору заявки.
  tags:
  - Информация об оплате комиссии по QRC.
