    name: start_date
    required: true
    schema:
      type: string
      format: date-time
  - in: query
    name: end_date
    required: true
    schema:
      type: string
      format: date-time
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/define-revoked-suffered-persons/RevokeSufferedResponse.yaml
