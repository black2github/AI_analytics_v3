post:
  tags:
  - API для Openapi запросов Мультибанкинга. Операции с Согласием
  summary: Создать неавторизованное Согласие на доступ к счету
  operationId: createUnauthorized
  parameters:
  - name: Authorization
    in: header
    required: true
    schema:
      type: string
  - name: x-fapi-auth-date
    in: header
    required: false
    schema:
      type: string
  - name: x-fapi-customer-ip-address
    in: header
    required: false
    schema:
      type: string
  - name: x-idempotency-key
    in: header
    required: false
    schema:
      type: string
  - name: x-customer-user-agent
    in: header
    required: false
    schema:
      type: string
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/misc/ConsentCreateOApiRqDto.yaml
    required: true
  responses:
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '200':
      description: OK
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/misc/ConsentOApiDto.yaml
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '405':
      description: Method Not Allowed
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
