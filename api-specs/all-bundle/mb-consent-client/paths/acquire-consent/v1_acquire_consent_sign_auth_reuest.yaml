  - API получение заявок на согласие
  summary: Подписать request токен
  description: 'Привилегии: MULTIBANKING.CLIENT.GENERAL'
  operationId: signWithJws
  parameters:
  - name: bankName
    in: query
    required: true
    schema:
      type: string
  - name: payload
    in: query
    required: true
