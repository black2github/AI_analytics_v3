type: object
properties:
  contains:
    type: string
  notContains:
    type: string
  eq:
    type: string
    enum:
    - RESERVED
    - ANNULLED
    - OPENED
    - CLOSED
    - TO_OPEN
    - TO_CLOSE
  notEq:
    type: string
    enum:
    - RESERVED
    - ANNULLED
    - OPENED
    - CLOSED
    - TO_OPEN
    - TO_CLOSE
  in:
    type: array
    items:
      type: string
      enum:
      - RESERVED
      - ANNULLED
      - OPENED
      - CLOSED
      - TO_OPEN
      - TO_CLOSE
  notIn:
    type: array
    items:
      type: string
      enum:
      - RESERVED
      - ANNULLED
      - OPENED
      - CLOSED
      - TO_OPEN
      - TO_CLOSE
  isNull:
    type: boolean
description: Состояния счетов, при наличии которых следует устанавливать соответствия принадлежности отделений, у которого имеются счета (вхождение по in)
