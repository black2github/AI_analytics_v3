get:
  tags:
  - Справочник документов согласий
  summary: Получить тело действующего документа согласия
  operationId: getActualConsentDocumentContent
  parameters:
  - name: type
    in: path
    required: true
    schema:
      type: string
      enum:
      - CONSENT_OF_PERSONAL_DATA
  - name: Locale-Code
    in: header
    required: false
    schema:
      type: string
      default: RU
  responses:
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '405':
      description: Method Not Allowed
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '200':
      description: OK
      content:
        '*/*':
          schema:
            type: array
            items:
              type: string
              format: byte
