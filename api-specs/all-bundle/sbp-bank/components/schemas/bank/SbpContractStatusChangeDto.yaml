type: object
description: Запрос смены статуса заявки СБП.
properties:
  id:
    type: string
    format: uuid
    description: Идентификатор заявки
  nextStatus:
    type: string
    description: Статус, на который необходимо сменить заявку.
    enum:
    - NONE
    - DRAFT
    - NEW
    - DELETED
    - SIGNED
    - DELIVERED
    - DETAILS_VALID
    - SIGN_VALID
    - RECEIVED
    - EXPORT_TO_TESSA
    - EXPORT_TO_TESSA_ERROR
    - EXECUTED_BY_TESSA
    - CLIENT_REGISTRATION_DELIVERED
    - CLIENT_REGISTRATION_RECEIVED
    - CLIENT_REGISTRATION_ERROR
    - CLIENT_REGISTERED
    - ACCOUNTS_REGISTRATION
    - ACCOUNTS_REGISTRATION_ERROR
    - ACCOUNTS_REGISTERED
    - EXPORT_AGENTS_PRE_CONNECTION_TO_AS_SBP
    - EXPORT_TO_AS_SBP_AGENTS_PRE_CONNECTION_ERROR
    - EXECUTED_BY_AS_SBP_AGENTS_PRE_CONNECTION
    - EXPORT_REQUEST_TO_F1
    - EXPORT_REQUEST_TO_F1_ERROR
    - REQUEST_EXECUTED_BY_F1
    - EXPORT_AGENTS_CONNECTION_TO_AS_SBP
    - EXPORT_TO_AS_SBP_AGENTS_CONNECTION_ERROR
    - EXECUTED_BY_AS_SBP_AGENTS_CONNECTION
    - EXECUTED
    - REJECTED
  legalId:
    type: string
    description: Идентификатор Клиента в АС СБП
  commentForClient:
    type: string
    description: Комментарий к смене статуса для клиента
  commentForBank:
    type: string
    description: Комментарий к смене статуса для банка
required:
- id
