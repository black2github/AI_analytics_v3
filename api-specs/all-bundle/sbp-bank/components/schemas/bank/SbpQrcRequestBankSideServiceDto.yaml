type: object
description: Заявка на регистрацию QR-кода в системе АС СБП для сервиса ЭКО
properties:
  id:
    type: string
    format: uuid
    description: Идентификатор заявки
  version:
    type: integer
    format: int32
    description: Версия
  docNumber:
    type: integer
    format: int32
    description: Номер заявки
  docDate:
    type: string
    format: date-time
    description: Дата заявки
  status:
    type: string
    description: Текущий статус обработки заявки
    enum:
    - NONE
    - DRAFT
    - DELETED
    - NEW
    - DELIVERED
    - DETAILS_VALID
    - RECEIVED
    - REGISTRATION_ERROR
    - REGISTRATION_REQUEST
    - QR_CREATED
    - SUBS_CREATED
    - REGISTERED
    - QRC_IMAGE_REQUEST
    - QRC_IMAGE_NOT_RECEIVED
    - QRC_IMAGE_RECEIVED
    - REJECTED
    - EXECUTED
    - REGISTRATION_WAIT
  commentForBank:
    type: string
    description: Комментарий для Банка
  clientRequest:
    type: boolean
    description: 'Признак создания заявки клиентом банка: "true" - заявка создана Клиентом, "false" - заявка создана через сервис Банка'
  userId:
    type: string
    format: uuid
    description: Идентификатор пользователя
  userName:
    type: string
    description: Пользователь, создавший заявку (ФИО)
  data:
    $ref: ./SbpQrcRequestBankSideServiceDataDto.yaml
    description: Реквизиты QR-кода
  qrcId:
    type: string
    description: Идентификатор зарегистрированного QR кода в СБП
  payload:
    type: string
    description: Payload зарегистрированного QR кода в СБП
  sideServiceData:
    $ref: ./SbpQrcRequestBankSideServiceInfoDto.yaml
    description: Реквизиты сервиса, инициировавшего заявку
  additionalData:
    type: array
    description: Распределение платежа
    items:
      $ref: ../common/SbpQrcAdditionalDataDto.yaml
  redirectUrl:
    type: string
    description: Ссылка для автоматического возврата
  callbackMerchantNotifications:
    type: string
    description: Url для получения сообщения
required:
- docDate
- docNumber
- id
- status
- userId
- userName
