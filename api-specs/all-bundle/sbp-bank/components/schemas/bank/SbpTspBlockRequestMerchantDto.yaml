type: object
description: Реквизиты ТСП по заявке на блокировку/разблокировку ТСП
properties:
  merchantId:
    type: string
    description: Идентификатор точки продаж в АС СБП
  merchantName:
    type: string
    description: Название точки продаж
  mccCode:
    type: string
    description: Код МСС
  countryCode:
    type: string
    description: Код страны регистрации ЮЛ
  city:
    type: string
    description: Город
  zip:
    type: string
    description: Индекс
  merchantAddress:
    type: string
    description: Адрес точки продаж
  phoneNumber:
    type: string
    description: Телефон точки продаж
  regDate:
    type: string
    format: date-time
    description: Дата регистрации ТСП
  salesMode:
    type: string
    description: 'Способ приема оплаты ТСП '
    enum:
    - REMOTE
    - FACE_TO_FACE
  url:
    type: string
    description: Веб-сайт ТСП
  inn:
    type: string
    description: ИНН
  merchantStatus:
    type: string
    description: Текущий статус ТСП
    enum:
    - ACTIVE
    - BLOCKED
  updateStatusDate:
    type: string
    format: date-time
    description: 'Дата последнего изменения статуса ТСП '
required:
- merchantId
