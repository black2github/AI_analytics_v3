type: object
description: Реквизиты QR-кода
properties:
  amount:
    type: integer
    format: int64
    description: Сумма платежа
  merchantName:
    type: string
    description: Наименование ТСП
  account:
    type: string
    description: Счет
  merchantAddress:
    type: string
    description: Адрес ТСП
  merchantId:
    type: string
    description: Идентификатор ТСП
  paymentPurpose:
    type: string
    description: Дополнительные информация от ТСП
  accountId:
    type: integer
    format: int64
    description: ID счета в Ф1.
  ecoAccountId:
    type: string
    format: uuid
    description: ID счета в ЭКО
required:
- account
- accountId
- amount
- merchantAddress
- merchantId
- merchantName
