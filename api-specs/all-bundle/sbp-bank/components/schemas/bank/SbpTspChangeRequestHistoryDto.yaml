type: object
description: История изменений Заявки на редактирование параметров ТСП.
properties:
  id:
    type: string
    format: uuid
    description: Идентификатор записи
  documentId:
    type: string
    format: uuid
    description: Ссылка на сущность "на редактирование параметров ТСП"
  status:
    type: string
    description: Статус документа
  changedIn:
    type: string
    format: date-time
    description: Дата и время присвоения статуса документу
  userId:
    type: string
    format: uuid
    description: Ссылка на сущность "Пользователь"
  userType:
    type: string
    description: Тип пользователя
    enum:
    - CLIENT
    - BANK
    - TECHNICAL
  userName:
    type: string
    description: Имя пользователя
  commentForClient:
    type: string
    description: Комментарий для Клиента
  commentForBank:
    type: string
    description: Комментарий для Банка
