type: object
description: Фильтр по типу обобщенной заявки с агентами
properties:
  contains:
    type: string
  notContains:
    type: string
  eq:
    type: string
    enum:
    - SBP_CONTRACT
    - DISCONNECT_REQUEST
  notEq:
    type: string
    enum:
    - SBP_CONTRACT
    - DISCONNECT_REQUEST
  in:
    type: array
    items:
      type: string
      enum:
      - SBP_CONTRACT
      - DISCONNECT_REQUEST
  notIn:
    type: array
    items:
      type: string
      enum:
      - SBP_CONTRACT
      - DISCONNECT_REQUEST
  isNull:
    type: boolean
