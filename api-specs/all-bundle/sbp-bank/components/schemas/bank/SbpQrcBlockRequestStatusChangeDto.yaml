type: object
description: ДТО с данными для смены статуса заявки на блокировку QR-кода
properties:
  id:
    type: string
    format: uuid
    description: Идентификатор заявки
  nextStatus:
    type: string
    description: Статус, на который необходимо сменить заявку.
    enum:
    - NONE
    - NEW
    - DELIVERED
    - DETAILS_VALID
    - RECEIVED
    - BLOCK_ERROR
    - BLOCK_REQUEST
    - REQUEST_EXECUTED
    - QR_BLOCKED
    - SUBS_BLOCKED
    - REJECTED
    - EXECUTED
  commentForClient:
    type: string
    description: Комментарий к смене статуса для клиента
  commentForBank:
    type: string
    description: Комментарий к смене статуса для банка
required:
- id
- nextStatus
