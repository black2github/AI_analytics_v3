type: object
description: ДТО запроса смены статуса заявки на регистрацию QR-кода
properties:
  id:
    type: string
    format: uuid
    description: Идентификатор заявки
  nextStatus:
    type: string
    description: Статус, на который необходимо сменить заявку.
    enum:
    - NONE
    - DRAFT
    - DELETED
    - NEW
    - DELIVERED
    - DETAILS_VALID
    - RECEIVED
    - REGISTRATION_ERROR
    - REGISTRATION_REQUEST
    - QR_CREATED
    - SUBS_CREATED
    - REGISTERED
    - QRC_IMAGE_REQUEST
    - QRC_IMAGE_NOT_RECEIVED
    - QRC_IMAGE_RECEIVED
    - REJECTED
    - EXECUTED
    - REGISTRATION_WAIT
  commentForClient:
    type: string
    description: Комментарий к смене статуса для клиента
  commentForBank:
    type: string
    description: Комментарий к смене статуса для банка
required:
- id
- nextStatus
