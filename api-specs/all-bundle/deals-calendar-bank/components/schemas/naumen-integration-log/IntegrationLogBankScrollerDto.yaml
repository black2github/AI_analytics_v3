type: object
properties:
  id:
    type: string
    description: Идентификатор запроса в Экосистеме
    format: uuid
  taskId:
    type: string
    description: Идентификатор задачи в Naumen
  uaaUserId:
    type: string
    description: Идентификатор пользователя, uaaUserId
    format: uuid
  userFio:
    type: string
    description: ФИО пользователя
  status:
    type: string
    description: Статус запроса
    enum:
    - SUCCESS
    - FAILURE
  type:
    type: string
    description: Тип запроса
    enum:
    - NAUMEN_MEETING_MANAGE
    - CALENDAR_MEETING_CREATE
    - GET_TIME_SLOTS
    - MEETING_EDIT
    - LBP_MEETING_CANCEL
    - LBP_MEETING_MANAGE
    - LBP_MEETING_CREATE
    - LBP_MEETING_EDIT
    - LBP_GET_DATES
    - LBP_GET_TIME_SLOTS
    - LBP_GET_POLYGONS
  createdAt:
    type: string
    description: Дата и время создания запроса
    format: date-time
  errorText:
    type: string
    description: Текст ошибки запроса
  errorCode:
    type: string
    description: Код ошибки интеграции
    enum:
    - BAD_REQUEST
    - UNAUTHORIZED
    - REQUEST_TIMEOUT
    - EXCEPTION
    - NOT_FOUND
    - ALREADY_EXISTS
    - BUSINESS_VALIDATION_ERROR
  lbpDeliveryId:
    type: string
    description: Идентификатор доставки в ЛБП
    format: uuid
description: Страница с данными
