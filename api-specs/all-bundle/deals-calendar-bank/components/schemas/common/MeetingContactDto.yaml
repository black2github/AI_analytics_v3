required:
- email
- fio
- phone
type: object
properties:
  fio:
    maxLength: 255
    pattern: ^[А-ЯЁа-яё IV.-]+$
    type: string
    description: ФИО контактного лица
  surname:
    maxLength: 255
    pattern: ^[А-ЯЁа-яё IV.-]+$
    type: string
    description: Фамилия контактного лица
  name:
    maxLength: 255
    pattern: ^[А-ЯЁа-яё IV.-]+$
    type: string
    description: Имя контактного лица
  patronymic:
    maxLength: 255
    pattern: ^[А-ЯЁа-яё IV.-]+$
    type: string
    description: Отчество контактного лица
  phone:
    pattern: ^\+79[0-9]{9}$
    type: string
    description: Телефон контактного лица
  email:
    maxLength: 255
    pattern: ^[-A-Za-z0-9~!#$%^&*_=+}{\'`?\.\|/]+@[-a-zA-Z0-9\.]+$
    type: string
    description: E-mail контактного лица
description: Контактное лицо по встрече
