type: object
properties:
  id:
    type: string
    description: Идентификатор
    format: uuid
    example: 123e4567-e89b-12d3-a456-426614174000
  docType:
    type: string
    description: Тип соглашения
  userId:
    type: string
    description: Идентификатор пользователя
    format: uuid
    example: 123e4567-e89b-12d3-a456-426614174000
  userFullName:
    type: string
    description: Ф.И.О. пользователя
  docNumber:
    type: integer
    description: Номер документа
    format: int32
  docDate:
    type: string
    description: Дата и время создания документа
    format: date
  docPrintTemplateVersion:
    type: integer
    description: Номер версии печатной формы документа
    format: int32
