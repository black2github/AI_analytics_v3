    type: string
    description: Срок заключения соглашения
    enum:
    - YEAR_1
    - YEAR_3
    - YEAR_5
    - YEAR_10
  docVersion:
    type: string
    description: Версия документа
    enum:
    - V1
    - V2
  agreementEndDate:
    type: string
    description: Дата окончания действия
    format: date
  acceptGSNOChild:
    type: boolean
    description: Подтверждаем присоединение
  acceptClientHead:
    type: boolean
    description: Подтверждение привилегий головной компании
  acceptGSNOChildTerms:
    type: boolean
    description: Подтверждаем, что ознакомлены с условиями присоединения
  checkList:
    $ref: ./AgreementRequestGSNOChildFriendCheckListDto.yaml
description: Данные
