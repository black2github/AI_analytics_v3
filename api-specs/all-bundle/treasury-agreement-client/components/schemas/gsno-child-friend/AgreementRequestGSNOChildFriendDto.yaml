    - SENT_TO_CLIENT_FRIEND
    - RECEIVED
    - ASSIGNED
    - VERIFIED_BY_BANK
    - READY_TO_SIGN
    - SIGNED_BY_BANK
    - ACCEPTED
    - EXECUTED
