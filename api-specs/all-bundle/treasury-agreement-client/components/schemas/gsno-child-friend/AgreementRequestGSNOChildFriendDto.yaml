    - NONE
    - DRAFT
    - DRAFT_BANK
    - DRAFT_OR_NEW
    - DRAFT_BANK_OR_NEW_BANK
    - NEW
    - NEW_BANK
    - SIGNED_BY_CLIENT
    - DELETED
    - DELIVERED
    - DETAILS_VALID
    - CLIENT_SIGN_VALID_OR_REJECTED
    - CLIENT_SIGN_VALID
    - DETAILS_VALID_OR_DETAILS_REJECTED
    - RECEIVED_OR_CHECKLIST_REJECTED
    - RECEIVED_OR_WAITING_FOR_VISA
    - WAITING_FOR_VISA
