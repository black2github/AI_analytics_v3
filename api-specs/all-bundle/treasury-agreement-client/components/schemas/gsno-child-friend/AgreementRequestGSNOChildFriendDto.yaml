    type: string
    description: Дата соглашения
    format: date
  beginDate:
    type: string
    description: Дата начала действия
    format: date
  endDate:
    type: string
    description: Дата окончания действия
    format: date
  executorId:
    type: string
    description: Исполнитель по заявке
    format: uuid
    example: 123e4567-e89b-12d3-a456-426614174000
  executorFullName:
    type: string
    description: Ф.И.О. исполнителя по заявке
  additionalDataIsFulledUp:
    type: boolean
    description: Дополнительные данные полностью заполнены
  additionalDataIsValid:
    type: boolean
    description: Дополнительные данные корректны
  clientSignature:
    $ref: ../common/SignatureDto.yaml
  bankSignature:
    $ref: ../common/SignatureDto.yaml
  visaSignature:
    $ref: ../common/SignatureDto.yaml
  attachments:
    type: array
    description: Вложения
    items:
      $ref: ../common/AgreementRequestAttachmentDto.yaml
