    format: date-time
  signCheckAt:
    type: string
    description: Дата и время проверки подписи
    format: date-time
  earlyRefund:
    type: boolean
    description: Возможность досрочного истребования
  earlyRefundRateRub:
    type: string
    description: Ставка досрочного истребования для рублей
  earlyRefundRateCur:
    type: string
    description: Ставка досрочного истребования для валюты
  isVisaNeeded:
    type: boolean
    description: Необходимо визирование
  isVisaCanceled:
    type: boolean
    description: Визирование отменено
  clientInfoVisa:
    $ref: ../common/ClientInfoDto.yaml
  visaType:
    type: string
    description: Тип наложенной визы
    enum:
    - POSITIVE
    - NEGATIVE
  visaComment:
    type: string
    description: Комментарий визирующего для Клиента
  sendingForVisaAt:
    type: string
    description: Отправлен на визирование
    format: date-time
  processedInPkp:
    type: boolean
    description: Обработан в ПКП
  docSubType:
    type: string
    description: Тип оферты GSNO_CHILD_HEAD - оригинал или копия
    enum:
    - ORIGINAL
    - COPY
  efrOfferProductCode:
    type: string
    description: Идентификатор динамического продуктового предложения (ДПП)
  efrOfferSourcePage:
    type: string
    description: Страница источник баннера ЕФР (Единое фронтальное решение)
  linkedGSNOChildId:
    type: string
    description: Идентификатор связанного документа
    format: uuid
    example: 123e4567-e89b-12d3-a456-426614174000
  clientInfoHead:
    $ref: ../common/ClientInfoDto.yaml
  agreementInfoHead:
    $ref: ../common/DealDocGeneralAgreementDto.yaml
  clientInfoFriend:
    $ref: ../common/ClientInfoDto.yaml
