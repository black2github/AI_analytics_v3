post:
  tags:
  - Заявка на заключение генерального соглашения. Скроллер.
  summary: Получить заявки по данным из соглашения
  description: 'Привилегии: (#eco.userTypeIs(''BANK'') OR #eco.userTypeIs(''TECHNICAL'') OR (#eco.userTypeIs(''CLIENT'') AND hasAuthority(''TREASURY_COMMON''))) AND hasAuthority(''TREASURY_AGREEMENT_REQUEST_MNO_VIEW'')'
  operationId: getRequestsByAgreements
  requestBody:
    content:
      application/json:
        schema:
          type: array
          items:
            $ref: ../../components/schemas/misc/AgreementRequestEnrichInfo.yaml
    required: true
  responses:
    '200':
      description: OK
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/misc/GenericResponseErrorDataListAgreementRequestDtoObject.yaml
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/GenericResponseErrorDataObject.yaml
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
