post:
  tags:
  - АPI пользовательских параметров
  summary: Создать или редактировать пользовательский параметр
  description: 'Привилегии: ((#eco.userTypeIs(''CLIENT'') AND hasAuthority(''TREASURY_COMMON'')) OR #eco.userTypeIs(''BANK'') OR #eco.userTypeIs(''TECHNICAL'')) AND hasAuthority(''TREASURY_AGREEMENT_USER_PARAM_CREATE_AND_UPDATE'')'
  operationId: createOrUpdate
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/misc/GenericCommandUserParamDto.yaml
    required: true
  responses:
    '200':
      description: OK
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/misc/GenericResponseErrorDataUserParamDto.yaml
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/GenericResponseErrorDataObject.yaml
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
