required:
- authorityCertId
- csr
- notAfter
- notBefore
- signAlgorithm
type: object
properties:
  csr:
    type: string
    description: CSR (base64)
  notBefore:
    type: string
    description: Дата начала действия сертификата
    format: date-time
  notAfter:
    type: string
    description: Дата окончания действия сертификата
    format: date-time
  signAlgorithm:
    type: string
    description: Алгоритм подписи
    enum:
    - GOST_3410_WITH_GOST_3411_2012_512
  authorityCertId:
    type: string
    description: Идентификатор сертификата издателя
    format: uuid
description: Запрос сертификата по CSR
