    format: uuid
    example: 123e4567-e89b-12d3-a456-426614174000
  accountNumber:
    type: string
    description: Номер счета
  bic:
    type: string
    description: БИК счета
  currency:
    type: string
    description: Валюта счета
  absF1Id:
    type: string
    description: Идентификатор счета в РКО Ф1
    format: uuid
    example: 123e4567-e89b-12d3-a456-426614174000
  bankDecision:
    type: string
    description: Решение банковского сотрудника по счёту
    enum:
    - APPROVED
    - REFUSED
description: Список счетов для удаления
