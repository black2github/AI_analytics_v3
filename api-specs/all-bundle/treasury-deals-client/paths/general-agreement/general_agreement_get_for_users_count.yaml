post:
  tags:
  - API для работы с генеральными соглашениями
  summary: Количество генеральных соглашений всего у клиентов
  description: 'Привилегии: (#eco.userTypeIs(''CLIENT'') AND hasAuthority(''TREASURY_COMMON'') AND hasAuthority(''TREASURY_GENERAL_AGREEMENTS_COMMON'')) OR ((#eco.userTypeIs(''BANK'') OR #eco.userTypeIs(''TECHNICAL'')) AND hasAuthority(''TREASURY_GENERAL_AGREEMENT_VIEW''))'
  operationId: getCountForUsersWithFilter
  parameters:
  - name: statuses
    in: query
    required: true
    schema:
      uniqueItems: true
      type: array
      items:
        type: string
        enum:
        - ACTIVE
        - ENDED
        - BLOCKED
        - DELETED
  - name: usages
    in: query
    required: true
    schema:
      uniqueItems: true
      type: array
      items:
        type: string
        enum:
        - DEPOSIT
        - MNO
        - GSNO
        - FX
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/general-agreement/GenericCommandSetUUID.yaml
    required: true
  responses:
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/SingleResponseObject.yaml
    '200':
      description: OK
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/GenericResponseErrorDataLong.yaml
    '409':
      description: Conflict
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/SingleResponse.yaml
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
