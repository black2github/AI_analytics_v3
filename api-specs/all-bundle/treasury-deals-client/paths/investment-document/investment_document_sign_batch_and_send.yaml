post:
  tags:
  - API пакетного подписания документов
  summary: Подписать и отправить заявки в банк
  description: 'Привилегии: #eco.userTypeIs(''CLIENT'') AND hasAuthority(''TREASURY_COMMON'') AND (hasAuthority(''TREASURY_DEPOSIT_DEALS_COMMON'') OR hasAuthority(''TREASURY_MNO_DEALS_COMMON'') OR hasAuthority(''TREASURY_GSNO_DEALS_COMMON''))'
  operationId: signBatchAndSend
  parameters:
  - name: X-Forwarded-For
    in: header
    required: true
    schema:
      type: string
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/investment-document/BatchSignCommand.yaml
    required: true
  responses:
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/SingleResponseObject.yaml
    '200':
      description: OK
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/investment-document/GenericResponseErrorDataListSignResultDto.yaml
    '409':
      description: Conflict
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/SingleResponse.yaml
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
