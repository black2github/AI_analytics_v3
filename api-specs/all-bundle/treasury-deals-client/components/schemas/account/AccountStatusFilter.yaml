type: object
properties:
  contains:
    type: string
  notContains:
    type: string
  eq:
    type: string
    enum:
    - ACTIVE
    - BLOCKED
    - DELETED
  notEq:
    type: string
    enum:
    - ACTIVE
    - BLOCKED
    - DELETED
  in:
    type: array
    items:
      type: string
      enum:
      - ACTIVE
      - BLOCKED
      - DELETED
  notIn:
    type: array
    items:
      type: string
      enum:
      - ACTIVE
      - BLOCKED
      - DELETED
  isNull:
    type: boolean
