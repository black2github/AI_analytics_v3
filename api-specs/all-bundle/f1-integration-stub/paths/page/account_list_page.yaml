get:
  summary: Список всех записей из таблицы GPS_ECO_LIST_ACCS
  tags:
  - Обновление заглушек GPS_ECO_LIST_ACCS (Счета клиента в Ф1)
  parameters:
  - name: limit
    in: query
    schema:
      type: object
      description: Количество записей
      default: 100
      minimum: 1
    required: false
  - name: offset
    in: query
    schema:
      type: object
      description: Смещение
      default: 0
      minimum: 0
    required: false
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/page/PageDataAccountListDto.yaml
