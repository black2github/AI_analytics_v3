post:
  summary: Список возможных для закрытия счетов из таблицы VW_RPT_GPB_ECO_CLOSE_ACC
  tags:
  - Обновление заглушек VW_RPT_GPB_ECO_CLOSE_ACC (счета для закрытия в Ф1)
  parameters:
  - name: limit
    in: query
    schema:
      type: object
      description: Количество записей
      default: 100
      minimum: 1
    required: false
  - name: offset
    in: query
    schema:
      type: object
      description: Смещение
      default: 0
      minimum: 0
    required: false
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/page/AccountToClosePossibilityRqDto.yaml
    required: true
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/page/PageDataAccountToClosePossibilityRspDto.yaml
    '400':
      description: Bad Request
