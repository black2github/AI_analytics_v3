post:
  summary: Создание записи в таблице gps_eco_accs_det_ref_rates
  tags:
  - Обновление заглушек gps_eco_accs_det (Информация о тарифах по счету в Ф1)
  parameters:
  - name: accountTariffId
    in: path
    required: true
    schema:
      $ref: ../../components/schemas/common/UUID.yaml
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/{accountTariffId}/AccountTariffReferenceRateDto.yaml
    required: true
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/{accountTariffId}/AccountTariffReferenceRateDto.yaml
    '400':
      description: Bad Request
