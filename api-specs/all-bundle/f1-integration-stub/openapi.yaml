openapi: 3.1.0
info:
  title: Стаб сервис для Онлайн-адаптер РКО Ф1
  version: 3.6.0
  description: Сервис
servers:
- url: /f1-integration-stub
tags:
- name: Обновление данных для процедуры RUN_MSG онлайн-адаптера Ф1
- name: Обновление данных заглушек в таблице f1_client_tariff_plan (Тарифный план Клиента Банка в Ф1)
- name: Обновление данных заглушек в таблице f1_client_tariff_plan_limit (Лимиты тарифных планов Клиента Банка в Ф1)
- name: Обновление заглушек GPS_ECO_CNT_CCARD_ACCL (Блок с информацией о числе действующих карт или ошибке обработки для конкретного счета (ГС))
- name: Обновление заглушек GPS_ECO_LIST_ACCS (Счета клиента в Ф1)
- name: Обновление заглушек GPS_ECO_LIST_ACCS_ERR (Ошибочные ответы для счета клиента в Ф1)
- name: Обновление заглушек GPS_ECO_SMS_INFO_ACCS (счет и тариф для списания комиссии (смс-информирование))
- name: Обновление заглушек VW_RPT_GPB_ECO_CLOSE_ACC (счета для закрытия в Ф1)
- name: Обновление заглушек VW_RPT_GPB_KXD_RST_PLN_ECO (баланс счета в Ф1)
- name: Обновление заглушек VW_RPT_GPB_KXD_RST_PLN_ECO_ERR (эмуляции ошибок на запрос об остатках на счетах)
- name: Обновление заглушек VW_RPT_GPS_CARDS_ECO (Данные о корпоративной карте)
- name: Обновление заглушек VW_RPT_GPS_CARDS_IRAO_ECO (Данные о локальной карте питания карте)
- name: Обновление заглушек VW_RPT_GPS_CARD_ACCOUNTS_ECO (Данные о счетах корпоративных карт)
- name: Обновление заглушек VW_RPT_GPS_CARD_ACC_DOCS_ECO (Данные об операции по счету корпоративной карты)
- name: Обновление заглушек VW_RPT_GPS_CARD_DOCS_ECO (Данные об операции по корпоративной карте)
- name: Обновление заглушек VW_RPT_GPS_CARD_DOCS_IRAO_ECO (Данные о транзакциях по локальной карте питания)
- name: Обновление заглушек VW_RPT_GPS_CL_PRIV_ESK_ECO (Данные о связи АБС ИД и ЕСК ИД физ.лица)
- name: Обновление заглушек gps_eco_accs_det (Информация о тарифах по счету в Ф1)
- name: Обновление заглушек gps_eco_accs_det_err (Ошибочные ответы для тарифа по счету в Ф1)
- name: Обновление заглушек gps_eco_doc_issue_check (Проверка возможности получения справки)
- name: Обновление заглушек gps_eco_doc_issue_check_err (Ошибки проверки возможности получения справки)
- name: Обновление заглушек ошибок GPS_ECO_CNT_CCARD_ACCL (Блок с информацией о числе действующих карт или ошибке обработки для конкретного счета (ГС))
- name: Обновление заглушек ошибок GPS_ECO_SMS_INFO_ACCS (счет и тариф для списания комиссии (смс-информирование))
- name: Эмуляция шлюза в Ф1
