put:
  tags:
  - API заявки на выезд менеджера. Базовые операции.
  summary: Завершить заполнение заявки
  description: 'Привилегии: VISITING_MANAGER_REQUEST.UPDATE'
  operationId: completeRequest
  parameters:
  - name: id
    in: path
    required: true
    schema:
      type: string
      format: uuid
  - name: zoneOffset
    in: query
    required: false
    schema:
      type: string
      default: +03:00
  responses:
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '200':
      description: OK
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/request/SingleResponseRequestDto.yaml
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
