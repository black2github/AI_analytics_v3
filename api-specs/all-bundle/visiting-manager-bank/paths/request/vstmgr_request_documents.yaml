put:
  tags:
  - API заявки на выезд менеджера. Операции с документами.
  summary: Обновить документ (изменить набор вложений)
  description: 'Привилегии: VISITING_MANAGER_REQUEST.UPDATE'
  operationId: updateDocument
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/request/UpdateCommandRequestDocumentAttachmentsUpdateDtoUUID.yaml
    required: true
  responses:
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '200':
      description: OK
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/request/SingleResponseRequestDocumentDto.yaml
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
