post:
  tags:
  - API оценки качества связи
  summary: Сохранить результаты оценки качества отправки
  description: 'Привилегии: VISITING_MANAGER_REQUEST.QOS_ASSESSMENT'
  operationId: saveUploadResults
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/qos/QosUploadResultsDto.yaml
    required: true
  responses:
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '200':
      description: OK
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/qos/SingleResponseVoid.yaml
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
