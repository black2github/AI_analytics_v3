post:
  tags:
  - API для Конверсионных сделок (автокотирования и подтверждения).
  - API для Дежурного - скроллеры конверсий и отчеты
  summary: Получить страницу записей заключенных но неоплаченных Клиентом сделок
  description: 'Привилегии: (#eco.userTypeIs(''BANK'') OR #eco.userTypeIs(''TECHNICAL'')) AND hasAuthority(''TREASURY_FX_DEALS_CONFIRMATION_VIEW'')'
  operationId: getPageOfUnpaidByClient
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/common/GetPageCommandFxDealDocBankFilter.yaml
    required: true
  responses:
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/GenericResponseErrorDataObject.yaml
    '200':
      description: OK
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/GenericResponseErrorDataPageDataFxDealDocDto.yaml
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
