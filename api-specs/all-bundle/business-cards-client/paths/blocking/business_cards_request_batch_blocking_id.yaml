  operationId: deleteRequestOnBlockCardBatch
  parameters:
  - in: path
    name: id
    required: true
    schema:
      type: string
      format: uuid
  responses:
    '200':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/blocking/GenericResponseSimpleErrorDataBatchBlockCardRequestDto.yaml
      description: OK
    '400':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/GenericResponseSimpleErrorDataObject.yaml
      description: Bad Request
    '401':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/GenericResponseSimpleErrorDataObject.yaml
      description: Unauthorized
    '403':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/GenericResponseSimpleErrorDataObject.yaml
      description: Forbidden
    '415':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/GenericResponseSimpleErrorDataObject.yaml
      description: Unsupported Media Type
    '423':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/GenericResponseSimpleErrorDataObject.yaml
      description: Locked
    '500':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/GenericResponseSimpleErrorDataObject.yaml
      description: Internal Server Error
  summary: Удаление пакета заявок на блокировку карт
  tags:
  - API для пакета заявок на блокировку карт
