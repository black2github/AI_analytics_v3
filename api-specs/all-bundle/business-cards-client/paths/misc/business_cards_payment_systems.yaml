get:
  description: 'Привилегии: BC.CLIENT.CARD.ISSUE.REQUEST.CREATE, BC.CLIENT.CARD.ISSUE.REQUEST.EDIT'
  operationId: getPaymentSystems
  responses:
    '200':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/misc/GenericResponseSimpleErrorDataListBusinessCardPaymentSystemDto.yaml
      description: OK
    '400':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/GenericResponseSimpleErrorDataObject.yaml
      description: Bad Request
    '401':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/GenericResponseSimpleErrorDataObject.yaml
      description: Unauthorized
    '403':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/GenericResponseSimpleErrorDataObject.yaml
      description: Forbidden
    '415':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/GenericResponseSimpleErrorDataObject.yaml
      description: Unsupported Media Type
    '423':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/GenericResponseSimpleErrorDataObject.yaml
      description: Locked
    '500':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/GenericResponseSimpleErrorDataObject.yaml
      description: Internal Server Error
  summary: Получить список платежных систем
  tags:
  - API для получения списка счетов, к которым могут быть выпущены карты
