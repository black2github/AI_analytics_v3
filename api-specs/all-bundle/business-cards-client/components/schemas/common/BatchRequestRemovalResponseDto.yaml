type: object
properties:
  result:
    type: object
    description: Результат выполнения метода на удаление заявки из пакета. В случае, если в пакете больше 1 заявки - пакет заявок на блокировку карт, в противном случае - одиночная заявка
  resultType:
    type: string
    description: Тип результата, отражающий количество заявок, возвращаемых выполнения метода. single - если возвращается одна заявка; group - если возвращается пакет заявок
    enum:
    - SINGLE
    - GROUP
description: Ответ на исключение заявки из пакета
