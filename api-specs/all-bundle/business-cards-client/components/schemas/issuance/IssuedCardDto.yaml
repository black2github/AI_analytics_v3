  maskedCardNumber:
    type: string
    description: Маскированный номер карты
  note:
    type: string
    description: Примечание
  tessaDossierId:
    type: string
    description: Идентификатор досье ТЕССА ФЛ
    format: uuid
  tessaErrorDesc:
    type: string
    description: Текст ошибки от ТЕССА
  validPeriod:
    type: integer
    description: Срок действия
    format: int32
  virtualCardNumber:
    type: string
    description: Виртуальный номер карты
description: Информация о выпускаемой карте
