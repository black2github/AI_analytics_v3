type: object
properties:
  cardCategory:
    type: string
    description: Категория карты
  cardIssueBranch:
    type: string
    description: Код офиса выдачи
  cardIssueBranchId:
    type: string
    description: Идентификатор офиса выдачи
    format: uuid
  cardPaymentSystem:
    type: string
    description: Наименование платежной системы
  cardPaymentSystemCode:
    type: string
    description: Код платежной системы
  cardProcessingStatus:
    type: string
    description: Статус обработки
  cardSecretWord:
    type: string
    description: Кодовое слово
  cardholder:
    $ref: ./CardHolderDto.yaml
  cardholderName:
    type: string
