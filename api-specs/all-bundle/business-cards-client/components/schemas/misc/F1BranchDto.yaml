type: object
properties:
  branchAbsNumber:
    type: string
    description: Код филиала в АБС
  branchBic:
    type: string
    description: БИК филиала
  branchCorrespondentAccount:
    type: string
    description: Корсчет филиала
  branchId:
    type: string
    description: Ссылка на сущность Подразделение Банка
    format: uuid
  branchLocation:
    type: string
    description: Населенный пункт филиала
  branchName:
    type: string
    description: Наименование филиала
  commissionAccounts:
    type: array
    description: Блок со счетами доступными для списания комиссии за открытие счета в рамках филиала
    items:
      $ref: ./F1CommissionDto.yaml
  contracts:
    type: array
    description: Список договоров банковского счета клиента в рамках филиала
    items:
      $ref: ./F1ContractDto.yaml
  kopops:
    type: array
    description: Блок со списком счетов, с которых можно скопировать карточку ОПОП в рамках филиала
    items:
      $ref: ./KopopDto.yaml
  reservedAccounts:
    type: array
    description: Блок со списком зарезервированных счетов в рамках филиала
    items:
      $ref: ./F1ReservedAccountDto.yaml
description: Блок с информацией о ДБС внутри филиала
