type: object
properties:
  id:
    type: string
    description: Идентификатор заявки
    format: uuid
  number:
    type: integer
    description: Номер заявки.
    format: int32
  date:
    type: string
    description: Дата создания заявки.
    format: date-time
  status:
    type: string
    description: Статус заявки.
    enum:
    - NONE
    - DRAFT
    - NEW
    - SIGNED
    - DELETED
    - DELIVERED
    - DETAILS_VALID
    - SIGN_VALID
    - RECEIVED
    - EXPORT_TO_KNOSIS
    - EXECUTED_IN_KNOSIS
    - EXPORT_TO_KNOSIS_ERROR
    - EXPORT_TO_ESK
    - EXPORTED_TO_ESK
    - ACCEPTED_BY_ESK
    - EXPORT_TO_ESK_ERROR
    - EXECUTED_BY_ESK
    - EXPORT_FILES_TO_F1
    - FILES_EXPORTED_TO_F1
    - EXPORT_FILES_TO_F1_ERROR
    - WAITING_FOR_ESK_ACCOUNT
    - ACCOUNT_OPENED_IN_F1
    - EXPORT_TO_TESSA
    - EXPORT_TO_TESSA_ERROR
    - EXECUTED_BY_TESSA
    - EXECUTED
    - REJECTED
    - CREATED
    - SIGN_INVALID
    - DETAILS_ERROR
    - READY_FOR_PROCESSING
    - DENIED_BY_ESK
    - EXPORTED_TO_RKO_F1
    - EXPORT_TO_RKO_F1_ERROR
    - RKO_F1_ACCOUNT_OPENED
    - ECO_ACCOUNT_OPENING_ERROR
    - DENIED
    - EXPORTED_TO_ELAR
    - EXPORT_TO_ELAR_ERROR
    - NOT_EXPORTED_TO_ELAR
    - COMMISSION_ACCOUNT_CHECK
    - QRC_WAITING_FOR_COMMISSION_PAYMENT
    - QRC_SHOW_COMMISSION
    - QRC_REGISTER
    - QRC_EXPORT_TO_TESSA
    - QRC_EXPORT_TO_TESSA_SUCCESS
    - QRC_EXPORT_TO_TESSA_ERROR
    - QRC_COMMISSION_PAYMENT_ERROR
    - QRC_COMMISSION_PAYMENT_SUCCESS
    - QRC_COMMISSION_PAID
    - QRC_REQUEST
    - QRC_ANALYZE
  commentForBank:
    type: string
    description: Комментарий для Банка.
  requestType:
    type: string
    description: Классификатор типов документов.
    enum:
    - ACC_OPEN_SECOND_REQ
    - ACC_OPEN_SECOND_CONTRACT_REQ
  bankClient:
    $ref: ./UnitedBankClientDto.yaml
  multiAccountContract:
    $ref: ./UnitedMultiAccountContractDto.yaml
  account:
    $ref: ./UnitedAccountDto.yaml
  openedAccount:
    $ref: ./UnitedOpenedAccountDto.yaml
  branch:
    $ref: ./UnitedBranchDto.yaml
  updatedAt:
    type: string
    description: Дата и время обновления заявки.
    format: date-time
  requestVersion:
    type: integer
    description: Версионность документа.
    format: int32
description: ДТО Общих полей заявок O2+ для скроллера.
