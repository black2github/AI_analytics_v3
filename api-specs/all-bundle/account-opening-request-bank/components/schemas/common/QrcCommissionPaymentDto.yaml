type: object
properties:
  id:
    type: string
    description: Идентификатор записи
    format: uuid
  requestId:
    type: string
    description: Идентификатор заявки на открытие доп счета и заключение ДБС
    format: uuid
  statusUpdatedAt:
    type: string
    description: Дата и время изменения статуса
    format: date-time
  commentForBank:
    type: string
    description: Информация для Банка
  qrExpirationDate:
    type: string
    description: Дата и время истечения срока QR-кода
    format: date-time
  status:
    type: string
    description: Статус оплаты
    enum:
    - CREATED
    - ACTIVE
    - EXECUTED
    - CANCELED
    - FEE_FREE
  transactionId:
    type: string
    description: Идентификатор транзакции
  tessaStatus:
    type: string
    description: Признак выгрузки в ТЕССА
    enum:
    - UPLOADED
    - ERROR
  qrId:
    type: string
    description: Идентификатор QR-кода
  payLink:
    type: string
    description: Ссылка для оплаты
  commissionAmount:
    type: number
    description: Сумма комиссии за открытие дополнительного счета
  tessaCardId:
    type: string
    description: Идентификатор карточки документа в ТЕССА
    format: uuid
  tessaFileId:
    type: string
    description: Идентификатор файла в ТЕССА
    format: uuid
description: Информация об оплате комиссии по QR коду
