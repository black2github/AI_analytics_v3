post:
  tags:
  - API заявки на открытие доп счета и заключение ДБС. Банковские операции.
  summary: Выгрузить ПФ по заявке
  description: 'Привилегии: hasAuthority(''ACCOUNT_OPENING_REQUEST.BANK.CONTRACT_EXPORT_DOCS'')or hasAuthority(''ACCOUNT_OPENING_REQUEST.TECH.CONTRACT_EXPORT_DOCS'')'
  operationId: exportToFile
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/export/SingleCommandAccountOpeningContractExportToFileDto.yaml
    required: true
  responses:
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '200':
      description: OK
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/export/SingleResponseAccountOpeningContractAttachmentInfoDto.yaml
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
