type: object
properties:
  id:
    type: string
    format: uuid
  statementId:
    type: string
    format: uuid
  createdAt:
    type: string
    format: date-time
  periodType:
    type: string
    enum:
    - SELECTPERIOD
    - YESTERDAY
    - TODAY
    - LAST3DAYS
    - PREVWEEK
    - CURMONTH
    - LASTMONTH
    - PREVQUARTER
  periodStart:
    type: string
    format: date
  periodEnd:
    type: string
    format: date
  format:
    type: string
    enum:
    - VIEW
    - C1
    - C1_02
    - TXT
    - TXT_WITHOUT_AMOUNTS
    - PDF
    - PDF_IMPERSONAL
    - EXCEL
    - EXCEL_XLSX
    - MULTICASH
    - RTF
    - DOCX
    - MT940
    - C1_SPECIAL
    - C1_SPECIAL_2
    - XML0
    - XML1
    - XML2
    - XML_TNF
    - CAMT053
    - OPEN_API_CB
    - PDF_MULTIBANKING
    - EXCEL_MULTIBANKING
  status:
    type: string
    enum:
    - NEW
    - DELIVERED
    - DETAILS_VALID
    - RECEIVED
    - FILE
    - VIEW
    - WAIT_RESPONSE
    - SNAPSHOT_REQUESTED
    - FILE_REQUESTED
    - EXECUTED
    - DENIED
    - CANCELED
  user:
    $ref: ./UserCard.yaml
  statementType:
    type: string
    enum:
    - STATEMENT
    - INQUIRY
  statementStatus:
    type: string
    enum:
    - NOT_EXECUTED
    - EXECUTED
    - ERROR
    - NOT_RELEVANT
  action:
    type: string
    enum:
    - DOWNLOAD
    - PRINT
    - VIEW
    - REQUEST_HISTORY
    - EXPORT
    - SEND_TO_EMAIL
  accounts:
    type: array
    items:
      $ref: ../common/AccountCard.yaml
  hasRelatedRequests:
    type: boolean
  requestType:
    type: string
description: Данные
