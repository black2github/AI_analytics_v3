type: object
properties:
  id:
    type: integer
    format: int64
  operationDate:
    type: string
    format: date
  debitEntriesCount:
    type: integer
    format: int32
  creditEntriesCount:
    type: integer
    format: int32
  eventType:
    type: string
    enum:
    - OPENING_DAY_ADJUSTMENT
    - CLOSING_DAY_ADJUSTMENT
    - DAY_CLOSING
    - END_TO_END_BALANCE_UPDATE
  incomingBalance:
    type: number
  turnoverDebit:
    type: number
  turnoverCredit:
    type: number
  currentBalance:
    type: number
  createdAt:
    type: string
    format: date-time
  eventId:
    type: integer
    format: int64
