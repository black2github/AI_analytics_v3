type: object
properties:
  id:
    type: integer
    format: int64
  createdAt:
    type: string
    format: date-time
  updatedAt:
    type: string
    format: date-time
  status:
    type: string
    enum:
    - NEW
    - DELIVERED
    - DELETED
    - RECEIVED
    - REJECTED
    - EXECUTED
    - DISABLED
  author:
    $ref: ./UserDto.yaml
  disconnectUser:
    $ref: ./UserDto.yaml
  period:
    type: string
    enum:
    - CURRENT_DAY
    - PREVIOUS_DAY
    - PREVIOUS_WEEK
    - PREVIOUS_MONTH
    - PREVIOUS_QUARTER
  times:
    type: array
    items:
      type: string
  organizations:
    type: array
    items:
      $ref: ../common/BankClientCard.yaml
  accounts:
    type: array
    items:
      $ref: ./ScheduleAccountDto.yaml
  operations:
    type: string
    enum:
    - ALL
    - INCOME
    - WRITE_OFF
  format:
    type: string
    enum:
    - VIEW
    - C1
    - C1_02
    - TXT
    - TXT_WITHOUT_AMOUNTS
    - PDF
    - PDF_IMPERSONAL
    - EXCEL
    - EXCEL_XLSX
    - MULTICASH
    - RTF
    - DOCX
    - MT940
    - C1_SPECIAL
    - C1_SPECIAL_2
    - XML0
    - XML1
    - XML2
    - XML_TNF
    - CAMT053
    - OPEN_API_CB
    - PDF_MULTIBANKING
    - EXCEL_MULTIBANKING
  parameters:
    $ref: ./ScheduleParameters.yaml
  emails:
    type: array
    items:
      type: string
  disconnectReason:
    type: string
    enum:
    - USER_REQUEST
    - ACCOUNT_CLOSED
    - MANUALLY_DISABLED
  commentForBank:
    type: string
  withDataMT:
    type: boolean
description: Данные
