    '403':
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
      description: Access Denied
    '405':
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
      description: Method Not Allowed
    '415':
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
      description: Unsupported Media Type
    '423':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
