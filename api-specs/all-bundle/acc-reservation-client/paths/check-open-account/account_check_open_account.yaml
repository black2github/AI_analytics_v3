post:
  tags:
  - Проверка счетов
  summary: Проверка отсутствия действующих счетов при создании заявки.
  description: 'Привилегии: ACC_RESERVATION.CLIENT.REQUEST_CREATE'
  operationId: checkOpenAccountOnCreate
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/check-open-account/GenericCommandActiveAccountsCheckParamsDto.yaml
    required: true
  responses:
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '200':
      description: OK
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/check-open-account/GenericResponseSimpleErrorDataActiveAccountsCheckResultDto.yaml
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
