get:
  operationId: printAccountReservationConditions
  responses:
    '200':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/print-acc-res-conditions/GenericResponseSimpleErrorDataPrintResponse.yaml
      description: OK
    '400':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
