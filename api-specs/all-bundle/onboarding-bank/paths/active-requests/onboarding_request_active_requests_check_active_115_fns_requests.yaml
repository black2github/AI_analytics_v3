  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/active-requests/GenericCommandEskSearchRequestDto.yaml
    required: true
  responses:
    '200':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/active-requests/GenericResponseSimpleErrorDataEskSearchResponseDto.yaml
      description: OK
    '400':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
