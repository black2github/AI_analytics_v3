post:
  tags:
  - Api для работы со списком заявок на скроллере НСК.
  summary: Получить информацию по заявкам по указанным фильтрам
  description: 'Привилегии: NSK.KZ.BANK.ONBOARDING.REQUEST.READ, NSK.CLASSIC.BANK.ONBOARDING.REQUEST.READ'
  operationId: getPage
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/common/GetPageCommandOnboardingRequestReadRestRequestScrollerFilterDto.yaml
    required: true
  responses:
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '200':
      description: OK
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/get-page/PageDataOnboardingRequestReadRestScrollerResponseDto.yaml
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
