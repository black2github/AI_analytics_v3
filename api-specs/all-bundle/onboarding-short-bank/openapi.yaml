- url: /onboarding-short-bank
security:
- Bearer: []
tags:
- name: Справочник тарифов на обслуживание счета
- name: API короткой заявки на формирование пакета документов. Контроли наличия активных заявок.
- name: Короткая заявка на открытие первого счета. История изменений.
