get:
  operationId: generateDynamicDocuments
  parameters:
  - in: query
    name: requestId
    required: true
    schema:
      type: string
      format: uuid
  - in: query
    name: documentTypeCodeDto
    required: true
    schema:
      type: string
      description: Код типа документа
      enum:
      - IDENTITY_DOCUMENT
      - MIGRATION_CARD
      - GOZ
      - CONSTITUENT_DOCUMENT
      - CONSTITUENT_DOCUMENT_CHANGES
      - CONSTITUENT_DOCUMENT_EIO
      - CONSTITUENT_DOCUMENT_EIO_CHANGES
      - LICENSE
      - HEAD_APPOINTMENT
      - RIGHT_SIGN_DOCUMENT
      - WARRANT_SIGNERS
      - WARRANT_SIGNER_PERSON
      - OTHER_DOCUMENTS
      - ANOTHER_DOCUMENT
      - MAKE_MC_HEAD
      - CONTRACT_MC
      - MC_CONSTITUENT_DOCUMENT
      - MC_CONSTITUENT_DOCUMENT_CHANGES
      - MC_CONSTITUENT_DOCUMENT_EIO
      - MC_CONSTITUENT_DOCUMENT_EIO_CHANGES
      - MC_HEAD_APPOINTMENT
      - MAKE_OUTSRS_ACCOUNTING
      - CONTRACT_OUTSRS_ACCOUNTING
      - FATCA_UL
      - FATCA_IP
      - CM_111
      - CM_112
      - CM_114
      - CM_115
      - CM_1113
      - CM_IP111
      - CM_UL113
      - CM_IP112
      - CM_IP1124
      - CM_UL1123
      - CM_IP1122
      - CM_UL1121
      - CM_1111
      - CM_UL111
      - CM_IP113
      - CM_UL112
      - CM_IP114
      - CM_122
      - CM_123
      - CM_113
      - CM_119
      - CM_1114
      - CM_1115
      - CM_121
      - CM_1110
      - CM_1112
      - CM_1116
      - CM_1117
      - CM_1118
      - CM_1119
      - CM_1120
      - CM_1125
      - CM_1126
      - EGRUL
      - SNILS
      - EAES
      - PURCHASE_PROCEDURE
      - APPLICATION_SUPPORT_GK
      - EGRUL_UK
      - WARRANT_ACCOUNTING_OR_TAX
      - CM_1124
      - CM_117
      - CM_1123
      - PERMISSION_TO_STAY_IN_RUSSIA
  - in: query
    name: docOrder
    required: false
    schema:
      type: integer
      format: int32
  responses:
    '200':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/original-documents/GenericResponseSimpleErrorDataListOriginalDocumentDto.yaml
      description: OK
    '400':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
      description: Bad Request
    '401':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
      description: Unauthorized
    '403':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
      description: Forbidden
    '405':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
      description: Method Not Allowed
    '415':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
      description: Unsupported Media Type
    '423':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
      description: Locked
    '500':
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
      description: Internal Server Error
  summary: Сформировать список оригиналов документов требуемого типа, динамически запрашиваемых с фронта
  tags:
  - Оригиналы документов
