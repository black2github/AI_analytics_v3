post:
  tags:
  - Контроллер F1 версии 2.
  summary: Вызвать указанный метод и получить результат
  operationId: executeUsingPOST
  consumes:
  - application/json
  produces:
  - '*/*'
  parameters:
  - in: body
    name: body
    description: body
    required: true
    schema:
      type: object
  - name: methodName
    in: path
    description: methodName
    required: true
    type: string
  responses:
    '200':
      description: OK
      schema:
        type: object
    '201':
      description: Created
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not Found
