post:
  tags:
  - СИП. Сервис b2c API
  summary: 'Сервис: Подтверждение выплаты'
  operationId: transferConfirmUsingPOST
  consumes:
  - application/json
  produces:
  - '*/*'
  parameters:
  - name: body.docType
    in: query
    description: Тип документа
    required: true
    type: string
  - name: body.guid
    in: query
    description: GUID из исходного запроса на перевод, идентификатор BSS
    required: true
    type: string
  - name: body.sign
    in: query
    description: Подпись сообщения
    required: false
    type: string
  - name: body.transactionId
    in: query
    description: ID операции возврата в СБП
    required: true
    type: string
  - name: body.type
    in: query
    description: Тип запроса
    required: true
    type: string
  - name: method
    in: query
    required: false
    type: string
    enum:
    - DELETE
    - GET
    - HEAD
    - OPTIONS
    - PATCH
    - POST
    - PUT
    - TRACE
  - name: type
    in: query
    required: false
    type: string
  - name: url
    in: query
    required: false
    type: string
    format: uri
  responses:
    '200':
      description: OK
      schema:
        $ref: '#/definitions/B2cTransferConfirmResultDto'
    '201':
      description: Created
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not Found
