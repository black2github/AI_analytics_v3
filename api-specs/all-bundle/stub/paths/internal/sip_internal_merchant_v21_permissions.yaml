post:
  tags:
  - СИП. Сервис Internal Merchant API
  summary: 'Сервис: Управление разрешениями ТСП'
  operationId: permissionsTspUsingPOST
  consumes:
  - application/json
  produces:
  - '*/*'
  parameters:
  - name: body.merchantId
    in: query
    description: Идентификатор ТСП
    required: true
    type: string
  - name: body.permissions.operationPermition.isBlockQrPermitted
    in: query
    description: Разрешение на блокировку QR
    required: false
    type: boolean
  - name: body.permissions.operationPermition.isPaymentPermitted
    in: query
    description: Разрешение на выплаты
    required: false
    type: boolean
  - name: body.permissions.operationPermition.isReturnPermitted
    in: query
    description: Разрешение на возвраты
    required: false
    type: boolean
  - name: body.permissions.signPermition.isSignPermitted
    in: query
    description: Разрешение на использование (и проверку) подписи
    required: false
    type: boolean
  - name: method
    in: query
    required: false
    type: string
    enum:
    - DELETE
    - GET
    - HEAD
    - OPTIONS
    - PATCH
    - POST
    - PUT
    - TRACE
  - name: type
    in: query
    required: false
    type: string
  - name: url
    in: query
    required: false
    type: string
    format: uri
  responses:
    '200':
      description: OK
      schema:
        $ref: '#/definitions/MerchantPermissionsResultDto'
    '201':
      description: Created
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not Found
