post:
  tags:
  - СИП. Сервис Internal Merchant API
  summary: 'Сервис: Управление авторизационными данными ТСП'
  operationId: authTspUsingPOST
  consumes:
  - application/json
  produces:
  - '*/*'
  parameters:
  - name: body.authData.newLogin
    in: query
    description: Новый логин
    required: false
    type: string
  - name: body.authData.newPassword
    in: query
    description: Новый пароль
    required: false
    type: string
  - name: body.merchantId
    in: query
    description: Идентификатор ТСП
    required: true
    type: string
  - name: method
    in: query
    required: false
    type: string
    enum:
    - DELETE
    - GET
    - HEAD
    - OPTIONS
    - PATCH
    - POST
    - PUT
    - TRACE
  - name: type
    in: query
    required: false
    type: string
  - name: url
    in: query
    required: false
    type: string
    format: uri
  responses:
    '200':
      description: OK
      schema:
        $ref: '#/definitions/MerchantAuthResultDto'
    '201':
      description: Created
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not Found
