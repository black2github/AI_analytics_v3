post:
  tags:
  - GPB API. ФНС.
  summary: Авторизация и получение токена сессии
  operationId: signInUsingPOST_1
  consumes:
  - application/json
  produces:
  - '*/*'
  parameters:
  - name: sign
    in: query
    required: false
    type: string
  - name: token
    in: query
    required: false
    type: string
  responses:
    '200':
      description: OK
      schema:
        $ref: '#/definitions/ResponseEntity'
    '201':
      description: Created
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not Found
