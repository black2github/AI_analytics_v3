post:
  tags:
  - СИП. Сервис SVFE
  summary: Сервис получения детальной информации по картам из ПЦ SVFE
  operationId: getCardInfoUsingPOST
  consumes:
  - application/json
  produces:
  - '*/*'
  parameters:
  - name: body.data.channel
    in: query
    description: Код канала, из которого пришел запрос
    required: false
    type: string
  - name: body.data.requestID
    in: query
    description: Глобальный уникальный идентификатор запроса из внешней системы-первоисточника взаимодействия
    required: false
    type: string
  - name: body.data.systemID
    in: query
    description: Код системы, из которой пришел запрос
    required: false
    type: string
  - name: body.data.traceID
    in: query
    description: Локальный уникальный идентификатор запроса системы, вызывающей сервис
    required: false
    type: string
  - name: body.data.type
    in: query
    description: Тип операции
    required: false
    type: string
  - name: body.data.virtualCardNumbers
    in: query
    description: Список виртуальных номеров карт
    required: true
    type: array
    items:
      type: string
    collectionFormat: multi
  - name: method
    in: query
    required: false
    type: string
    enum:
    - DELETE
    - GET
    - HEAD
    - OPTIONS
    - PATCH
    - POST
    - PUT
    - TRACE
  - name: type
    in: query
    required: false
    type: string
  - name: url
    in: query
    required: false
    type: string
    format: uri
  responses:
    '200':
      description: OK
      schema:
        $ref: '#/definitions/SipSvfeCardInfoGetResponseDto'
    '201':
      description: Created
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not Found
