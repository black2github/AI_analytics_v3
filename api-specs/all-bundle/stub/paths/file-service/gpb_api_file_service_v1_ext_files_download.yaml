get:
  tags:
  - GPB API. Файловый сервис.
  summary: Скачать файл из внешней системы
  operationId: externalFileDownloadUsingGET
  produces:
  - '*/*'
  parameters:
  - name: X-GPB-SOURCE-SYSTEM
    in: header
    description: X-GPB-SOURCE-SYSTEM
    required: true
    type: string
  responses:
    '200':
      description: OK
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not Found
