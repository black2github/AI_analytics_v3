get:
  tags:
  - GPB API. Файловый сервис.
  summary: Получить статус файла
  operationId: getStatusUsingGET
  produces:
  - '*/*'
  parameters:
  - name: id
    in: path
    description: id
    required: true
    type: string
  responses:
    '200':
      description: OK
      schema:
        $ref: '#/definitions/FileStatus'
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not Found
