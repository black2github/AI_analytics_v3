post:
  tags:
  - API для эмуляции файлового обмена
  summary: uploadFiles
  operationId: uploadFilesUsingPOST
  consumes:
  - multipart/form-data
  produces:
  - '*/*'
  parameters:
  - name: path
    in: formData
    required: false
    type: string
  - in: body
    name: files
    description: files
    required: true
    schema:
      type: array
      items:
        type: file
  responses:
    '200':
      description: OK
      schema:
        type: array
        items:
          $ref: '#/definitions/FileSharingDto'
    '201':
      description: Created
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not Found
