put:
  tags:
  - lbp-response-configuration-controller
  summary: Установка типа нотификации
  operationId: setNotificationTypeUsingPUT
  consumes:
  - application/json
  produces:
  - application/json
  parameters:
  - name: type
    in: query
    description: type
    required: true
    type: string
    enum:
    - CHANGE_STATUS
    - DELIVERY_FAILURE
    - ERROR_RECEIVE_MESSAGE
  responses:
    '200':
      description: OK
      schema:
        type: string
        enum:
        - CHANGE_STATUS
        - DELIVERY_FAILURE
        - ERROR_RECEIVE_MESSAGE
    '201':
      description: Created
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not Found
