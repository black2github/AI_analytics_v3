post:
  tags:
  - dbo-320-payment-order-controller
  summary: userAttachments
  operationId: userAttachmentsUsingPOST
  consumes:
  - multipart/form-data
  produces:
  - '*/*'
  parameters:
  - name: Authorization
    in: header
    description: Authorization
    required: true
    type: string
  - in: body
    name: file
    description: file
    required: true
    schema:
      type: string
      format: binary
  - name: remoteid
    in: header
    description: remoteid
    required: true
    type: string
  responses:
    '200':
      description: OK
      schema:
        type: object
    '201':
      description: Created
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not Found
