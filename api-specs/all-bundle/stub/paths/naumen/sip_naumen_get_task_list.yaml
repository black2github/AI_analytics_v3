post:
  tags:
  - СИП. Сервис Naumen
  summary: Сервис получения списка активностей в рамках календарей Юр. Лиц
  operationId: getTaskListUsingPOST
  consumes:
  - application/json
  produces:
  - '*/*'
  parameters:
  - name: body.data.task.company[0].inn
    in: query
    description: ИНН
    required: false
    type: string
  - name: body.data.task.company[0].kpp
    in: query
    description: КПП
    required: false
    type: string
  - name: body.data.timeSlots.endInterval
    in: query
    description: Конец интервала
    required: false
    type: string
    format: date-time
  - name: body.data.timeSlots.startInterval
    in: query
    description: Начало интервала
    required: false
    type: string
    format: date-time
  - name: body.meta.channel
    in: query
    description: Канал
    required: false
    type: string
    enum:
    - ECO
  - name: method
    in: query
    required: false
    type: string
    enum:
    - DELETE
    - GET
    - HEAD
    - OPTIONS
    - PATCH
    - POST
    - PUT
    - TRACE
  - name: type
    in: query
    required: false
    type: string
  - name: url
    in: query
    required: false
    type: string
    format: uri
  responses:
    '200':
      description: OK
      schema:
        $ref: '#/definitions/NaumenGetTaskListResponseDto'
    '201':
      description: Created
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not Found
