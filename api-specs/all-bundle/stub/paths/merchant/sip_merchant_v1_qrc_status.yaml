post:
  tags:
  - СИП. Сервис Merchant API
  summary: 'Сервис: Запрос статуса операции по QR-кодам'
  operationId: qrcOperationStatusUsingPOST
  consumes:
  - application/json
  produces:
  - '*/*'
  parameters:
  - name: body.qrcIds
    in: query
    description: Массив qrcId по которым нужно получить статус операции
    required: true
    type: array
    items:
      type: string
    collectionFormat: multi
  - name: body.sign
    in: query
    description: Подпись сообщения
    required: false
    type: string
  - name: method
    in: query
    required: false
    type: string
    enum:
    - DELETE
    - GET
    - HEAD
    - OPTIONS
    - PATCH
    - POST
    - PUT
    - TRACE
  - name: type
    in: query
    required: false
    type: string
  - name: url
    in: query
    required: false
    type: string
    format: uri
  responses:
    '200':
      description: OK
      schema:
        $ref: '#/definitions/QrcOperationStatusResultDto'
    '201':
      description: Created
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not Found
