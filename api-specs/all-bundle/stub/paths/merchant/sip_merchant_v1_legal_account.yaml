post:
  tags:
  - СИП. Сервис Merchant API
  summary: 'Сервис: Регистрация расчетного счета юридического лица'
  operationId: legalAccountUsingPOST
  consumes:
  - application/json
  produces:
  - '*/*'
  parameters:
  - name: body.account
    in: query
    description: Счет юридического лица
    required: false
    type: string
  - name: body.legalId
    in: query
    description: Идентификатор юридического лица в СБП
    required: false
    type: string
  - name: method
    in: query
    required: false
    type: string
    enum:
    - DELETE
    - GET
    - HEAD
    - OPTIONS
    - PATCH
    - POST
    - PUT
    - TRACE
  - name: type
    in: query
    required: false
    type: string
  - name: url
    in: query
    required: false
    type: string
    format: uri
  responses:
    '200':
      description: OK
      schema:
        $ref: '#/definitions/LegalResultDto«LegalAccountResultDto»'
    '201':
      description: Created
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not Found
