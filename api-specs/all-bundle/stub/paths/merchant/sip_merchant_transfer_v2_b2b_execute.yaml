post:
  tags:
  - СИП. Сервис b2b API
  summary: 'Сервис: Подтверждение выплаты B2B'
  operationId: b2bTransactionConfirmUsingPOST
  consumes:
  - application/json
  produces:
  - '*/*'
  parameters:
  - name: body.accountId
    in: query
    description: Счет ЮЛ или ИП в Банке Плательщика
    required: true
    type: string
  - name: body.amount
    in: query
    description: Сумма Операции СБП в копейках
    required: true
    type: string
  - name: body.bankId
    in: query
    description: Идентификатор Банка Получателя
    required: true
    type: string
  - name: body.comment
    in: query
    description: Назначение платежа
    required: true
    type: string
  - name: body.currency
    in: query
    description: Валюта операции СБП
    required: true
    type: string
  - name: body.merchantId
    in: query
    description: Идентификатор точки продаж
    required: true
    type: string
  - name: body.paymentId
    in: query
    description: Идентификатор QR-кода
    required: true
    type: string
  - name: body.sign
    in: query
    description: Подпись сообщения
    required: false
    type: string
  - name: body.takeTax
    in: query
    description: Информация о взимании НДС
    required: true
    type: boolean
  - name: body.taxAmount
    in: query
    description: Сумма НДС в копейках
    required: false
    type: string
  - name: body.traceId
    in: query
    description: GUID из исходного запроса на перевод, идентификатор BSS
    required: false
    type: string
  - name: body.transactionId
    in: query
    description: ID операции в СБП
    required: true
    type: string
  - name: method
    in: query
    required: false
    type: string
    enum:
    - DELETE
    - GET
    - HEAD
    - OPTIONS
    - PATCH
    - POST
    - PUT
    - TRACE
  - name: type
    in: query
    required: false
    type: string
  - name: url
    in: query
    required: false
    type: string
    format: uri
  responses:
    '200':
      description: OK
      schema:
        $ref: '#/definitions/Ответ на запрос подтверждения платежа B2B'
    '201':
      description: Created
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not Found
