post:
  tags:
  - СИП. Сервис Merchant API
  summary: 'Сервис: Запрос на оплату с привязанного счета плательщика'
  operationId: subscribedPaymentUsingPOST
  consumes:
  - application/json
  produces:
  - '*/*'
  parameters:
  - name: body.memberId
    in: query
    description: Идентификатор банка плательщика
    required: true
    type: string
  - name: body.qrcId
    in: query
    description: Идентификатор зарегистрированной платежной ссылки СБП
    required: true
    type: string
  - name: body.sign
    in: query
    description: Подпись сообщения
    required: false
    type: string
  - name: body.subscriptionToken
    in: query
    description: Идентификатор привязки счета
    required: true
    type: string
  - name: method
    in: query
    required: false
    type: string
    enum:
    - DELETE
    - GET
    - HEAD
    - OPTIONS
    - PATCH
    - POST
    - PUT
    - TRACE
  - name: type
    in: query
    required: false
    type: string
  - name: url
    in: query
    required: false
    type: string
    format: uri
  responses:
    '200':
      description: OK
      schema:
        $ref: '#/definitions/PaymentResultDto'
    '201':
      description: Created
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not Found
