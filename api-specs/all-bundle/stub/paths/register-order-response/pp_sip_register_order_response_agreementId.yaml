post:
  tags:
  - pp-sip-controller
  summary: Установить желаемый ответ для регистрации неторгового поручения.
  operationId: setStubResponseUsingPOST
  consumes:
  - application/xml;charset=UTF-8
  produces:
  - application/xml;charset=UTF-8
  parameters:
  - name: agreementId
    in: path
    description: agreementId
    required: true
    type: string
  - in: body
    name: data
    description: data
    required: true
    schema:
      type: string
  responses:
    '200':
      description: OK
      schema:
        type: string
    '201':
      description: Created
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not Found
delete:
  tags:
  - pp-sip-controller
  summary: Очистить желаемый ответ для регистрации неторгового поручения.
  operationId: clearStubResponseUsingDELETE
  consumes:
  - application/xml;charset=UTF-8
  produces:
  - application/xml;charset=UTF-8
  parameters:
  - name: agreementId
    in: path
    description: agreementId
    required: true
    type: string
  responses:
    '200':
      description: OK
      schema:
        type: string
    '204':
      description: No Content
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
