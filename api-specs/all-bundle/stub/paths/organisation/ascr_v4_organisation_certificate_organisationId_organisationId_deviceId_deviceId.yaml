get:
  tags:
  - API заглушки АСЦР (КО ЮЛ - сертификаты) V4
  summary: Запрос реквизитов Клиента-ЮЛ при успешной регистрации в ПЦР (V4)
  operationId: getOrganisationCertificateByDeviceIdUsingGET
  produces:
  - '*/*'
  parameters:
  - name: deviceId
    in: path
    description: deviceId
    required: true
    type: string
  - name: fingerprint
    in: query
    description: fingerprint
    required: false
    type: string
  - name: organisationId
    in: path
    description: organisationId
    required: true
    type: string
  responses:
    '200':
      description: Данные по сертификатам успешно получены
      schema:
        $ref: '#/definitions/AscrResponse'
    '401':
      description: Unauthorized
    '403':
      description: Ошибка в процессе обработки запроса
    '404':
      description: Неправильный путь запроса
    '500':
      description: Ошибка на платформе ФП
