post:
  tags:
  - API заглушки АСЦР (КО ЮЛ) V4
  summary: Заявка Клиента-ЮЛ на покупку ЦР
  operationId: buyCurrencyUsingPOST
  consumes:
  - application/json
  produces:
  - '*/*'
  parameters:
  - name: referenceId
    in: header
    description: referenceId
    required: true
    type: string
  - in: body
    name: request
    description: request
    required: true
    schema:
      $ref: '#/definitions/OrganisationBuyingDCRequest'
  responses:
    '200':
      description: ПЦР успешно ответил на заявку Клиента-ЮЛ на покупку ЦР
      schema:
        $ref: '#/definitions/AscrResponse'
    '201':
      description: Created
    '401':
      description: Unauthorized
    '403':
      description: Ошибка в процессе обработки запроса
    '404':
      description: Неправильный путь запроса
    '500':
      description: Ошибка на платформе ФП
