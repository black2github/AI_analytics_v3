post:
  tags:
  - crm-infor-controller
  summary: Метод отправляет кастомный запрос (тело запроса json) на создание договора
  operationId: contractCustomUsingPOST
  consumes:
  - application/json
  produces:
  - '*/*'
  parameters:
  - in: body
    name: jsonRequest
    description: jsonRequest
    required: true
    schema:
      type: string
  responses:
    '200':
      description: OK
      schema:
        type: string
    '201':
      description: Created
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not Found
