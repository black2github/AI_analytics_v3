post:
  tags:
  - acting-client-controller
  summary: Создает сообщение ИО Клиента из xml.
  operationId: createXmlUsingPOST
  consumes:
  - application/json
  produces:
  - text/plain;charset=UTF-8
  parameters:
  - in: body
    name: xml
    description: xml
    required: true
    schema:
      type: string
  responses:
    '200':
      description: OK
      schema:
        type: string
    '201':
      description: Created
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not Found
