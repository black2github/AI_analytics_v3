  - API регистрации пользователя ДБО БСС
  summary: Создание новой учетной записи
  operationId: registerUsingPOST
  consumes:
  - application/json
  produces:
  - '*/*'
  parameters:
  - in: body
    name: request
    description: request
    required: true
    schema:
      $ref: '#/definitions/BssRegisterRequest'
  responses:
    '200':
      description: OK
      schema:
        $ref: '#/definitions/BssUser'
