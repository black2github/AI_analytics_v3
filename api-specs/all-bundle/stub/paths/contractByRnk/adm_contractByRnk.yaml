post:
  tags:
  - crm-infor-controller
  summary: Метод отправляет запрос на создание договора с дефолтным набором полей для выбранного РНК
  operationId: contractByRnkUsingPOST
  consumes:
  - application/json
  produces:
  - '*/*'
  parameters:
  - in: body
    name: rnk
    description: rnk
    required: true
    schema:
      type: string
  responses:
    '200':
      description: OK
      schema:
        type: string
    '201':
      description: Created
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not Found
