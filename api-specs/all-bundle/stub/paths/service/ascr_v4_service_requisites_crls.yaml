post:
  tags:
  - API заглушки АСЦР (КО ЮЛ) V4
  summary: Запрос реквизитов САС (списка аннулированных сертификатов), необходимых для шифрования проверки подписи на стороне клиента
  operationId: getCertCrlsRequisitesInfoUsingPOST
  consumes:
  - application/json
  produces:
  - '*/*'
  parameters:
  - name: referenceId
    in: header
    description: referenceId
    required: false
    type: string
    format: uuid
  - in: body
    name: request
    description: request
    required: true
    schema:
      $ref: '#/definitions/CertCrlsRequisitesInfoRequest'
  responses:
    '200':
      description: Запрос принят в работу
      schema:
        $ref: '#/definitions/AscrResponse'
    '201':
      description: Created
    '401':
      description: Unauthorized
    '403':
      description: Ошибка в процессе обработки запроса
    '404':
      description: Неправильный путь запроса
    '500':
      description: Ошибка на платформе ФП
