get:
  tags:
  - Заглушка GPB API для СКБ Контур.
  summary: Получить индикаторы контрагентов
  operationId: calcIndicatorsUsingGET
  produces:
  - '*/*'
  parameters:
  - name: inns
    in: query
    description: inns
    required: true
    type: array
    items:
      type: string
    collectionFormat: multi
  - name: key
    in: query
    description: key
    required: true
    type: string
  - name: source
    in: query
    description: source
    required: true
    type: string
  responses:
    '200':
      description: OK
      schema:
        $ref: '#/definitions/ResponseEntity'
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not Found
