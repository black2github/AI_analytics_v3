get:
  tags:
  - АПИ для работы с заглушкой ЕСК регистрация данных сотрудника
  summary: Получить информацию о заглушках
  operationId: getStubsInfoUsingGET
  produces:
  - '*/*'
  responses:
    '200':
      description: OK
      schema:
        type: string
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not Found
delete:
  tags:
  - АПИ для работы с заглушкой ЕСК регистрация данных сотрудника
  summary: Удалить все сценарии заглушек
  operationId: deleteAllStubUsingDELETE
  produces:
  - '*/*'
  responses:
    '200':
      description: OK
      schema:
        type: string
    '204':
      description: No Content
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
