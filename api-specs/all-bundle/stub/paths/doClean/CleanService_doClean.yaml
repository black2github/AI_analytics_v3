  produces:
  - application/json
  parameters:
  - name: body.doCleanRequest.data
    in: query
    description: Массив данных для обработки
    required: false
    type: array
    items:
      type: string
    collectionFormat: multi
  - name: body.doCleanRequest.mapping
    in: query
    description: Название мэппинга
    required: false
    type: string
  - name: method
    in: query
    required: false
    type: string
    enum:
    - DELETE
    - GET
    - HEAD
    - OPTIONS
    - PATCH
    - POST
    - PUT
    - TRACE
  - name: type
    in: query
    required: false
    type: string
  - name: url
    in: query
    required: false
    type: string
    format: uri
  responses:
    '200':
      description: OK
      schema:
        $ref: '#/definitions/CleanServiceResponseDto'
    '201':
      description: Created
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not Found
