get:
  tags:
  - gpb-api-pak-ebs-controller
  summary: Отправляет результат неуспешной аутентификации через ПАК ЕБС для последней созданной сессии
  operationId: sendFailureAuthResultUsingGET
  produces:
  - application/json
  parameters:
  - name: sid
    in: query
    description: sid
    required: true
    type: string
    format: uuid
  responses:
    '200':
      description: OK
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not Found
