post:
  tags:
  - API заглушки АСЦР (для работы с КО ФП) V2
  summary: Запрос возможности изменения со стороны ФП статуса кошелька клиента
  operationId: fiOrganizationWalletStatusUsingPOST
  consumes:
  - application/json
  produces:
  - '*/*'
  parameters:
  - name: referenceId
    in: header
    description: referenceId
    required: false
    type: string
  - in: body
    name: request
    description: request
    required: true
    schema:
      $ref: '#/definitions/FiParticipantWalletStatusRequest'
  responses:
    '200':
      description: ПЦР успешно ответил на запрос изменения со стороны ФП статуса кошелька клиента
      schema:
        $ref: '#/definitions/AscrResponse'
    '201':
      description: Created
    '401':
      description: Unauthorized
    '403':
      description: Ошибка в процессе обработки запроса
    '404':
      description: Неправильный путь запроса
    '500':
      description: Ошибка на платформе ФП
