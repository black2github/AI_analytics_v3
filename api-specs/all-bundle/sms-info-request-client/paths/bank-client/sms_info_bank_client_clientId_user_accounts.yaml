post:
  tags:
  - API получения информации о клиенте для заявки на подключение СМС-информирования. Клиент.
  summary: Получить перечень счетов клиента, доступных указанным пользователям
  description: 'Привилегии: SFZU_REQUEST_CREATE'
  operationId: getAvailableAccounts
  parameters:
  - name: clientId
    in: path
    required: true
    schema:
      type: string
      format: uuid
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/common/GenericCommandListUUID.yaml
    required: true
  responses:
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/GenericResponseErrorDataObject.yaml
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '200':
      description: OK
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/bank-client/GenericResponseSimpleErrorDataMapUUIDListUUID.yaml
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
