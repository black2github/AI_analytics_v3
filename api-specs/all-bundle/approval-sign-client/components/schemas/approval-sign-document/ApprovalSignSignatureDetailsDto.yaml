required:
- firstSignTime
- firstSignatoryName
- sendingForApprovalTime
type: object
properties:
  firstSignatoryName:
    type: string
    description: ФИО подписанта 1
  firstSignTime:
    type: string
    description: Дата и время подписания 1
    format: date-time
  firstSignMode:
    type: string
    description: Тип подписания документа
    enum:
    - STANDARD_KEP_OEP
    - SIGNED_1C_DIRECT_PACKAGE
    - SIGNED_1C_FILE_ATTACHED_SIGNATURE
    - SIGNED_1C_FILE_DETACHED_SIGNATURE
    - SIGNED_TNF
    - BULK_SIGNATURE_FILE
  secondSignatoryName:
    type: string
    description: ФИО подписанта 2
  secondSignTime:
    type: string
    description: Дата и время подписания 2
    format: date-time
  secondSignMode:
    type: string
    description: Тип подписания документа
    enum:
    - STANDARD_KEP_OEP
    - SIGNED_1C_DIRECT_PACKAGE
    - SIGNED_1C_FILE_ATTACHED_SIGNATURE
    - SIGNED_1C_FILE_DETACHED_SIGNATURE
    - SIGNED_TNF
    - BULK_SIGNATURE_FILE
  sendingForApprovalTime:
    type: string
    description: Дата и время направления на визирование
    format: date-time
  visaType:
    type: string
    description: Тип визы
    enum:
    - POSITIVE
    - NEGATIVE
  visaMode:
    type: string
    description: Тип подписания документа
    enum:
    - STANDARD_KEP_OEP
    - SIGNED_1C_DIRECT_PACKAGE
    - SIGNED_1C_FILE_ATTACHED_SIGNATURE
    - SIGNED_1C_FILE_DETACHED_SIGNATURE
    - SIGNED_TNF
    - BULK_SIGNATURE_FILE
  visaUserId:
    type: string
    description: Визирующий (ID Пользователь)
    format: uuid
  visaUserName:
    type: string
    description: ФИО Визирующего
  visaDateTime:
    type: string
    description: Дата и время визирования
    format: date-time
  visaComment:
    type: string
    description: Комментарий к визе
  visaDecision:
    type: string
    description: Решение по документу
    enum:
    - ACCEPT
    - DECLINE
description: ДТО Реквизиты подписи и визирования
