  - API для визирующей организации.
  summary: Получить идентификатор визирующей организации по идентификатору счета
  description: 'Привилегии: APPROVAL_SIGN.CLIENT_FIND'
  operationId: getClientIdForAccountId
  parameters:
  - name: id
    in: path
    description: Id счета
    required: true
    schema:
      type: string
      format: uuid
