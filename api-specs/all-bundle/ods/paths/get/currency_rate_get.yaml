get:
  tags:
  - API сущности Курсы ЦБ
  summary: Получить данные о курсе ЦБ по указанной валюте для конкретного дня
  description: 'Привилегии: ODS_CURRENCY_RATE_VIEW'
  operationId: getCurrencyRateUsingGET
  produces:
  - '*/*'
  parameters:
  - name: code
    in: query
    description: code
    required: true
    type: string
  - name: date
    in: query
    description: date
    required: true
    type: string
    format: date
  responses:
    '200':
      description: OK
      schema:
        $ref: '#/definitions/GenericResponse«OdsError,CurrencyRateDto»'
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not Found
  security:
  - Bearer: []
  deprecated: false
