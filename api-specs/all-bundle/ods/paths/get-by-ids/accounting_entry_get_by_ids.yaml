post:
  tags:
  - API проводок
  summary: Получить список записей проводок по id
  description: 'Привилегии: ODS_ACCOUNTING_ENTRY_VIEW'
  operationId: getByIdsUsingPOST
  consumes:
  - application/json
  produces:
  - '*/*'
  parameters:
  - in: body
    name: accountingEntryIds
    description: accountingEntryIds
    required: true
    schema:
      type: array
      items:
        type: integer
        format: int64
  responses:
    '200':
      description: OK
      schema:
        type: array
        items:
          $ref: '#/definitions/AccountingEntryDto'
    '201':
      description: Created
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not Found
  security:
  - Bearer: []
  deprecated: false
