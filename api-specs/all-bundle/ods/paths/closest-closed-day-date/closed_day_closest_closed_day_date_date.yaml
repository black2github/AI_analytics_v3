get:
  tags:
  - API сущности Закрытый день
  summary: Найти ближайшую дату закрытого дня по отношению к запрашиваемой дате
  description: 'Привилегии: ODS_CLOSED_DAY_VIEW'
  operationId: findClosestClosedDateUsingGET
  produces:
  - '*/*'
  parameters:
  - name: date
    in: path
    description: date
    required: true
    type: string
    format: date
  responses:
    '200':
      description: OK
      schema:
        $ref: '#/definitions/GenericResponse«OdsError,LocalDate»'
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not Found
  security:
  - Bearer: []
  deprecated: false
