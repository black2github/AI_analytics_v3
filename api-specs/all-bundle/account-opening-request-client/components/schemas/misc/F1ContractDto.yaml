    format: date
  subdivisionAbsCode:
    type: string
    description: Код подразделения в АБС
  subdivisionInfo:
    $ref: ./BranchShortDtoV2.yaml
  rkoId:
    type: string
    description: ID договора РКО в АБС
  accountTypeCode:
    type: string
    description: Код типа счета
