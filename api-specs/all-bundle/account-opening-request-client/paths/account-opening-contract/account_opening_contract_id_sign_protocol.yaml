get:
  tags:
  - API заявки на открытие доп счета и заключение ДБС. Операции подписи.
  summary: Сгенерировать протокол проверки подписи
  description: 'Привилегии: hasAuthority(''ACCOUNT_OPENING_REQUEST.CLIENT.CONTRACT_SIGN'') or hasAuthority(''ACCOUNT_OPENING_REQUEST.CLIENT.CONTRACT_CHECK_SIGN'')'
  operationId: generateSignCheckProtocol
  parameters:
  - name: id
    in: path
    required: true
    schema:
      type: string
      format: uuid
  responses:
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '200':
      description: OK
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/account-opening-contract/GenericResponseSimpleErrorDataFileDataResponseDto.yaml
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
