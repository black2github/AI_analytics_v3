post:
  tags:
  - API ДБС для открытия доп счета
  summary: Получить список ДБС для открытия доп счета
  description: 'Привилегии: hasAuthority(''ACCOUNT_OPENING_REQUEST.CLIENT.CONTRACT_CREATE'')  or hasAuthority(''ACCOUNT_OPENING_REQUEST.CLIENT.CONTRACT_UPDATE'')'
  operationId: getBankAccountContractList
  parameters:
  - name: organizationId
    in: header
    required: true
    schema:
      type: string
      format: uuid
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/misc/GetBankAccountContractRequest.yaml
    required: true
  responses:
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '200':
      description: OK
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/misc/SingleResponseBankAccountContractResponseDto.yaml
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
