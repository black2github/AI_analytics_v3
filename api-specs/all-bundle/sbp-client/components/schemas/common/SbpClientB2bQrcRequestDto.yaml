type: object
description: Заявка на регистрацию QR-кода в системе АС СБП
properties:
  id:
    type: string
    format: uuid
    description: Идентификатор заявки
  version:
    type: integer
    format: int32
    description: Версия
  docNumber:
    type: integer
    format: int32
    description: Номер заявки
  docDate:
    type: string
    format: date-time
    description: Дата заявки
  status:
    type: string
    description: Текущий статус обработки заявки
    enum:
    - NONE
    - DRAFT
    - NEW
    - DELETED
    - DELIVERED
    - DETAILS_VALID
    - RECEIVED
    - EXPORT_REQUEST_TO_F1
    - EXPORT_REQUEST_TO_F1_ERROR
    - REQUEST_EXECUTED_BY_F1
    - ACCOUNTS_REGISTRATION
    - ACCOUNTS_REGISTRATION_ERROR
    - ACCOUNTS_REGISTERED
    - SBP_B2B_REGISTRATION_REQUEST
    - SBP_B2B_REGISTRATION_ERROR
    - SBP_B2B_REGISTERED
    - QR_CREATED
    - REJECTED
    - EXECUTED
  commentForBank:
    type: string
    description: Комментарий для Банка
  commentForClient:
    type: string
    description: Комментарий для Клиента
  userId:
    type: string
    format: uuid
    description: Идентификатор пользователя
  userName:
    type: string
    description: Пользователь, создавший заявку (ФИО)
  bankClient:
    $ref: ./SbpClientB2bQrcRequestBankClientDto.yaml
    description: Реквизиты клиента по заявке
  data:
    $ref: ./SbpB2bQrcRequestDataDto.yaml
    description: Реквизиты QR-кода
  qrcId:
    type: string
    description: Идентификатор зарегистрированного QR кода в СБПки
  payload:
    type: string
    description: Payload зарегистрированного QR кода в СБП
  redirectUrl:
    type: string
    description: Ссылка для автоматического возврата
  validationResult:
    $ref: ./ValidationResult.yaml
    description: Результат валидации заявки
