type: object
description: ДТО с реквизитами подписки
properties:
  subscriptionPurpose:
    type: string
    description: Цель подписки
  paymentAmount:
    type: integer
    format: int64
    description: Сумма периодического платежа в копейках
  paymentFrequency:
    type: string
    description: Периодичность платежа
    enum:
    - DAILY
    - WEEKLY
    - MONTHLY
    - QUARTERLY
  paymentStart:
    type: string
    format: date
    description: Дата старта подписки
  paymentsQuantity:
    type: integer
    format: int32
    description: Количество платежей
  paymentDay:
    type: integer
    format: int32
    description: День списания
  payer:
    type: string
    description: Плательщик
required:
- subscriptionPurpose
