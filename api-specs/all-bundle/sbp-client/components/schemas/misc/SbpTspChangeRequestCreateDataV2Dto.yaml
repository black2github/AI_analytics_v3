type: object
description: Параметры по заявке на изменение параметров ТСП
properties:
  isReturnPermitted:
    type: boolean
    description: Признак "Разрешение на возвраты"
  newPassword:
    type: string
    description: Новый пароль точки продаж (Задается в случае влючения разрешения на возвраты)
  salesMode:
    type: string
    description: Способ приема оплаты ТСП
    enum:
    - REMOTE
    - FACE_TO_FACE
  url:
    type: string
    description: Веб-сайт ТСП
    maxLength: 1200
required:
- isReturnPermitted
