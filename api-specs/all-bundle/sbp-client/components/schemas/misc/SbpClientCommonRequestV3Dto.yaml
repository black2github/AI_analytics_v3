type: object
description: '"Обобщенная заявка" для представления "Список заявок" для клиента с блоком данных о доступных пользователю действиях'
properties:
  id:
    type: string
    format: uuid
    description: Идентификатор заявки
  docNumber:
    type: integer
    format: int32
    description: Номер заявки
  docDate:
    type: string
    format: date-time
    description: Дата заявки
  type:
    type: string
    description: Тип заявки
    enum:
    - TSP_CREATE
    - TSP_UPDATE
    - QRC_CREATE
    - QRC_BLOCK
    - QRC_SCHEDULE
    - QRC_PAYMENT
    - DISCONNECT
    - TSP_BLOCK
  merchantId:
    type: string
    description: Идентификатор ТСП в АС СБП
  merchantName:
    type: string
    description: Торговое название
  merchantAddress:
    type: string
    description: Адрес ТСП
  status:
    type: string
    description: Статус заявки
    enum:
    - DRAFT
    - NEW
    - DELIVERED
    - DETAILS_VALID
    - RECEIVED
    - DELETED
    - REGISTRATION_REQUEST
    - REGISTRATION_ERROR
    - REGISTERED
    - QRC_IMAGE_REQUEST
    - QRC_IMAGE_NOT_RECEIVED
    - QRC_IMAGE_RECEIVED
    - BLOCK_ERROR
    - BLOCK_REQUEST
    - REQUEST_EXECUTED
    - QR_BLOCKED
    - SUBS_BLOCKED
    - QR_CREATED
    - SUBS_CREATED
    - PAYMENT_REQUEST
    - PAYMENT_ERROR
    - PAYMENT_PERMITTED
    - PERMISSIONS_REQUEST
    - PERMISSIONS_ERROR
    - PERMISSION_REGISTERED
    - AUTH_REQUEST
    - AUTH_REQUEST_ERROR
    - AUTH_REGISTERED
    - EXPORT_UPDATE_URL_TO_AS_SBP
    - EXPORT_TO_AS_SBP_UPDATE_URL_ERROR
    - REJECTED_BY_AS_SBP_UPDATE_URL
    - EXECUTED_BY_AS_SBP_UPDATE_URL
    - REJECTED_PERMISSIONS_REQUEST
    - REJECTED_AUTH_REQUEST
    - RESULTS_PROCESSING
    - PARTIALLY_EXECUTED
    - REJECTED
    - EXECUTED
    - SBP_B2B_REGISTRATION_REQUEST
    - SBP_B2B_REGISTRATION_ERROR
    - SBP_B2B_REGISTERED
    - REGISTRATION_WAIT
    - PERMISSIONS_REPEAT
    - EXPORT_REQUEST_TO_F1
    - EXPORT_REQUEST_TO_F1_ERROR
    - REQUEST_EXECUTED_BY_F1
    - ACCOUNTS_REGISTRATION
    - ACCOUNTS_REGISTRATION_ERROR
    - ACCOUNTS_REGISTERED
    - CLIENT_REGISTRATION_DELIVERED
    - CLIENT_REGISTRATION_RECEIVED
    - CLIENT_REGISTRATION_ERROR
    - CLIENT_REGISTERED
    - WAIT_FOR_SIGN
    - SIGNED
    - SIGN_VALID
    - EXPORT_DISCONNECT_AGENTS_TO_AS_SBP
    - EXPORT_DISCONNECT_AGENTS_TO_AS_SBP_ERROR
    - EXECUTED_BY_AS_SBP_DISCONNECT_AGENTS
    - EXPORT_DISCONNECT_AGENTS_TO_F1
    - EXPORT_DISCONNECT_AGENTS_TO_F1_ERROR
    - EXECUTED_BY_F1_DISCONNECT_AGENTS
    - EXPORT_TSP_CHANGE_STATUS_TO_AS_SBP
    - EXPORT_TSP_CHANGE_STATUS_TO_AS_SBP_ERROR
    - EXECUTED_BY_AS_SBP_TSP_CHANGE_STATUS
  account:
    type: string
    description: Счет зачисления для оплаты по QR
  subscriptionPurpose:
    type: string
    description: Цель подписки
  bankClient:
    $ref: ./SbpCommonRequestBankClientDto.yaml
    description: Реквизиты клиента по заявке
  details:
    $ref: ./SbpClientCommonRequestDetailsV3Dto.yaml
    description: Детализированная информация по заявкам
  sideServiceData:
    $ref: ./SbpCommonRequestSideServiceDataDto.yaml
    description: Реквизиты, получаемые в процессе создания заявки из других сервисов ЭКО.
  qrcId:
    type: string
    description: Идентификатор QR
  paymentPurpose:
    type: string
    description: Назначение платежа
  payer:
    type: string
    description: Плательщик
  availableOperations:
    $ref: ./SbpClientCommonRequestAvailableOperationsDto.yaml
    description: Информация о доступных пользователю действиях
required:
- details
- docDate
- docNumber
- id
- status
- type
