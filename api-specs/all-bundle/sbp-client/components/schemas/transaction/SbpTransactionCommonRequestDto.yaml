type: object
description: Обобщенное заявление на платеж СБП
properties:
  id:
    type: string
    format: uuid
    description: Идентификатор заявки
  type:
    type: string
    description: Тип заявления
    enum:
    - B2C_TRANSACTION
    - B2B_TRANSACTION
  status:
    type: string
    description: Статус обработки заявления
    enum:
    - NONE
    - DRAFT
    - NEW
    - INIT_REQUEST_1
    - INIT_ERROR_1
    - INIT_COMPLETED_1
    - WAIT_FOR_SIGN
    - SIGNED_1
    - SIGNED_2
    - SIGNED
    - DELETED
    - DELIVERED
    - SIGN_VALID
    - DETAILS_VALID
    - INIT_REQUEST_2
    - INIT_ERROR_2
    - INIT_COMPLETED_2
    - RECEIVED
    - CONFIRM_REQUEST
    - CONFIRM_ERROR
    - CONFIRM_DELIVERED
    - ACCEPTED
    - INFO_REQUEST
    - INFO_ERROR
    - FINAL_STATUS_RECEIVED
    - CALLBACK_RECEIVED
    - COMPLETED
    - REJECTED
    - SBP_B2B_GET_QR_REQUEST
    - SBP_B2B_GET_QR_ERROR
    - SBP_B2B_GET_QR_RECEIVED
    - SBP_B2B_CONFIRM_REQUEST
    - SBP_B2B_CONFIRM_ERROR
    - SBP_B2B_CONFIRM_DELIVERED
    - SBP_B2B_INFO_REQUEST
    - SBP_B2B_INFO_ERROR
    - SBP_B2B_FINAL_STATUS_RECEIVED
    - SBP_B2B_AWATING_FINAL_STATUS
    - EXPORT_REQUEST_TO_F1
    - EXPORT_REQUEST_TO_F1_ERROR
    - REQUEST_EXECUTED_BY_F1
    - ACCOUNTS_REGISTRATION
    - ACCOUNTS_REGISTRATION_ERROR
    - ACCOUNTS_REGISTERED
  docType:
    type: string
    description: Тип операции в обобщенном заявлении на платеж СБП
    enum:
    - TRANSFER
    - RETURN
  docDate:
    type: string
    format: date-time
    description: Дата заявки
  docNumber:
    type: integer
    format: int32
    description: Номер заявки
  userId:
    type: string
    format: uuid
    description: Ссылка на на сущность "Пользователь", создавшего заявления
  clientId:
    type: string
    format: uuid
    description: Ссылка на сущность "Клиент Банка
  clientInn:
    type: string
    description: ИНН Клиента
  amount:
    type: integer
    format: int64
    description: Сумма платежа в копейках
  currency:
    type: string
    description: Код валюты платежа
  vat:
    type: boolean
    description: Информация о взимании НДС
  vatAmount:
    type: integer
    format: int64
    description: Сумма НДС операции в копейках
  recipientName:
    type: string
    description: Наименование Получателя
  recipientInn:
    type: string
    description: ИНН Получателя
  recipientPhone:
    type: string
    description: Телефон получателя
  recipientBankName:
    type: string
    description: Наименование банка Получателя
  recipientBankBic:
    type: string
    description: БИК банка Получателя
  recipientMerchantName:
    type: string
    description: Наименование точки продаж Контрагента
  recipientMerchantAddress:
    type: string
    description: Адрес точки продаж Контрагента
  recipientMerchantId:
    type: string
    description: Идентификатор точки продаж Контрагента
  transactionId:
    type: string
    description: Идентификатор транзакции
  b2b:
    type: boolean
    description: Признак заявки на платеж СБП для B2B
  details:
    $ref: ./SbpTransactionCommonRequestDetailsDto.yaml
    description: Детали обобщенного платежа
required:
- clientId
- docDate
- docNumber
- docType
- id
- status
- type
- userId
