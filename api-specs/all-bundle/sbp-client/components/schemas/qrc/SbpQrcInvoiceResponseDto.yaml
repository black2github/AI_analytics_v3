type: object
description: Информация по входящему QR-коду B2B СБП
properties:
  id:
    type: string
    format: uuid
    description: Идентификатор сущности
  createdAt:
    type: string
    format: date-time
    description: Дата создания
  userId:
    type: string
    format: uuid
    description: Идентификатор пользователя
  userName:
    type: string
    description: Имя пользователя
  bankClient:
    $ref: ../common/SbpQrcBankClientDto.yaml
    description: Клиент банка
  docNumber:
    type: integer
    format: int32
    description: Номер входящего QR кода
  qrcId:
    type: string
    description: Идентификатор QR-кода
  qrcType:
    type: string
    description: Тип QR
    enum:
    - STATIC, DYNAMIC
  status:
    type: string
    description: Статус QR-кода
    enum:
    - NONE
    - ACTIVE
    - DELETED
    - INACTIVE
    - EXECUTED
  recipientData:
    $ref: ./SbpQrcInvoiceRecipientDataDto.yaml
    description: Реквизиты получателя
  amount:
    type: integer
    format: int64
    description: Сумма платежа в копейках
  paymentPurpose:
    type: string
    description: Назначение платежа
  takeVat:
    type: boolean
    description: Информация о взимании НДС
  vatAmount:
    type: integer
    format: int64
    description: Сумма НДС в копейках
required:
- bankClient
- createdAt
- docNumber
- id
- paymentPurpose
- qrcId
- qrcType
- userId
- userName
