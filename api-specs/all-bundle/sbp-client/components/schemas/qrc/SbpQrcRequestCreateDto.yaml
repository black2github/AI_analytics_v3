type: object
description: Заявка на регистрацию QR-кода в системе АС СБП
properties:
  id:
    type: string
    format: uuid
    description: Идентификатор заявки
  version:
    type: integer
    format: int32
    description: Версия
  docNumber:
    type: integer
    format: int32
    description: Номер заявки
  docDate:
    type: string
    format: date-time
    description: Дата заявки
  status:
    type: string
    description: Текущий статус обработки заявки
    enum:
    - NONE
    - DRAFT
    - DELETED
    - NEW
    - DELIVERED
    - DETAILS_VALID
    - RECEIVED
    - REGISTRATION_ERROR
    - REGISTRATION_REQUEST
    - QR_CREATED
    - SUBS_CREATED
    - REGISTERED
    - QRC_IMAGE_REQUEST
    - QRC_IMAGE_NOT_RECEIVED
    - QRC_IMAGE_RECEIVED
    - REJECTED
    - EXECUTED
    - REGISTRATION_WAIT
  commentForBank:
    type: string
    description: Комментарий для Банка
  commentForClient:
    type: string
    description: Комментарий для Клиента
  userId:
    type: string
    format: uuid
    description: Идентификатор пользователя
  userName:
    type: string
    description: Пользователь, создавший заявку (ФИО)
  bankClient:
    $ref: ../common/SbpQrcRequestBankClientDto.yaml
    description: Реквизиты клиента по заявке
  serviceData:
    $ref: ../common/SbpQrcSideServiceDataDto.yaml
    description: Реквизиты сервиса ЭКО, инициировавшего заявку
  clientRequest:
    type: boolean
    description: 'Признак создания заявки клиентом банка: "true" - заявка создана Клиентом, "false" - заявка создана через сервис Банка'
  additionalData:
    type: array
    description: Распределение платежа
    items:
      $ref: ./SbpQrcAdditionalDataDto.yaml
  data:
    $ref: ./SbpQrcRequestCreateDataDto.yaml
    description: Реквизиты QR-кода
  subscriptionData:
    $ref: ../common/SbpQrcRequestSubscriptionDataV2Dto.yaml
    description: Реквизиты подписки
  payersEmail:
    type: string
    description: Адрес электронной почты Плательщика
  qrcId:
    type: string
    description: Идентификатор зарегистрированного QR кода в СБПки
  payload:
    type: string
    description: Payload зарегистрированного QR кода в СБП
  paymentServiceNames:
    type: array
    description: Список наименований платежных сервисов
    items:
      type: string
      description: Наименование платежного сервиса
      enum:
      - DR
      - SBP
