post:
  tags:
  - API заявления на платеж СБП. Операции подписи
  summary: Подписать заявление и передать данные устройства пользователя, deprecated - использовать /sbp/transaction/v3/sign
  operationId: signWithDeviceInfo
  parameters:
  - name: OrganizationId
    in: header
    description: Идентификатор клиента
    required: true
    schema:
      type: string
      format: uuid
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/transaction/GenericCommandSbpSignDto.yaml
    required: true
  responses:
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '200':
      description: OK
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/transaction/GenericResponseErrorDataSbpClientTransactionRequestDto.yaml
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
  deprecated: true
