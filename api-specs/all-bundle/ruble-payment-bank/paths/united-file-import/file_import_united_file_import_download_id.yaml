get:
  tags:
  - Операции с загруженными файлами импорта/фоновыми процессами импорта.
  summary: Функция загрузки исходного файла
  description: 'Привилегии: RPO.BANK.FILE_IMPORT_DOWNLOAD'
  operationId: downloadFile
  parameters:
  - name: id
    in: path
    required: true
    schema:
      type: string
      format: uuid
  responses:
    '200':
      description: OK
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/united-file-import/GenericResponseSimpleErrorDataFileStorageAccessData.yaml
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
