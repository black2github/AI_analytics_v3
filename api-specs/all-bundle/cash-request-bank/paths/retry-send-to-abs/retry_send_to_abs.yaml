  description: 'Привилегии: CASH_REQUEST_ORDER.BANK.RETRY.SEND'
  operationId: retrySendToAbs
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/retry-send-to-abs/GenericCommandChangeMassOrderDto.yaml
