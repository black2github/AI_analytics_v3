    - CLIENT
    - BANK
    - TECHNICAL
  firstName:
    type: string
    description: Имя пользователя
  lastName:
    type: string
    description: Фамилия пользователя
  middleName:
    type: string
    description: Отчество пользователя
  commentForClient:
    type: string
    description: Комментарий для Клиента
  commentForBank:
    type: string
    description: Комментарий для Банка
description: Запись истории изменений заявки
