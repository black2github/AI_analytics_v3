    type: string
    description: Уникальный идентификатор записи
    format: uuid
  userId:
    type: string
    description: Идентификатор пользователя-инициатора события
    format: uuid
  changedIn:
    type: string
    description: Дата и время присвоения статуса заявке
    format: date-time
  status:
    type: string
    description: Статус заявки
  userType:
    type: string
    description: Тип пользователя
