required:
- documents
- id
- status
type: object
properties:
  id:
    type: string
    description: ID операции подписи
    format: uuid
  status:
    type: string
    description: Статус операции подписи ФНС
    enum:
    - WAITING_CONFIRMATION
    - EXPIRED
    - DECLINED
    - COMPLETED
    - REJECTED
    - ERROR
  documents:
    type: array
    description: Список подписанных документов
    items:
      $ref: ./ClientSignedDocumentDto.yaml
description: Представление операции подписи для клиента
