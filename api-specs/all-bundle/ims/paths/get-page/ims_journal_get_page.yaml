post:
  tags:
  - API журнала запросов СУВ.
  summary: Получить страницу записей
  description: 'Привилегии: hasAuthority(''IMS_JOURNAL.VIEW'')'
  operationId: getPage
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/get-page/GetPageCommandImsJournalFilter.yaml
    required: true
  responses:
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '200':
      description: OK
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/get-page/GenericResponseErrorDataPageDataЗапись Журанала Сообщений СУВ (для Отображения Списочной Формы)..yaml
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
