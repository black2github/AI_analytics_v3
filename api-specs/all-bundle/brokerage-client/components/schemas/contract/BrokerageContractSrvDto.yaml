type: object
properties:
  serviceId:
    type: string
    description: Идентификтор услуги
    format: uuid
  ordinal:
    type: integer
    description: Порядковый номер записи в выдаче
    format: int32
  name:
    type: string
    description: Наименование услуги в договоре
  profile:
    type: string
    description: Профиль клиента
  planEndDate:
    type: string
    description: Плановая дата окончания действия
    format: date
  qualEndDate:
    type: string
    description: Срок действия квалификации
    format: date
  status:
    type: string
    description: Статус договора
    enum:
    - ACTIVATED
    - DEACTIVATED
description: Сведения об услугах в договоре
