type: object
properties:
  id:
    type: string
    description: Идентификатор записи
  contractId:
    type: string
    description: Идентификатор записи (внешний)
  status:
    type: string
    description: Статус контракта
    enum:
    - OPENED
    - CLOSED
  number:
    maxLength: 255
    pattern: ^[0-9A-Za-zА-Яа-яЁё\s\!\"\№\$\%\&\'\(\)\*\+\,\-\.\/\:\;\<\=\>\?\@\[\]\\\^\_\`\{\}\|\~\№\.]+$
    type: string
    description: Номер контракта
  contractDate:
    type: string
    description: Дата контракта
    format: date
  branchNumber:
    type: string
    description: Код филиала
  clientName:
    maxLength: 255
    pattern: ^[0-9A-Za-zА-Яа-яЁё\s\!\"\№\$\%\&\'\(\)\*\+\,\-\.\/\:\;\<\=\>\?\@\[\]\\\^\_\`\{\}\|\~\№\.]+$
    type: string
    description: Наименование клиента в контракте
  clientCode:
    type: string
    description: Наименование кода клиента
  tariffName:
    type: string
    description: Наименование тарифа
  tariffCode:
    type: string
    description: Код тарифа
  depoAccount:
    type: string
    description: Счет ДЕПО
  brief:
    type: string
    description: Краткое наименование договора
  specDepository:
    type: boolean
    description: Признак обслуживания в спец.депозитарии
description: Сведения о модели договора
