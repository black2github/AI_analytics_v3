required:
- createdAt
- docNumber
- documentType
- id
- status
type: object
properties:
  id:
    type: string
    description: Идентификатор сущности
    format: uuid
  createdAt:
    type: string
    description: Дата создания
    format: date-time
  docNumber:
    type: integer
    description: Номер заявки (поручения)
    format: int32
  documentType:
    type: string
    description: Тип поручения
    enum:
    - JOIN_MARKET
    - JOIN_CURRENCY
    - BRK_SERVICE_ADD
  status:
    type: string
    description: Статус поручения
    enum:
    - NEW
    - SIGNED
    - SENT
    - IN_PROCESS
    - DELIVERED
    - REJECTED
  market:
    $ref: ./BrkCodeNameDto.yaml
  service:
    $ref: ./BrkCodeNameDto.yaml
  currencies:
    uniqueItems: true
    type: array
    items:
      $ref: ./BrkCodeNameDto.yaml
  signatures:
    type: array
    items:
      $ref: ./SignatureDto.yaml
description: Страница с данными
