required:
- accountNumber
- bankBic
type: object
properties:
  accountNumber:
    maxLength: 20
    minLength: 20
    type: string
    description: Номер счета получателя
  agreementAccount:
    type: boolean
    description: Счёт из договора
  bankBic:
    type: string
    description: БИК получателя
  bankCorrAccountNumber:
    type: string
    description: Корр. счет получателя
  bankName:
    type: string
    description: БАНК получателя
  budgetInfo:
    $ref: ../common/BudgetInfoDto.yaml
  commentForService:
    type: string
    description: Комментарий для сервиса АДМ.
  firmNumber:
    type: string
    description: Номер фирмы
  firmNumberDefined:
    type: boolean
    description: Номер фирмы определён
  forAllAdms:
    type: boolean
    description: Реквизиты для всех АДМ
  id:
    type: string
    description: Идентификатор
    format: uuid
  inn:
    type: string
    description: ИНН получателя
  isBudget:
    type: boolean
    description: Признак Бюджетные реквизиты
  kpp:
    type: string
    description: КПП получателя
  name:
    type: string
    description: Наименование получателя
  ogrn:
    type: string
    description: ОГРН получателя
  useCommissionAccount:
    type: boolean
    description: Использовать счёт списания комиссии
description: Реквизиты счёта для зачисления (заявка на добавление реквизитов)
