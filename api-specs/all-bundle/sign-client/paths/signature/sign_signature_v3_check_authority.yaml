post:
  tags:
  - Работа с подписью и полномочиями
  summary: Проверить полномочия подписи пользователя V3
  description: 'Привилегии: @eco.userPassedMfa() OR hasAuthority(''SIGN_CHECK'')'
  operationId: checkSignAuthorityV3
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/signature/SignAuthorityRequestClientDto.yaml
    required: true
  responses:
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '200':
      description: OK
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/signature/GenericResponseSimpleErrorDataSignAuthorityResponseV2.yaml
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
