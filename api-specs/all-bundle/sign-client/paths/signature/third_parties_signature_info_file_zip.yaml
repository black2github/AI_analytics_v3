post:
  tags:
  - Ресурс для получения информации о подписи третьих лиц
  summary: Получить информацию о подписи по zip-архиву
  description: 'Привилегии: THIRD_PARTIES_SIGN_INFO_GET_FROM_FILE'
  operationId: getSignatureInfoFilesMap
  requestBody:
    content:
      application/json:
        schema:
          required:
          - file
          type: object
          properties:
            file:
              type: string
              format: binary
  responses:
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '200':
      description: OK
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/signature/SingleResponseMapStringThirdPartiesSignatureInfoDto.yaml
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
