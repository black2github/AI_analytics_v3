post:
  tags:
  - Экспорт подписи
  summary: Выгрузка реквизитов ЭП для проверки
  description: 'Привилегии: SIGN_EXPORT'
  operationId: export
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/export/SignExportRequest.yaml
    required: true
  responses:
    '403':
      description: Forbidden
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '500':
      description: Internal Server Error
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResult.yaml
    '415':
      description: Unsupported Media Type
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '200':
      description: ''
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/export/ByteArrSingleResponse.yaml
    '423':
      description: Locked
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '401':
      description: Unauthorized
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    '400':
      description: Bad Request
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/common/ActionResultObject.yaml
    default:
      description: default response
      content:
        '*/*':
          schema:
            $ref: ../../components/schemas/export/ByteArrSingleResponse.yaml
