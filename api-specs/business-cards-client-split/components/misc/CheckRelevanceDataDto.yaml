type: object
properties:
  needToRetry:
    type: boolean
    description: Флаг, требующий клиента повторить запрос
  needToUpdate:
    type: boolean
    description: Флаг, требующий клиента обновить сведения
  sessionLeader:
    type: string
    description: Идентификатор запроса, «породившего» заявку (ProcessGUID), для повторных вызовов API
    format: uuid
  state:
    type: string
    description: Статус проверки актуальности данных в карточке клиента
    enum:
    - SUSPENDED
    - ABORTED
    - COMPLETED
    - UNKNOWN
description: Ответ на запрос проверки актуальности данных в карточке клиента
