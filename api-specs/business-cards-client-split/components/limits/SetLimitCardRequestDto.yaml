required:
- clientId
- status
type: object
properties:
  batch:
    $ref: ../common/BatchRequestBaseDto.yaml
  card:
    $ref: ../common/CardDto.yaml
  clientId:
    type: string
    description: Идентификатор клиента в Экосистеме
    format: uuid
  commentForBank:
    pattern: ^[A-Za-zА-Яа-яЁё0-9 !"«»“”#$%&'()*+,\-./:;<=>?@\[\\\]^_`{|}~№\r\n]{1,4000}$
    type: string
    description: Комментарий для банка
  commentForClient:
    pattern: ^[A-Za-zА-Яа-яЁё0-9 !"«»“”#$%&'()*+,\-./:;<=>?@\[\\\]^_`{|}~№\r\n]{1,4000}$
    type: string
    description: Комментарий для клиента
  dailyLimit:
    $ref: ./LimitParameterOdlDto.yaml
  dailyLimitChange:
    type: string
    description: Признак изменения дневного лимита
    nullable: true
    example: DELETE
    enum:
    - NO_CHANGE
    - CHANGE
    - DELETE
  dailyLimitExecutedError:
    type: boolean
    description: Признак возникновения ошибки при исполнении заявки на изменение дневного лимита.
    example: true
  firstName:
    type: string
    description: Имя держателя
    example: Николай
  id:
    type: string
    description: Уникальный идентификатор заявки в Экосистеме
    format: uuid
  lastName:
    type: string
    description: Фамилия держателя
    example: Демидов
  limitParameters:
    type: array
    description: Лимиты
    items:
      $ref: ./LimitParameterDto.yaml
  monthlyLimit:
    $ref: ./LimitParameterOdlDto.yaml
  monthlyLimitChange:
    type: string
    description: Признак изменения месячного лимита
    nullable: true
    example: NO_CHANGE
    enum:
    - NO_CHANGE
    - CHANGE
    - DELETE
  monthlyLimitExecutedError:
    type: boolean
    description: Признак возникновения ошибки при исполнении заявки на изменение месячного лимита.
    example: false
  reqDate:
    type: string
    description: Дата и время создания заявки
    format: date
  reqNum:
    type: integer
    description: Уникальный номер заявки в разрезе Пользователя, создавшего заявку, и года создания заявки
    format: int32
  reqType:
    type: string
    description: Код типа документа из Классификатора [Типы документов]
    nullable: true
    example: BC_SET_LIMIT_REQUEST
  secondName:
    type: string
    description: Отчество держателя
    example: Валерьевич
  signature:
    $ref: ../common/CardSignatureDto.yaml
  signerInfo:
    $ref: ../common/CardRequestSignerInfoDto.yaml
  status:
    type: string
    description: Статус документа, устанавливаемый в соответствии с ЖЦ заявки
    example: NONE
  tessaCardId:
    type: string
    description: Идентификатор карточки документа в ТЕССА
    format: uuid
  tessaFileId:
    type: string
    description: Идентификатор файла в ТЕССА
    format: uuid
  userFio:
    pattern: ^[A-Za-zА-Яа-яЁё0-9 !"«»“”#$%&'()*+,\-./:;<=>?@\[\\\]^_`{|}~№]{1,800}$
    type: string
    description: Пользователь, создавший заявку (ФИО)
  userId:
    type: string
    description: Идентификатор юзера в Экосистеме
    format: uuid
description: Заявка на установку лимитов по корпоративной карте
