post:
  description: |
    Создание или редактирование заявки на управление лимитами карты.

    Принимает данные заявки, введённые на экранной форме «Заявка на управление
    лимитами карты»: при отсутствии идентификатора создаёт новую заявку,
    при наличии — обновляет существующую. В ответе возвращается сохранённая
    заявка вместе с результатом серверных контролей (валидации).

    Используется логическими элементами:
    - Функция: [\[КК_ЛК\] Клиент: Функция создания заявки на управление лимитами карты](https://gitlab.gboteam.ru/ED/doc-as-code/-/blob/master/conf-requirements/cc/[КК]-Корпоративные-Карты/[КК_ЛК]-Управление-лимитами-карты/[КК_ЛК]-Функции/[КК_ЛК]-Функции-Клиента/[КК_ЛК]-Клиент-Функция-создания-заявки-на-управление-лимитами-карты.md)
    - Экранная форма: [\[КК_ЛК\] ЭФ Клиента: "Заявка на управление лимитами карты" в режиме создания/редактирования](https://gitlab.gboteam.ru/ED/doc-as-code/-/blob/master/conf-requirements/cc/[КК]-Корпоративные-Карты/[КК_ЛК]-Управление-лимитами-карты/[КК_ЛК]-Экранные-формы/[КК_ЛК]-ЭФ-Клиента/[КК_ЛК]-ЭФ-Клиента-Заявка-на-управление-лимитами-карты-в-режиме-созданияредактирования.md)

    Привилегии: BC.CLIENT.SET_LIMIT_REQUEST.CREATE, BC.CLIENT.SET_LIMIT_REQUEST.EDIT
  operationId: createOrUpdate
